# =============================================================================
# arifOS MCP Server - Full-Stack Docker Compose
# =============================================================================
# Version: 1.0.0
# Constitutional Compliance: F1 (Reversible), F4 (Clarity), F11 (Authority)
# 
# ⚠️ 888_HOLD REQUIRED for:
#   - Production database initialization
#   - Volume data persistence activation
#   - SSL certificate generation
#   - Secret rotation in production
#
# MOTTO: Ditempa Bukan Diberi — Forged, Not Given
# =============================================================================

version: "3.9"

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================
networks:
  arifos-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
    labels:
      - "arifos.network.purpose=internal-service-mesh"
      - "arifos.floor.f1=reversible"
  
  arifos-public:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
          gateway: 172.29.0.1
    labels:
      - "arifos.network.purpose=public-facing"
      - "arifos.floor.f11=authority-required"

# =============================================================================
# VOLUME CONFIGURATION
# =============================================================================
volumes:
  # PostgreSQL: Vault-999 and relational state
  # F1 COMPLIANT: Data persisted, backups required for reversibility
  postgres_data:
    driver: local
    labels:
      - "arifos.volume.purpose=vault-999-state"
      - "arifos.backup.required=true"
      - "arifos.retention.days=30"
  
  # Redis: Session and cache persistence
  redis_data:
    driver: local
    labels:
      - "arifos.volume.purpose=session-cache"
      - "arifos.backup.required=false"
      - "arifos.ttl.hours=24"
  
  # Qdrant: Vector embeddings and memory
  qdrant_data:
    driver: local
    labels:
      - "arifos.volume.purpose=vector-memory"
      - "arifos.backup.required=true"
      - "arifos.retention.days=90"
  
  # Nginx: SSL certificates and configs
  nginx_certs:
    driver: local
    labels:
      - "arifos.volume.purpose=ssl-certificates"
      - "arifos.floor.f11=secrets"
  
  # arifOS: Application logs
  arifos_logs:
    driver: local
    labels:
      - "arifos.volume.purpose=audit-logs"
      - "arifos.retention.days=365"

  # AgentZero: Model cache
  agentzero_cache:
    driver: local
    labels:
      - "arifos.volume.purpose=model-cache"
      - "arifos.backup.required=false"

# =============================================================================
# SERVICES
# =============================================================================
services:
  
  # ===========================================================================
  # 1. PostgreSQL - Vault-999 + Relational State
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: arifos-postgres
    restart: unless-stopped
    
    environment:
      # F11 COMPLIANCE: Secrets must be set in .env, never hardcoded
      POSTGRES_DB: ${POSTGRES_DB:-arifos_vault}
      POSTGRES_USER: ${POSTGRES_USER:-arifos_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    ports:
      # F11: Bind to localhost only
      - "127.0.0.1:5432:5432"

    networks:
      arifos-internal:
        aliases:
          - postgres.vault.local
          - db.arifos.internal
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arifos_admin} -d ${POSTGRES_DB:-arifos_vault}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    labels:
      - "arifos.service=tier-critical"
      - "arifos.floor.f1=reversible-with-backup"
      - "arifos.floor.f2=truth-integrity"
      - "arifos.backup.schedule=0 2 * * *"
    
    # F5 COMPLIANCE: Resource limits for stability
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
        labels: "arifos.service,arifos.floor"

  # ===========================================================================
  # 2. Redis - Session & Cache Layer
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: arifos-redis
    restart: unless-stopped
    
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    
    volumes:
      - redis_data:/data
    
    ports:
      # F11: Bind to localhost only
      - "127.0.0.1:6379:6379"

    networks:
      arifos-internal:
        aliases:
          - redis.cache.local
          - cache.arifos.internal
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    
    labels:
      - "arifos.service=tier-cache"
      - "arifos.ttl.default=3600"
      - "arifos.floor.f4=entropy-reduction"
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ===========================================================================
  # 3. Qdrant - Vector Database for Embeddings
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: arifos-qdrant
    restart: unless-stopped
    
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-INFO}
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
      QDRANT__STORAGE__WAL_CAPACITY_MB: 32
    
    volumes:
      - qdrant_data:/qdrant/storage
      - ./config/qdrant.yaml:/qdrant/config/production.yaml:ro
    
    ports:
      # HTTP API
      - "${QDRANT_HOST:-127.0.0.1}:${QDRANT_HTTP_PORT:-6333}:6333"
      # gRPC API (optional)
      - "${QDRANT_HOST:-127.0.0.1}:${QDRANT_GRPC_PORT:-6334}:6334"
    
    networks:
      arifos-internal:
        aliases:
          - qdrant.vector.local
          - vector.arifos.internal
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    
    labels:
      - "arifos.service=tier-memory"
      - "arifos.embedding.model=text-embedding-3-large"
      - "arifos.floor.f2=semantic-truth"
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ===========================================================================
  # 4. AgentZero - Reasoning Brain / RAG Worker
  # ===========================================================================
  agentzero:
    image: agentzero/agentzero:latest
    container_name: arifos-agentzero
    restart: unless-stopped
    
    # F4 COMPLIANCE: Build context if local development
    # build:
    #   context: ./services/agentzero
    #   dockerfile: Dockerfile
    
    environment:
      # MCP Server Configuration
      ARIFOS_MCP_URL: ${ARIFOS_MCP_URL:-http://arifos:8888}
      ARIFOS_MCP_API_KEY: ${ARIFOS_MCP_API_KEY}
      
      # Constitutional Governance
      AGENTZERO_CONSTITUTIONAL_MODE: ${AGENTZERO_CONSTITUTIONAL_MODE:-strict}
      AGENTZERO_FLOOR_F2_MIN: ${AGENTZERO_FLOOR_F2_MIN:-0.99}
      AGENTZERO_888_HOLD_ENABLED: ${AGENTZERO_888_HOLD_ENABLED:-true}
      
      # Redis Connection
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_SESSION_TTL: ${REDIS_SESSION_TTL:-3600}
      
      # Qdrant Connection
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-arifos_memory}
      
      # PostgreSQL Connection (for Vault-999 access)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      
      # LLM Configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-claude-sonnet-4-20250514}
      
      # RAG Configuration
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_SIMILARITY_THRESHOLD: ${RAG_SIMILARITY_THRESHOLD:-0.85}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}
      
      # Logging
      LOG_LEVEL: ${AGENTZERO_LOG_LEVEL:-INFO}
      LOG_FORMAT: json
    
    volumes:
      # Configuration
      - ./config/agentzero-integration.yml:/app/config/integration.yml:ro
      # Logs
      - arifos_logs:/app/logs
      # Model cache (optional)
      - agentzero_cache:/app/.cache
    
    ports:
      # AgentZero API
      - "${AGENTZERO_HOST:-127.0.0.1}:${AGENTZERO_PORT:-8080}:8080"
    
    networks:
      arifos-internal:
        aliases:
          - agentzero.brain.local
          - rag.arifos.internal
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    labels:
      - "arifos.service=tier-brain"
      - "arifos.floor.f2=reasoning-truth"
      - "arifos.floor.f7=humility-0.04"
      - "arifos.floor.f8=genius>=0.80"
    
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ===========================================================================
  # 5. OpenClaw - Multi-Channel IO (WhatsApp/Telegram)
  # ===========================================================================
  openclaw:
    image: openclaw/openclaw:latest
    container_name: arifos-openclaw
    restart: unless-stopped
    
    environment:
      # MCP Server Configuration
      ARIFOS_MCP_URL: ${ARIFOS_MCP_URL:-http://arifos:8888}
      ARIFOS_MCP_API_KEY: ${ARIFOS_MCP_API_KEY}
      
      # OpenClaw Configuration
      OPENCLAW_MODE: ${OPENCLAW_MODE:-judgment}
      OPENCLAW_WEBHOOK_SECRET: ${OPENCLAW_WEBHOOK_SECRET}
      
      # WhatsApp Business API
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      
      # Telegram Bot API
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-https://api.arifos.local/webhook/telegram}
      
      # Channel Routing Configuration
      DEFAULT_CHANNEL_PRIORITY: ${DEFAULT_CHANNEL_PRIORITY:-telegram,whatsapp}
      CHANNEL_FALLBACK_ENABLED: ${CHANNEL_FALLBACK_ENABLED:-true}
      
      # Constitutional Enforcement
      OPENCLAW_POLICY_ENFORCEMENT: ${OPENCLAW_POLICY_ENFORCEMENT:-strict}
      MESSAGE_RATE_LIMIT_PER_MIN: ${MESSAGE_RATE_LIMIT_PER_MIN:-60}
      MAX_MESSAGE_LENGTH: ${MAX_MESSAGE_LENGTH:-4096}
      
      # Redis for session management
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      
      # Logging
      LOG_LEVEL: ${OPENCLAW_LOG_LEVEL:-INFO}
      LOG_FORMAT: json
    
    volumes:
      - ./config/openclaw-integration.yml:/app/config/integration.yml:ro
      - arifos_logs:/app/logs
    
    ports:
      # OpenClaw API
      - "${OPENCLAW_HOST:-127.0.0.1}:${OPENCLAW_PORT:-3000}:3000"
    
    networks:
      arifos-internal:
        aliases:
          - openclaw.io.local
          - channels.arifos.internal
      arifos-public:
        aliases:
          - webhooks.arifos.local
    
    depends_on:
      redis:
        condition: service_healthy
      arifos:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    
    labels:
      - "arifos.service=tier-io"
      - "arifos.floor.f1=reversible-messages"
      - "arifos.floor.f6=empathy>=0.70"
      - "arifos.floor.f12=injection-defense"
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ===========================================================================
  # 6. arifOS MCP Server - Core Constitutional Kernel
  # ===========================================================================
  arifos:
    image: arifos/mcp-server:latest
    container_name: arifos-mcp-server
    restart: unless-stopped
    
    # F4 COMPLIANCE: Build from local source if developing
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    
    environment:
      # =======================================================================
      # CORE CONFIGURATION
      # =======================================================================
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${ARIFOS_PORT:-8888}
      HOST: ${ARIFOS_HOST:-0.0.0.0}
      
      # =======================================================================
      # CONSTITUTIONAL GOVERNANCE (F1-F13)
      # =======================================================================
      # F1: Amanah (Reversibility)
      ARIFOS_F1_AMANAH_ENABLED: ${ARIFOS_F1_AMANAH_ENABLED:-true}
      ARIFOS_BACKUP_REQUIRED: ${ARIFOS_BACKUP_REQUIRED:-true}
      
      # F2: Truth (τ ≥ 0.99)
      ARIFOS_F2_TRUTH_THRESHOLD: ${ARIFOS_F2_TRUTH_THRESHOLD:-0.99}
      ARIFOS_FACT_VERIFICATION: ${ARIFOS_FACT_VERIFICATION:-strict}
      
      # F4: Clarity (ΔS ≤ 0)
      ARIFOS_F4_ENTROPY_CHECK: ${ARIFOS_F4_ENTROPY_CHECK:-true}
      ARIFOS_MAX_QUERY_COMPLEXITY: ${ARIFOS_MAX_QUERY_COMPLEXITY:-100}
      
      # F5: Peace² (Non-destructive)
      ARIFOS_F5_PEACE_ENABLED: ${ARIFOS_F5_PEACE_ENABLED:-true}
      ARIFOS_SAFE_MODE: ${ARIFOS_SAFE_MODE:-true}
      
      # F6: Empathy (κᵣ ≥ 0.70)
      ARIFOS_F6_EMPATHY_THRESHOLD: ${ARIFOS_F6_EMPATHY_THRESHOLD:-0.70}
      ARIFOS_WEAKEST_STAKEHOLDER_BIAS: ${ARIFOS_WEAKEST_STAKEHOLDER_BIAS:-true}
      
      # F7: Humility (Ω₀ ∈ [0.03, 0.05])
      ARIFOS_F7_HUMILITY_TARGET: ${ARIFOS_F7_HUMILITY_TARGET:-0.04}
      ARIFOS_UNCERTAINTY_ACKNOWLEDGMENT: ${ARIFOS_UNCERTAINTY_ACKNOWLEDGMENT:-required}
      
      # F8: Genius (G ≥ 0.80)
      ARIFOS_F8_GENIUS_THRESHOLD: ${ARIFOS_F8_GENIUS_THRESHOLD:-0.80}
      ARIFOS_COHERENCE_CHECK: ${ARIFOS_COHERENCE_CHECK:-true}
      
      # F9: Anti-Hantu (No consciousness claims)
      ARIFOS_F9_ANTIHANTU_ENABLED: ${ARIFOS_F9_ANTIHANTU_ENABLED:-true}
      ARIFOS_SYMBOLIC_MODE: ${ARIFOS_SYMBOLIC_MODE:-strict}
      
      # F11: Command Authority
      ARIFOS_F11_AUTH_REQUIRED: ${ARIFOS_F11_AUTH_REQUIRED:-true}
      ARIFOS_NONCE_VERIFICATION: ${ARIFOS_NONCE_VERIFICATION:-true}
      
      # F12: Injection Defense
      ARIFOS_F12_INJECTION_DEFENSE: ${ARIFOS_F12_INJECTION_DEFENSE:-true}
      ARIFOS_INPUT_SANITIZATION: ${ARIFOS_INPUT_SANITIZATION:-strict}
      
      # 888_HOLD Configuration
      ARIFOS_888_HOLD_ENABLED: ${ARIFOS_888_HOLD_ENABLED:-true}
      ARIFOS_888_HOLD_MUTATIONS: ${ARIFOS_888_HOLD_MUTATIONS:-true}
      ARIFOS_888_HOLD_SECRETS: ${ARIFOS_888_HOLD_SECRETS:-true}
      ARIFOS_888_HOLD_DESTRUCTIVE: ${ARIFOS_888_HOLD_DESTRUCTIVE:-true}
      
      # =======================================================================
      # DATABASE CONNECTIONS
      # =======================================================================
      # PostgreSQL (Vault-999)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-arifos_vault}
      POSTGRES_USER: ${POSTGRES_USER:-arifos_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # Qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_URL: http://qdrant:6333
      
      # =======================================================================
      # API KEYS & INTEGRATIONS
      # =======================================================================
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      
      # =======================================================================
      # AGENTZERO INTEGRATION
      # =======================================================================
      AGENTZERO_URL: ${AGENTZERO_URL:-http://agentzero:8080}
      AGENTZERO_API_KEY: ${AGENTZERO_API_KEY}
      AGENTZERO_ENABLED: ${AGENTZERO_ENABLED:-true}
      
      # =======================================================================
      # OPENCLAW INTEGRATION
      # =======================================================================
      OPENCLAW_URL: ${OPENCLAW_URL:-http://openclaw:3000}
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY}
      OPENCLAW_ENABLED: ${OPENCLAW_ENABLED:-true}
      
      # =======================================================================
      # LOGGING & OBSERVABILITY
      # =======================================================================
      LOG_LEVEL: ${ARIFOS_LOG_LEVEL:-INFO}
      LOG_FORMAT: json
      AUDIT_LOG_ENABLED: ${AUDIT_LOG_ENABLED:-true}
      AUDIT_LOG_PATH: /app/logs/audit
      
      # =======================================================================
      # SECURITY
      # =======================================================================
      JWT_SECRET: ${JWT_SECRET}
      API_KEY_SALT: ${API_KEY_SALT}
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    
    volumes:
      # Application logs
      - arifos_logs:/app/logs
      # Configuration (read-only)
      - ./config:/app/config:ro
      # Scripts (read-only)
      - ./scripts:/app/scripts:ro
    
    ports:
      # MCP Server API
      - "${ARIFOS_HOST:-0.0.0.0}:${ARIFOS_PORT:-8888}:8888"
    
    networks:
      arifos-internal:
        aliases:
          - arifos.core.local
          - mcp.arifos.internal
          - kernel.arifos.local
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    labels:
      - "arifos.service=tier-kernel"
      - "arifos.floor.f1=LOCK"
      - "arifos.floor.f2=0.99"
      - "arifos.floor.f4=ΔS≤0"
      - "arifos.floor.f7=Ω₀=0.04"
      - "arifos.floor.f8=G≥0.80"
      - "arifos.floor.f11=LOCK"
      - "arifos.floor.f12=defense-active"
      - "arifos.888_hold=ENABLED"
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "arifos.floor,arifos.888_hold"

  # ===========================================================================
  # 7. Nginx - Reverse Proxy & SSL (Optional)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: arifos-nginx
    restart: unless-stopped
    
    environment:
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      ARIFOS_HOST: ${NGINX_ARIFOS_HOST:-arifos}
      ARIFOS_PORT: ${ARIFOS_PORT:-8888}
      DOMAIN: ${DOMAIN:-localhost}
    
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/ssl:ro
      # Let's Encrypt (if using)
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    
    ports:
      - "80:80"
      - "443:443"
    
    networks:
      arifos-internal:
        aliases:
          - nginx.proxy.local
      arifos-public:
        aliases:
          - api.arifos.local
          - gateway.arifos.local
    
    depends_on:
      - arifos
      - openclaw
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    
    labels:
      - "arifos.service=tier-gateway"
      - "arifos.ssl=${SSL_ENABLED:-false}"
      - "arifos.floor.f12=injection-defense"
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# =============================================================================
# NOTE: Volumes declared at line 45 (postgres_data, redis_data, qdrant_data, etc.)
# agentzero_cache can be added to the main volumes section if needed
# =============================================================================
