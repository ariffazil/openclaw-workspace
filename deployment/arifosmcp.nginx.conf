# arifOS MCP Server — Nginx reverse proxy
# VPS: 72.62.71.199 (Hostinger)
# Domains: arifosmcp.arif-fazil.com (Cloudflare proxied)
#
# Install: sudo cp deployment/arifosmcp.nginx.conf /etc/nginx/sites-available/arifosmcp
#          sudo ln -s /etc/nginx/sites-available/arifosmcp /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d arifosmcp.arif-fazil.com
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name arifosmcp.arif-fazil.com;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name arifosmcp.arif-fazil.com;

    ssl_certificate /etc/letsencrypt/live/arifosmcp.arif-fazil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arifosmcp.arif-fazil.com/privkey.pem;

    # MCP SSE endpoint and health check
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requires HTTP/1.1 + keep-alive
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache off;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}
