# arifOS MCP Server on VPS (Trinity Protocol - SSE + HTTP)
# Deploys the real aaa_mcp server with SSE (port 8888) and HTTP (port 8889)
# Health check verifies both processes are running

version: '3.8'

services:
  arifosmcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arifosmcp_server
    restart: unless-stopped
    env_file:
      - .env.docker
    # Map host ports to container ports
    ports:
      - "8888:8080"   # SSE transport
      - "8889:8089"   # HTTP transport
    volumes:
      - ./data:/app/data
    # Override the default command to run both servers
    command: /app/start-trinity.sh
    # Health check: verify both python processes are running
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep 'python -m aaa_mcp sse' && ps aux | grep -v grep | grep 'python -m aaa_mcp http'"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    # Environment variables (optional)
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    # Ensure the container logs are captured
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Memory limit for AI models
    deploy:
      resources:
        limits:
          memory: 2G
    # Run as non-root user (already set in Dockerfile)