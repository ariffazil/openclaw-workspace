# arifOS MCP Server on VPS (Trinity Protocol - SSE + REST)
# Deploys the real aaa_mcp server with SSE (port 8088) and REST (port 8889)
# Health check verifies both processes are running

services:
  arifosmcp:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: arifosmcp_server
    restart: unless-stopped
    env_file:
      - path: ../.env.docker
        required: false
    # Ports mapped for direct access (bypassing Traefik)
    ports:
      - "8088:8080"   # SSE transport (internal)
      - "8889:8089"   # REST bridge (internal)
    networks:
      - coolify
    volumes:
      - arifosmcp_data:/usr/src/app/data
    # Override the default command to run both servers
    command: /usr/src/app/start-trinity.sh
    # Health check: verify both python processes are running
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep 'python -m aaa_mcp sse' && ps aux | grep -v grep | grep 'python -m aaa_mcp rest'"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    # Environment variables (optional)
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    # Ensure the container logs are captured
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Memory limit for AI models
    deploy:
      resources:
        limits:
          memory: 2G
    # Run as non-root user (already set in Dockerfile)
    # Coolify/Traefik labels for domain routing
    labels:
      - "traefik.enable=true"
      # Route /sse to the SSE server (port 8080 in-container)
      - "traefik.http.routers.arifosmcp-sse.rule=Host(`arifosmcp.arif-fazil.com`) && PathPrefix(`/sse`)"
      - "traefik.http.routers.arifosmcp-sse.entrypoints=https"
      - "traefik.http.routers.arifosmcp-sse.tls.certresolver=letsencrypt"
      - "traefik.http.routers.arifosmcp-sse.priority=100"
      - "traefik.http.routers.arifosmcp-sse.service=arifosmcp_sse"
      - "traefik.http.services.arifosmcp_sse.loadbalancer.server.port=8080"
      # Route everything else to the REST/HTTP MCP bridge (port 8089 in-container)
      - "traefik.http.routers.arifosmcp-http.rule=Host(`arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.arifosmcp-http.entrypoints=https"
      - "traefik.http.routers.arifosmcp-http.tls.certresolver=letsencrypt"
      - "traefik.http.routers.arifosmcp-http.priority=1"
      - "traefik.http.routers.arifosmcp-http.service=arifosmcp_http"
      - "traefik.http.services.arifosmcp_http.loadbalancer.server.port=8089"

networks:
  coolify:
    external: true

volumes:
  arifosmcp_data:
