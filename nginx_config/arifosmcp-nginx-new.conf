# arifOS MCP Server — Unified Nginx Configuration
# Domain: arifosmcp.arif-fazil.com
# VPS: 72.62.71.199 (Hostinger)
# Cloudflare: Proxied (Orange cloud)
#
# Installation:
#   sudo cp arifosmcp-nginx-new.conf /etc/nginx/sites-available/arifosmcp
#   sudo ln -sf /etc/nginx/sites-available/arifosmcp /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL Certificates (managed by Certbot):
#   /etc/letsencrypt/live/arifosmcp.arif-fazil.com/

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name arifosmcp.arif-fazil.com;
    
    # ACME challenge for Certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    
    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name arifosmcp.arif-fazil.com;
    
    # SSL certificates (Certbot managed)
    ssl_certificate /etc/letsencrypt/live/arifosmcp.arif-fazil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arifosmcp.arif-fazil.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml;
    
    # Root directory for static files
    root /var/www/arifosmcp;
    index landing.html;
    
    # Landing page
    location = / {
        try_files /landing.html =404;
        add_header Content-Type text/html;
        expires 1h;
    }
    
    # Static assets (if any)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # === REST API (Port 8080) ===
    
    # Health endpoints
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
    
    location /ready {
        proxy_pass http://127.0.0.1:8080/ready;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /version {
        proxy_pass http://127.0.0.1:8080/version;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /metrics {
        proxy_pass http://127.0.0.1:8080/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Tool endpoints
    location /tools {
        proxy_pass http://127.0.0.1:8080/tools;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Handle POST requests to /tools/{name}
        location ~ ^/tools/[^/]+$ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    # Apex judge endpoint
    location /apex_judge {
        proxy_pass http://127.0.0.1:8080/apex_judge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }
    
    # MCP JSON-RPC messages
    location /messages {
        proxy_pass http://127.0.0.1:8080/messages;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
    }
    
    # === MCP Transports ===
    
    # SSE transport (Server-Sent Events)
    location /sse {
        proxy_pass http://127.0.0.1:8080/sse;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE specific headers
        add_header Cache-Control "no-cache";
        add_header Content-Type "text/event-stream";
        add_header X-Accel-Buffering "no";
    }
    
    # HTTP transport (FastMCP HTTP mode)
    location /mcp {
        proxy_pass http://127.0.0.1:8089/mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        
        # Handle MCP specific headers
        proxy_set_header Accept "application/json";
        proxy_set_header Content-Type "application/json";
        
        # Increase timeouts for MCP operations
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    # === Error Pages ===
    
    error_page 404 /404.html;
    location = /404.html {
        internal;
        return 404 '{"error": "Endpoint not found", "status": 404}\n';
        add_header Content-Type application/json;
    }
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        return 500 '{"error": "Internal server error", "status": 500}\n';
        add_header Content-Type application/json;
    }
    
    # === Logging ===
    
    access_log /var/log/nginx/arifosmcp-access.log combined;
    error_log /var/log/nginx/arifosmcp-error.log warn;
}