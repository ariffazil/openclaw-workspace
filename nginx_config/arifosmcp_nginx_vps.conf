# arifOS MCP Server — Nginx reverse proxy
# VPS: 72.62.71.199 (Hostinger)
# Domains: arifosmcp.arif-fazil.com (Cloudflare proxied)
#
# Install: sudo cp arifosmcp.nginx.conf /etc/nginx/sites-available/arifosmcp
#          sudo ln -s /etc/nginx/sites-available/arifosmcp /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d arifosmcp.arif-fazil.com
#          sudo nginx -t && sudo systemctl reload nginx

server {
    if ($host = arifosmcp.arif-fazil.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name arifosmcp.arif-fazil.com;
    location / {
        return 301 https://$host$request_uri;
    }


}

server {
    listen 443 ssl http2;
    server_name arifosmcp.arif-fazil.com;
    ssl_certificate /etc/letsencrypt/live/arifosmcp.arif-fazil.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/arifosmcp.arif-fazil.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        return 200 'arifOS MCP Server\nSSE: /sse\nHTTP MCP: /mcp\n';
        add_header Content-Type text/plain;
    }

    location /sse {
        proxy_pass http://127.0.0.1:8088/sse; # SSE transport
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /mcp {
        proxy_pass http://127.0.0.1:8889/mcp; # HTTP MCP transport
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}