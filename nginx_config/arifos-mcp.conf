# arifOS MCP Server - Nginx Reverse Proxy Configuration
# Place this file at: /etc/nginx/sites-available/arifos-mcp
# Then enable with: ln -s /etc/nginx/sites-available/arifos-mcp /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;  # Accept any hostname, or set your domain: mcp.yourdomain.com
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Rate limiting zone (requires nginx-module-limit-req)
    # limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;
    
    location / {
        # Rate limiting
        # limit_req zone=mcp_limit burst=20 nodelay;
        
        # Proxy to MCP server
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # Health check endpoint (passthrough)
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        access_log off;  # Don't log health checks
    }
}

