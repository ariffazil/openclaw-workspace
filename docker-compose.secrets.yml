# docker-compose.secrets.yml — Docker Secrets Overlay
# 
# This overlay adds Docker Secrets support for production deployments.
# Use with: docker stack deploy -c docker-compose.yml -c docker-compose.secrets.yml arifos
#
# Prerequisites:
#   1. Docker Swarm initialized: docker swarm init
#   2. Secrets created (see DEPLOY_SECRETS.md)
#
# Constitutional Floor: F11 (Command Authority)

version: '3.8'

secrets:
  # Root governance secret - NEVER rotate without grace period
  governance_secret:
    external: true
    name: arifos_governance_secret_v2026
  
  # Session encryption secret
  session_secret:
    external: true
    name: arifos_session_secret_v2026
  
  # Database credentials
  postgres_password:
    external: true
    name: arifos_postgres_password
  
  # Cache credentials
  redis_password:
    external: true
    name: arifos_redis_password
  
  # Vector store credentials
  qdrant_api_key:
    external: true
    name: arifos_qdrant_api_key

services:
  mcp:
    secrets:
      - source: governance_secret
        target: governance_secret
        mode: 0400
      - source: session_secret
        target: session_secret
        mode: 0400
    environment:
      # File-based secret references (production)
      - ARIFOS_GOVERNANCE_SECRET_FILE=/run/secrets/governance_secret
      - ARIFOS_SESSION_SECRET_FILE=/run/secrets/session_secret
      # Disable fallback to env vars in production
      - ARIFOS_SECRET_STRICT_MODE=true
      - ARIFOS_ENV=production
    healthcheck:
      test: ["CMD", "python", "-c", "import os; open(os.environ['ARIFOS_GOVERNANCE_SECRET_FILE']).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    secrets:
      - source: postgres_password
        target: postgres_password
        mode: 0400
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    secrets:
      - source: redis_password
        target: redis_password
        mode: 0400
    command: >
      sh -c "redis-server --requirepass $$(cat /run/secrets/redis_password)"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    secrets:
      - source: qdrant_api_key
        target: qdrant_api_key
        mode: 0400
    environment:
      QDRANT__SERVICE__API_KEY_FILE: /run/secrets/qdrant_api_key
