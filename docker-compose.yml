# ── arifOS AAA MCP — Production Compose ──────────────────────────
# ONE service, ONE port, ONE process.
# FastMCP streamable-HTTP on 8080 with REST custom routes.
# Connected to all VPS compartments: qdrant, ollama, openclaw, agent-zero
# ─────────────────────────────────────────────────────────────────

services:
  arifosmcp:
    build: .
    image: arifos/arifosmcp:latest
    container_name: arifosmcp_server
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    ports:
      - "8080:8080"
    volumes:
      - arifos_data:/usr/src/app/data
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      # VPS compartment connections (IP-based - DNS fails across networks)
      # See: /root/docs/VPS_AGENT_ARCHITECT_GUIDE.md
      QDRANT_URL: http://10.0.0.2:6333      # bridge network (verified)
      OLLAMA_URL: http://10.0.0.3:11434     # bridge network (verified)
      OPENCLAW_URL: http://10.0.4.2:18789   # ai-net network (verified)
      AGENT_ZERO_URL: http://10.0.2.2:80    # trinity_network (verified)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "3", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # Traefik / Coolify — all traffic to single port
      - "traefik.enable=true"
      - "traefik.http.routers.arifosmcp.rule=Host(`arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.arifosmcp.entrypoints=https"
      - "traefik.http.routers.arifosmcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.arifosmcp.loadbalancer.server.port=8080"
    networks:
      - coolify
      - ai-net
      - trinity_network
      - bridge

networks:
  coolify:
    external: true
  ai-net:
    external: true
  trinity_network:
    external: true
  bridge:
    driver: bridge

volumes:
  arifos_data:
