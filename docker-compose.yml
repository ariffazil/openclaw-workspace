# ── arifOS AI-First Unified Trinity Stack ──────────────────────────
# Replaces fragmented networks and deprecated GUI abstractions.
# All components run on the 'arifos_trinity' network.
# Traefik acts as the dynamic edge router.
# ─────────────────────────────────────────────────────────────────

services:
  # --- Edge Router ---
  traefik:
    image: traefik:v3.6.9
    container_name: traefik_router
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=ariffazil@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    environment:
      - DOCKER_API_VERSION=1.44
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/arifos/traefik/acme.json:/letsencrypt/acme.json
    networks:
      - arifos_trinity
    restart: unless-stopped

  # --- Internal Memory Layers ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_memory
    volumes:
      - /opt/arifos/data/qdrant:/qdrant/storage
    networks:
      - arifos_trinity
    restart: unless-stopped

  # postgres + redis managed by docker-compose.phase1.yml (arifos-postgres, arifos-redis)

  # --- LLM Engine ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_engine
    volumes:
      - /opt/arifos/data/ollama:/root/.ollama
    networks:
      - arifos_trinity
    restart: unless-stopped

  # --- Gateways & Reasoning ---
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw_gateway
    volumes:
      - /opt/arifos/data/openclaw:/home/node/.openclaw
      - /srv/arifOS:/mnt/arifos:rw
      - /opt/arifos/APEX-THEORY:/mnt/apex:rw
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-8eb24ba06e138bf7affe6f128fdecc2e80a9290d107d83585540ae6ba541ae54}
      - OLLAMA_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379
    networks:
      - arifos_trinity
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw.rule=Host(`claw.arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
      - "traefik.docker.network=arifos_arifos_trinity"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18789/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: agent_zero_reasoner
    volumes:
      - /opt/arifos/data/agent_zero:/app/work_dir
      - /srv/arifOS:/mnt/arifos:rw
      - /opt/arifos/APEX-THEORY:/mnt/apex:rw
    # env_file:
    #   - /opt/arifos/XXX/.env.master
    environment:
      - OPENCLAW_URL=http://openclaw:18789
    networks:
      - arifos_trinity
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent-zero.rule=Host(`brain.arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.agent-zero.entrypoints=websecure"
      - "traefik.http.routers.agent-zero.tls.certresolver=letsencrypt"
      - "traefik.http.services.agent-zero.loadbalancer.server.port=80"
    restart: unless-stopped

  # --- Constitutional Kernel ---
  arifosmcp:
    build: .
    image: arifos/arifosmcp:latest
    container_name: arifosmcp_server
    env_file:
      - path: .env.docker
        required: false
    volumes:
      - /opt/arifos/data/core:/usr/src/app/data
      - /srv/arifOS/aaa_mcp/server.py:/usr/src/app/aaa_mcp/server.py:ro
      - /srv/arifOS/core/kernel/constitutional_decorator.py:/usr/src/app/core/kernel/constitutional_decorator.py:ro
      - /srv/arifOS/333_APPS/constitutional-visualizer/dist-web:/usr/src/app/333_APPS/constitutional-visualizer/dist-web:ro
      - ./333_APPS/constitutional-visualizer/dist:/usr/src/app/static/dashboard:ro
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      OPENCLAW_URL: http://openclaw:18789
      AGENT_ZERO_URL: http://agent-zero:80
      DASHBOARD_ENABLED: "true"
    networks:
      - arifos_trinity
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.arifosmcp.rule=Host(`arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.arifosmcp.entrypoints=websecure"
      - "traefik.http.routers.arifosmcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.arifosmcp.loadbalancer.server.port=8080"
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=arifosmcp"
    restart: unless-stopped

  # --- Monitoring Stack ---
  prometheus:
    image: prom/prometheus:latest
    container_name: arifos_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - /srv/arifOS/deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/arifos/data/prometheus:/prometheus
    networks:
      - arifos_trinity
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: arifos_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-arifos_grafana}
      GF_SERVER_ROOT_URL: https://monitor.arifosmcp.arif-fazil.com
      GF_SERVER_DOMAIN: monitor.arifosmcp.arif-fazil.com
    volumes:
      - /opt/arifos/data/grafana:/var/lib/grafana
      - /srv/arifOS/deployment/grafana/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - /srv/arifOS/deployment/grafana/dashboards/arifos.yaml:/etc/grafana/provisioning/dashboards/arifos.yaml:ro
    networks:
      - arifos_trinity
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`monitor.arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    restart: unless-stopped

  # --- Workflow Automation ---
  n8n:
    image: n8nio/n8n:latest
    container_name: arifos_n8n
    environment:
      N8N_HOST: flow.arifosmcp.arif-fazil.com
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://flow.arifosmcp.arif-fazil.com/
      N8N_EDITOR_BASE_URL: https://flow.arifosmcp.arif-fazil.com/
      GENERIC_TIMEZONE: Asia/Kuala_Lumpur
    volumes:
      - /opt/arifos/data/n8n:/home/node/.n8n
    networks:
      - arifos_trinity
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`flow.arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    restart: unless-stopped

  # --- Autonomous CI/CD ---
  webhook-listener:
    image: almir/webhook:latest
    container_name: arifos_webhook
    volumes:
      - /srv/arifOS:/usr/src/app:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/arifOS/deployment/hooks.json:/etc/webhook/hooks.json:ro
      - /srv/arifOS/deployment/deploy_from_git.sh:/var/scripts/deploy_from_git.sh:ro
    command: -verbose -hooks=/etc/webhook/hooks.json -hotreload
    networks:
      - arifos_trinity
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webhook.rule=Host(`hook.arifosmcp.arif-fazil.com`)"
      - "traefik.http.routers.webhook.entrypoints=websecure"
      - "traefik.http.routers.webhook.tls.certresolver=letsencrypt"
      - "traefik.http.services.webhook.loadbalancer.server.port=9000"
    restart: unless-stopped

networks:
  arifos_trinity:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.10.0/24
