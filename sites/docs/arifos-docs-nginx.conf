# arifOS Docs Site — Nginx Configuration
# Domain:   arifos.arif-fazil.com
# Path:     /  (baseUrl)
# VPS:      72.62.71.199 (Hostinger)
# Cloudflare: Proxied (Orange cloud — Flexible SSL mode)
#
# ─── DEPLOY INSTRUCTIONS (888_HOLD: review before running) ──────────────────
#
# Step 1: Copy build to web-readable path
#   sudo mkdir -p /var/www/arifos-docs
#   sudo rsync -av /root/arifOS/sites/docs/build/ /var/www/arifos-docs/
#   sudo chown -R www-data:www-data /var/www/arifos-docs
#
# Step 2: Install this config
#   sudo cp arifos-docs-nginx.conf /etc/nginx/sites-available/arifos-docs
#   sudo ln -sf /etc/nginx/sites-available/arifos-docs /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Step 3: Obtain TLS certificate (if not already present for this domain)
#   sudo certbot --nginx -d arifos.arif-fazil.com
#
# ─── TOPOLOGY ───────────────────────────────────────────────────────────────
#
#   arifos.arif-fazil.com/         → static Docusaurus build (this config)
#   arifosmcp.arif-fazil.com/      → MCP server (separate config, port 8888/8889)
#
# ────────────────────────────────────────────────────────────────────────────

# ── HTTP: redirect all traffic to HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name arifos.arif-fazil.com;

    # Certbot ACME challenge (needed for certificate renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ── HTTPS: Docs site ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name arifos.arif-fazil.com;

    # ── TLS (Certbot-managed) ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/arifos.arif-fazil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arifos.arif-fazil.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                                always;
    add_header X-Content-Type-Options     "nosniff"                                   always;
    add_header X-XSS-Protection           "1; mode=block"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"           always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript text/markdown
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Static file root ─────────────────────────────────────────────────
    # This is the Docusaurus build/ output directory.
    # All pages are pre-rendered HTML — no backend required.
    root /var/www/arifos-docs;

    # ── Docs site: / ─────────────────────────────────────────────────────
    # Docusaurus generates /intro.html, /mcp-server.html etc.
    # Nginx tries $uri, then $uri.html, then $uri/index.html.
    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }
    
    # 🔐 STRICT SECURITY: ratify.html handles sovereign private keys
    # Stricter CSP to prevent any external connections during key operations
    location = /ratify.html {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        try_files $uri =404;
    }

    # ── Immutable hashed assets (JS/CSS bundles) ─────────────────────────
    # Docusaurus adds content hashes to asset filenames — safe to cache forever.
    location ~* /assets/ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── Static files (images, favicon, robots, llms.txt, sitemap) ───────
    location ~* \.(ico|svg|png|jpg|jpeg|gif|woff|woff2|ttf|eot)$ {
        expires     30d;
        add_header  Cache-Control "public";
        access_log  off;
    }

    # ── robots.txt and llms.txt — no cache so crawlers get fresh policy ──
    location ~ ^/(robots\.txt|llms\.txt|llms\.json|sitemap\.xml)$ {
        expires     1h;
        add_header  Cache-Control "public";
    }

    # ── 404 fallback ─────────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Access & error logs ───────────────────────────────────────────────
    access_log  /var/log/nginx/arifos-docs-access.log;
    error_log   /var/log/nginx/arifos-docs-error.log  warn;
}
