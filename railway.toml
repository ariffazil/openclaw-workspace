# Railway Configuration for arifOS MCP Server (v55.3)
# Location: PROJECT ROOT
# Domain: aaamcp.arif-fazil.com

[build]
builder = "DOCKERFILE"
# Dockerfile is at project root (./Dockerfile)

[deploy]
startCommand = "python start_server.py"
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
numReplicas = 1

[deploy.env]
ARIFOS_ENV = "production"
ARIFOS_VERSION = "v55.3-AAA-MCP"
ARIFOS_LOG_LEVEL = "INFO"
ARIFOS_CLUSTER = "3"
AAA_MCP_TRANSPORT = "sse"
HOST = "0.0.0.0"
# PORT is set dynamically by Railway - do not hardcode
