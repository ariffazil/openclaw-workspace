[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m aaa_mcp.rest"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[variables]
# Core server settings
PORT = "8080"
HOST = "0.0.0.0"
PYTHONUNBUFFERED = "1"

# arifOS governance
ARIFOS_ENV = "production"
GOVERNANCE_MODE = "HARD"
VAULT_BACKEND = "postgres"
AAA_MCP_TRANSPORT = "sse"
LOG_LEVEL = "info"

# Railway deployment timestamp (forces cache bust)
DEPLOY_TS = "2026-02-14T06-16"

# API keys (set these in Railway dashboard for security)
# BRAVE_API_KEY = "${{BRAVE_API_KEY}}"
# BROWSERBASE_API_KEY = "${{BROWSERBASE_API_KEY}}"

# Database and Redis URLs are auto-injected by Railway plugins
# DATABASE_URL = "${{POSTGRES_URL}}"
# REDIS_URL = "${{REDIS_URL}}"
