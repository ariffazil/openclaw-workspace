# =============================================================================
# arifOS MCP Server - Deployment using existing image
# Connects to existing Phase 1 infrastructure (Postgres + Redis)
# =============================================================================

services:
  arifosmcp:
    image: arifos/mcp-server:latest
    container_name: arifosmcp_server
    restart: unless-stopped
    
    env_file:
      - .env
    
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      PORT: 8080
      HOST: 0.0.0.0
      # Database connections - use container names from Phase 1
      POSTGRES_HOST: arifos-postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: arifos-redis
      REDIS_PORT: 6379
      # Disable Qdrant/Ollama for now (not deployed)
      QDRANT_URL: 
      OLLAMA_URL: 
      # Constitutional governance
      ARIFOS_F1_AMANAH_ENABLED: true
      ARIFOS_888_HOLD_ENABLED: true
    
    volumes:
      - /opt/arifos/data/core:/usr/src/app/data
      - /srv/arifOS/VAULT999:/usr/src/app/VAULT999:rw
    
    ports:
      - 127.0.0.1:8080:8080
    
    networks:
      - arifos-internal
    
    healthcheck:
      test: [CMD, curl, -f, http://localhost:8080/health]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: 3

networks:
  arifos-internal:
    external: true
    name: arifos_arifos-internal
