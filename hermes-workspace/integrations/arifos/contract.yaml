  - AAA performs inner work from 000 through 777 only.
  - arifOS owns 888 JUDGE and 999 SEAL for high-stakes operations.
  - VAULT999 is the only final ledger for sealed critical actions.
  - If VAULT999 has no seal reference, AAA must treat the action as HOLD.

