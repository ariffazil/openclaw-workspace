version: 1

hosts:
  - id: openclaw-gateway
    name: OpenClaw Gateway
    version: "1"
    runtime_type: custom
    transport: http
    config_paths:
      - openclaw/gateway
      - openclaw/exports
    contract_path: contracts/hosts/contracts.yaml
    install_method: generated-config
    supported_protocols:
      - mcp
      - a2a
    permission_profiles:
      - id: strict
        default: true
        approval_policy: hold

  - id: claude-code
    name: Claude Code
    version: "1"
    runtime_type: acp
    transport: stdio
    config_paths:
      - .claude
      - openclaw/acp
    contract_path: contracts/hosts/contracts.yaml
    install_method: acp-session-template
    supported_protocols:
      - mcp
      - a2a
    permission_profiles:
      - id: default
        default: true
        approval_policy: on-demand

  - id: cursor
    name: Cursor
