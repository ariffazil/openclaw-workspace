# v52.0.0: Unified Core SEAL - Merged AAA_MCP into Brain, Pure Bridge (2026-01-24)
# v51.0.0: AAA MCP SERVER - Bridge to Core Engines + Rebrand (2026-01-24)
# v50.0.0: Constitutional Housekeeping - Consolidated core (2026-01-20)
# v49.0.0: Constitutional Forge - 13 Floors, Trinity Engines, 25 MCP Servers (2026-01-18)
