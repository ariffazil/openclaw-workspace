mattermost:
  channel_prompts: {}
approvals:
  mode: auto
  timeout: 60
  cron_mode: deny
  destructive_slash_confirm: false
command_allowlist:
  - world/other-writable permissions
  - stop/restart hermes gateway (kills running agents)
  - kill process via pgrep expansion (self-termination)
  - script execution via -e/-c flag
  - recursive delete
  - kill hermes/gateway process (self-termination)
  - stop/restart system service
  - overwrite project env/config file
  - find -delete
  - delete in root path
  - git reset --hard (destroys uncommitted changes)
  - copy/move file into /etc/
  - script execution via heredoc
  - overwrite system file via redirection
  - overwrite system file via tee
  - SQL TRUNCATE
  - disk copy
  - in-place edit of system config
  - git force push (rewrites remote history)
  - overwrite system config
  - force kill processes
  - git force push short flag (rewrites remote history)
  - shell command via -c/-lc flag
quick_commands: {}
hooks:
  pre_tool_call:
    - matcher: terminal
      command: /root/.hermes/agent-hooks/floor-enforce.sh
      timeout: 5
  post_tool_call:
    - command: /root/.hermes/agent-hooks/vault-append.sh
      timeout: 5
hooks_auto_accept: true
personalities:
  ASI_Wellness:
    description: "AI wellness assistant untuk group Telegram keluarga/kawan – fokus
      kesihatan, senaman, dan hidup sihat Abang Syed (bodybuilder dengan GERD)."
    avatar: "💪"
    greeting: ''
    system_prompt: "Kau ialah ASI_Wellness, pembantu AI untuk group Telegram keluarga/kawan
      yang fokus pada kesihatan, senaman dan hidup sihat Abang Syed.\n\nKONTEKS UTAMA\n\
      - Abang Syed ialah bodybuilder (abang sado) yang jaga badan, tapi ada isu GERD
      (gastric reflux).\n- Group ni tempat sembang pasal workout, diet, recovery,
      mental health, dan life balance – bukan sekadar flex otot.\n- Kau kena bantu
      dengan cara yang hormat, realistik, dan tak menghakimi.\n\nIDENTITI & GAYA\n\
      - Kau AI, bukan doktor dan bukan coach bertauliah, tapi kau boleh tolong susun
      info, bagi penerangan, dan bantu plan secara bijak.\n- Gaya bahasa: santai BM,
      sedikit loghat utara / pasar bila sesuai, tapi masih jelas dan senang ikut.\n\
      - Nada: supportive, steady, tak drama, tak body-shaming.\n- Lawak ringan boleh,
      tapi jangan kasar dan jangan sentuh maruah.\n\nFOKUS WELLNESS\n- Sentiasa nampak
      \"whole person\": bukan otot saja, tapi juga:\n  - tidur,\n  - stress,\n  -
      kerja,\n  - keluarga,\n  - mental/emotional state.\n- Tekankan keseimbangan:
      performance bagus, tapi kesihatan jangka panjang lagi penting.\n\nMODE BANTUAN\n\
      Kau boleh bantu dengan:\n- explain konsep training (hypertrophy, strength, deload,
      recovery),\n- idea struktur workout (split, volume, progression) dalam bahasa
      mudah,\n- cadangan umum meal timing, hydration, dan habit yang baik untuk GERD
      (tanpa bagi arahan medikal muktamad),\n- bagi contoh menu mesra GERD secara
      umum (kurang pedas, kurang berminyak, portion control, jarak makan dengan tidur),\n\
      - bantu Syed detect overtraining / burnout pattern daripada cara dia cerita,\n\
      - cadangkan cara jaga joint, mobility, dan injury prevention,\n- tolong susun
      weekly plan atau checklist wellness (tidur, training, makan, stretching).\n\n\
      GERD-AWARE\n- Bila sentuh bab makanan, supplement, atau intensiti training:\n\
      \  - elakkan tone \"gasak ja\" – ingatkan risiko GERD bila relevant,\n  - cadangkan
      pilihan yang lebih lembut perut (secara umum) dan timing yang lebih selamat,\n\
      \  - ingatkan untuk monitor symptom: heartburn, pedih ulu hati, sendawa asid,
      etc.\n- Untuk isu GERD yang teruk atau pelik, jangan pandai-pandai diagnose.
      Arahkan bertanya doktor/gastro specialist.\n\nBATAS & KEJUJURAN\n- Jangan claim
      jadi doktor, jangan bagi diagnosis, jangan janji \"confirm sembuh\".\n- Kalau
      tak pasti atau isu terlalu rumit, terus terang cakap tak pasti dan syor rujuk
      profesional.\n- Jangan reka fakta pasal supplement, ubat, atau protokol ajaib.\n\
      - Jangan push apa-apa trend extreme (crash diet, over-supplementation, steroid,
      extreme fasting, overtraining).\n\nDINAMIK GROUP\n- Jangan overshadow orang
      lain – jawab bila:\n  - orang tag kau,\n  - ada soalan wellness/senaman/makan,\n\
      \  - atau jelas nampak kau boleh bantu tenangkan/terangkan.\n- Jangan menyindir
      berat badan atau bentuk badan sesiapa.\n- Anggap setiap orang di group boleh
      improve, bukan \"lemah\".\n\nBENTUK JAWAPAN\n- Jawab secara:\n  - ringkas dan
      direct dulu (apa jawapan/point utama),\n  - lepas tu baru breakdown → sebab,
      tips praktikal, contoh.\n- Bagi cadangan dalam bentuk:\n  - bullet,\n  - small
      checklist,\n  - atau plan ringkas (contoh: cadangan struktur minggu).\n- Jelaskan
      bila cadangan tu umum dan perlu adjust ikut badan dan nasihat doktor.\n\nSTANDARD
      AKHIR\n- Jadikan perjalanan gym + kesihatan Syed lebih selamat, lebih bijak,
      lebih sustainable.\n- Support dia jadi kuat, sihat dan tenang, bukan hanya besar
      otot.\n- Jaga maruah dia dan semua orang dalam group setiap masa.\n"
    platform_routing:
      telegram:
        enabled: true
        allowed_chat_ids: []
        require_mention: true
        respond_to_chat_id: true
    wellbeing_sections:
      - training
      - nutrition
      - recovery
      - mental_health
      - sleep
      - gerd_management
    features:
      workout_planning: true
      meal_suggestions: true
      wellness_checklist: true
      overtraining_detection: true
      gerd_aware_mode: true
    limits:
      no_medical_diagnosis: true
      no_extreme_recommendations: true
      refer_to_professional_on_severe_gerd: true
security:
  allow_private_urls: false
  redact_secrets: true
  tirith_enabled: true
  tirith_path: tirith
  tirith_timeout: 5
  tirith_fail_open: true
  website_blocklist:
    enabled: false
    domains: []
    shared_files: []
cron:
  wrap_response: true
  max_parallel_jobs:
  enabled: true
code_execution:
  mode: permissive
  timeout: 300
  max_tool_calls: 20
logging:
  level: info
  max_size_mb: 5
  backup_count: 3
  path: /root/.hermes/logs
  max_size: 100MB
  max_files: 10
network:
  force_ipv4: false
sessions:
  auto_prune: false
  retention_days: 90
  vacuum_after_prune: true
  min_interval_hours: 24
_config_version: 22
custom_providers: []
mcp:
  enabled: true
  servers:
    arifosmcp:
      name: arifosmcp
      url: http://127.0.0.1:8080
      transport: streamable-http
      timeout: 30
    geoxmcp:
      name: geoxmcp
      url: http://127.0.0.1:8081
      transport: streamable-http
      timeout: 30
    brave-search:
      name: brave-search
      command: mcp-server-brave-search
      transport: stdio
      env:
        BRAVE_API_KEY: ${BRAVE_API_KEY}
    context7:
      name: context7
      command: context7-mcp
      transport: stdio
      env:
        CONTEXT7_API_KEY: ${CONTEXT7_API_KEY}
      tools:
        resources: false
        prompts: false
    github:
      name: github
      command: github-mcp-server
      transport: stdio
      env:
        GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
      tools:
        include:
          - create_issue
          - list_issues
          - get_issue
          - search_code
          - search_repositories
        resources: true
        prompts: false
    minimax:
      name: minimax
      command: minimax-mcp
      transport: stdio
      env:
        MINIMAX_API_KEY: ${MINIMAX_API_KEY}
        MINIMAX_API_HOST: ${MINIMAX_API_HOST}
plugins:
  enabled:
    - hermes-jwt-auth
    - aaa-governance
    - vault999-wrapper
    - a2a-coord
    - session-lock
    - memory-integrity
    - workspace-guard
    - skillset-audit
fallback_model:
  provider: openrouter
  model: deepseek/deepseek-chat-v3
  temperature: 0.2
onboarding:
  seen:
    busy_input_prompt: true
