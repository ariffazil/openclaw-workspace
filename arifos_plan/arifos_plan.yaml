name: arifos_plan
type: mega-tool
authority: 888_JUDGE
pipeline_stage: "222"  # New stage: PLAN — between SENSE and MIND
description: >
  Constitutional Planning Organ. Manages INTENT → PLAN → EXECUTION for all
  external state mutations. All plans emit CLAIM_ONLY. 888_JUDGE must ratify
  before EXECUTION. Hardens existing kernel/planner.py into a governed organ.

modes:
  propose_plan:
    description: Create SovereignIntent + Plan from intent description
    input:
      - description: string
      - tasks: array of task objects
      - risk_band: LOW | MEDIUM | HIGH | CRITICAL
      - irreversible: boolean
      - epoch_id: string
      - created_by: string
    output:
      - plan_id: string
      - intent_id: string
      - status: DRAFT | PENDING_APPROVAL | APPROVED
      - hold_reason: string (if 888_HOLD triggered)

  get_plan:
    description: Fetch plan by ID with latest receipt
    input:
      - plan_id: string
    output:
      - plan: Plan object
      - receipt: PlanReceipt or null

  list_pending:
    description: List all plans awaiting sovereign approval
    input:
      - epoch_id: string (optional filter)
    output:
      - count: integer
      - plans: array of Plan objects

  update_status:
    description: Transition plan with sovereign decision (PlanReceipt)
    input:
      - plan_id: string
      - decision: APPROVED | REJECTED | HOLD
      - decided_by: string
      - notes: string
      - floor_signatures: array
    output:
      - plan: updated Plan object
      - receipt: PlanReceipt

  abort_plan:
    description: Transition plan to ABORTED
    input:
      - plan_id: string
      - reason: string
      - aborted_by: string
    output:
      - plan: updated Plan object
      - receipt: PlanReceipt

floors:
  - F1: AMANAH — irreversibility check triggers 888_HOLD
  - F11: AUDIT — all state transitions logged
  - F13: SOVEREIGN — human approval required for HIGH/CRITICAL plans

risk_tier: P0
constitutional_hash: "<auto-generated>"
sealed_date: "2026-04-23"
