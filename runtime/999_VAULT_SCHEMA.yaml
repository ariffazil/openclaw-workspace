# 999_VAULT_SCHEMA.yaml — Immutable Ledger Definition
# Authority: 888_JUDGE

schema:
  entry:
    id: "UUID-v4"
    timestamp: "ISO8601"
    actor_hash: "SHA256"
    verdict: ["SEAL", "VOID", "HOLD", "SABAR"]
    trace:
      input_entropy: float
      output_entropy: float
      delta_s: float
    governance:
      floor_scores: map[string]float
      witness_signatures: list[string]
      g_index: float
    zkpc_proof: "MerkleReceipt"

storage:
  primary: "VAULT999/ledger.jsonl"
  backup: "blockchain/trace_hashes"
  retention: "PERMANENT"
