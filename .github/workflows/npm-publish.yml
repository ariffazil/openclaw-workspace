name: Publish @arifos/mcp to npm

on:
  push:
    branches:
      - main
    paths:
      - 'packages/npm/arifos-mcp/**'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        working-directory: packages/npm/arifos-mcp
        run: pnpm install

      - name: Build
        working-directory: packages/npm/arifos-mcp
        run: pnpm run build

      - name: Test
        working-directory: packages/npm/arifos-mcp
        run: pnpm test
        env:
          SKIP_INTEGRATION_TESTS: 'true'

      - name: Publish to npm (@next)
        working-directory: packages/npm/arifos-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: npm publish --tag next --access public
