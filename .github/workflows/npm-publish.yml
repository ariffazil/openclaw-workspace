name: Publish @arifos/mcp to npm

on:
  push:
    branches:
      - main
    paths:
      - 'npm/arifos-mcp/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (latest or next)'
        required: false
        default: 'latest'

permissions:
  contents: read
  id-token: write  # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        working-directory: npm/arifos-mcp
        run: pnpm install

      - name: Build
        working-directory: npm/arifos-mcp
        run: pnpm run build

      - name: Test
        working-directory: npm/arifos-mcp
        run: pnpm test
        env:
          SKIP_INTEGRATION_TESTS: 'true'

      - name: Publish to npm
        working-directory: npm/arifos-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag ${{ github.event.inputs.tag || 'latest' }} --provenance
