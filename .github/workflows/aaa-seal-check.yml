name: arifOS — AAA Seal Integrity Check

# Verifies the AAA folder structural integrity and constitutional invariants.
# Runs daily + on push. Never mutates the repo.
# F1 Amanah: read-only, no side effects.

on:
  push:
    branches: [main, aaa-mcp-induction]
    paths:
      - 'AAA/**'
  schedule:
    - cron: '0 1 * * *'   # Daily 01:00 UTC (09:00 MYT)
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: AAA

jobs:
  seal-check:
    name: AAA Seal Integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: AAA/pyproject.toml

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || \
            pip install fastmcp pydantic pytest pytest-asyncio

      - name: Verify entrypoint structure
        run: |
          echo "=== Entrypoint Verification ==="
          python -c "
          import sys
          files = [
              'arifosmcp/runtime/server.py',
              'arifosmcp/runtime/__main__.py',
              'core/pipeline.py',
              'core/kernel/__init__.py',
              'Dockerfile',
              'docker-compose.yml',
              'fastmcp.json',
              'pyproject.toml',
          ]
          import os
          ok = True
          for f in files:
              if os.path.exists(f):
                  print(f'✅ {f}')
              else:
                  print(f'❌ MISSING: {f}')
                  ok = False
          sys.exit(0 if ok else 1)
          "

      - name: Verify 13 floors are referenced
        run: |
          python -c "
          import os, re
          floors_path = 'AAA/arifosmcp/metadata/floor_status.json' if not os.path.exists('arifosmcp/metadata/floor_status.json') else 'arifosmcp/metadata/floor_status.json'
          try:
              import json
              with open(floors_path) as f:
                  data = json.load(f)
              print(f'Floor status found: {floors_path}')
          except:
              # Check floors in shared/floors.py
              fp = 'core/shared/floors.py'
              if os.path.exists(fp):
                  content = open(fp).read()
                  count = len(re.findall(r'F\d{1,2}', content))
                  print(f'Floor references in floors.py: {count}')
              else:
                  print('⚠️ floor_status.json not found — check deployment')
          " 2>/dev/null || echo "⚠️ Floor check skipped (deps)"
        env:
          ARIFOS_PHYSICS_DISABLED: "1"
          ARIFOS_ALLOW_LEGACY_SPEC: "1"

      - name: Run import smoke test
        run: |
          python -c "
          import os
          os.environ['ARIFOS_PHYSICS_DISABLED'] = '1'
          os.environ['ARIFOS_ALLOW_LEGACY_SPEC'] = '1'
          try:
              import arifosmcp.runtime.server
              print('✅ arifosmcp.runtime.server imports clean')
          except Exception as e:
              print(f'⚠️ Import warning: {e}')
          " 2>/dev/null || echo "⚠️ Import test skipped (optional deps missing)"

      - name: Verify no secrets in tracked compose files
        run: |
          FOUND=0
          for f in docker-compose.yml docker-compose.*.yml; do
            [ -f "$f" ] || continue
            if grep -nE "hf_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,}|:[0-9]{10}:[A-Za-z0-9_-]{35}" "$f" 2>/dev/null; then
              echo "🚨 888 HOLD — Hardcoded secret in $f"
              FOUND=1
            fi
          done
          [ $FOUND -eq 0 ] || exit 1
          echo "✅ No hardcoded secrets in compose files"

      - name: Seal report
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "arifOS AAA Seal Check"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA:    ${{ github.sha }}"
          echo "Time:   $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "DITEMPA BUKAN DIBERI"
