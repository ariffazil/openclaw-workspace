# arifOS AAA MCP SEAL Check
# 
# Validates constitutional governance on every push and PR.
# Only passes if Trinity E2E flow and schema validation succeed.
#
# Thermodynamic Assertions:
# - F4 Clarity: ΔS ≤ 0
# - F5 Peace: peace² ≥ 1.0
# - F7 Humility: confidence < 1.0

name: AAA SEAL Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'MCP Endpoint to test'
        required: true
        default: 'https://arifosmcp.arif-fazil.com/mcp'

jobs:
  seal-check:
    name: Trinity E2E + Schema Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx
      
      - name: Run SEAL harness
        id: seal
        run: |
          ENDPOINT="${{ github.event.inputs.endpoint || 'https://arifosmcp.arif-fazil.com/mcp' }}"
          echo "Testing endpoint: $ENDPOINT"
          
          python -m tests.seal_harness \
            --endpoint "$ENDPOINT" \
            --out seal-report-ci.json \
            --schema-snapshot aaa-schema-snapshot.json
        
      - name: Upload SEAL report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seal-report
          path: seal-report-ci.json
      
      - name: Check SEAL status
        if: always()
        run: |
          if [ -f seal-report-ci.json ]; then
            VERDICT=$(python3 -c "import json; print(json.load(open('seal-report-ci.json')).get('verdict', 'FAIL'))")
            echo "SEAL Verdict: $VERDICT"
            
            # Print summary
            echo ""
            echo "=== Trinity Results ==="
            python3 -c "
import json
r = json.load(open('seal-report-ci.json'))
t = r.get('trinity', {})
for k, v in t.items():
    status = '✓' if v.get('ok') else '✗'
    print(f'{status} {k}: {v.get(\"verdict\", \"N/A\")}')"
            
            echo ""
            echo "=== Thermodynamic ==="
            python3 -c "
import json
r = json.load(open('seal-report-ci.json'))
t = r.get('thermodynamic_summary', {})
print(f'dS: {t.get(\"avg_dS\", \"N/A\")}')
print(f'peace²: {t.get(\"min_peace2\", \"N/A\")}')"
            
            if [ "$VERDICT" != "PASS" ]; then
              echo ""
              echo "❌ SEAL check FAILED"
              exit 1
            fi
          else
            echo "❌ No report generated"
            exit 1
          fi

  seal-tag-check:
    name: Verify SEAL Tag Policy
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-aaa-seal.')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify tag matches SEAL requirements
        run: |
          echo "🛡️ Verifying SEAL tag: ${{ github.ref_name }}"
          echo ""
          echo "This tag indicates the code has passed G-AAA-SEAL-01 validation."
          echo "CI must have passed on the commit being tagged."
          
          # Verify the commit has CI passing (this is manual for now)
          echo "✅ Tag format valid"
