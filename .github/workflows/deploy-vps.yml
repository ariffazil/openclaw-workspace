name: Deploy arifOS to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

env:
  VPS_PATH: /srv/arifOS
  SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
  TARGET_HOST: ${{ secrets.VPS_TAILSCALE_IP || secrets.VPS_HOST }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

    - name: Connect GitHub runner to Tailscale (optional)
      uses: tailscale/github-action@v3
      with:
        authkey: ${{ secrets.TS_AUTHKEY }}
        hostname: gha-arifos-deploy

    - name: Add VPS to known_hosts
      run: |
        mkdir -p ~/.ssh
        echo "🔎 Checking SSH reachability to ${TARGET_HOST}:${SSH_PORT}"
        if ! timeout 12 bash -c "</dev/tcp/${TARGET_HOST}/${SSH_PORT}" 2>/dev/null; then
          echo "❌ Cannot reach ${TARGET_HOST}:${SSH_PORT} from GitHub runner"
          echo "Check VPS firewall/security-group, public IP, and SSH port"
          echo "If using Tailscale, set TS_AUTHKEY + VPS_TAILSCALE_IP secrets"
          exit 1
        fi
        ssh-keyscan -p ${SSH_PORT} -H ${TARGET_HOST} >> ~/.ssh/known_hosts

    - name: Deploy to VPS
      run: |
        echo "🚀 Deploying arifOS to VPS..."
        ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "bash /opt/arifOS/deploy.sh"
      timeout-minutes: 35

    - name: Wait for services
      run: sleep 10

    - name: Health Check - Phase 1
      run: |
        echo "🏥 Checking Phase 1 services..."
        # Check Postgres
        if ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "sudo docker exec arifos-postgres pg_isready -U arifos_admin -d arifos_vault" > /dev/null 2>&1; then
          echo "✅ PostgreSQL is healthy"
        else
          echo "⚠️ PostgreSQL may still be starting..."
        fi
        
        # Check Redis
        if ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "sudo docker exec arifos-redis redis-cli ping" > /dev/null 2>&1; then
          echo "✅ Redis is healthy"
        else
          echo "⚠️ Redis may still be starting..."
        fi

    - name: Health Check - Phase 2
      run: |
        echo "🏥 Checking arifOS MCP server..."
        MAX_RETRIES=15
        RETRY=0
        while [ $RETRY -lt $MAX_RETRIES ]; do
          if ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "curl -fsS http://127.0.0.1:8080/health" > /dev/null 2>&1; then
            echo "✅ arifOS MCP server is healthy!"
            exit 0
          fi
          RETRY=$((RETRY + 1))
          echo "⏳ Retry $RETRY/$MAX_RETRIES..."
          sleep 5
        done
        echo "❌ Health check failed"
        exit 1
      timeout-minutes: 3

    - name: Verify Deployment
      run: |
        echo "🔍 Deployment verification..."
        ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "sudo docker ps --format 'table {{.Names}}\t{{.Status}}'"

    - name: Deployment Summary
      if: success()
      run: |
        echo "✨ Deployment Successful!"
        echo "   VPS: ${TARGET_HOST}"
        echo "   Endpoints:"
        echo "     - Health: http://${TARGET_HOST}:8080/health"
        echo "     - SSE: http://${TARGET_HOST}:8080/sse"
        echo "   PostgreSQL: 127.0.0.1:5432"
        echo "   Redis: 127.0.0.1:6379"

    - name: Notify on Failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "sudo docker ps -a" || true
        ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "sudo docker logs arifosmcp_server --tail 50" || true
        exit 1
