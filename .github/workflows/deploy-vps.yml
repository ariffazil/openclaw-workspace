name: Deploy arifOS to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

env:
  VPS_PATH: /srv/arifosmcp
  SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
  TARGET_HOST: ${{ secrets.VPS_TAILSCALE_IP || secrets.VPS_HOST }}

jobs:
  selftest:
    name: Constitutional Self-Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -r requirements.txt

      - name: Run self-test
        run: pytest tests/test_e2e.py -v
        env:
          GOVERNANCE_MODE: HARD
          ARIFOS_PHYSICS_DISABLED: "0"
          ARIFOS_ALLOW_LEGACY_SPEC: "1"

  deploy:
    name: Rebuild and Deploy to VPS
    needs: selftest
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

    - name: Connect GitHub runner to Tailscale (optional)
      if: secrets.TS_AUTHKEY != ''
      uses: tailscale/github-action@v3
      with:
        authkey: ${{ secrets.TS_AUTHKEY }}
        hostname: gha-arifos-deploy

    - name: Add VPS to known_hosts
      run: |
        mkdir -p ~/.ssh
        echo "🔎 Checking SSH reachability to ${TARGET_HOST}:${SSH_PORT}"
        if ! timeout 15 bash -c "</dev/tcp/${TARGET_HOST}/${SSH_PORT}" 2>/dev/null; then
          echo "❌ Cannot reach ${TARGET_HOST}:${SSH_PORT} from GitHub runner"
          echo "Check VPS firewall, IP, and SSH port"
          exit 1
        fi
        ssh-keyscan -p ${SSH_PORT} -H ${TARGET_HOST} >> ~/.ssh/known_hosts

    - name: Deploy to VPS
      run: |
        echo "🚀 Starting VPS rebuild and deployment..."
        ssh -o ConnectTimeout=15 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "
          set -e
          cd '${VPS_PATH}'
          
          echo '📥 Syncing code from GitHub...'
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          
          echo '🧾 Regenerating public specs from runtime registry...'
          python scripts/generate_public_specs.py

          echo '🔐 Verifying governance secret configuration...'
          python scripts/verify-secrets.py
          
          echo '🧹 Cleaning up old Docker artifacts...'
          sudo docker system prune -f
          
          echo '🏗️ Rebuilding and restarting arifosmcp container...'
          # Use sudo for docker compose to ensure permissions
          sudo docker compose --env-file .env.docker -f docker-compose.yml up -d --build arifosmcp
        "
      timeout-minutes: 35

    - name: Wait for services
      run: sleep 15

    - name: Health Check - Phase 1 (Core Services)
      run: |
        echo "🏥 Checking Phase 1 services (Postgres & Redis)..."
        ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "
          if sudo docker exec arifos_postgres pg_isready -U arifos_admin -d arifos_vault > /dev/null 2>&1; then
            echo '✅ PostgreSQL is healthy'
          else
            echo '⚠️ PostgreSQL check failed'
          fi
          
          if sudo docker exec arifos_redis redis-cli ping | grep -q PONG; then
            echo '✅ Redis is healthy'
          else
            echo '⚠️ Redis check failed'
          fi
        "

    - name: Health Check - Phase 2 (MCP Server)
      run: |
        echo "🏥 Checking arifOS MCP server via internal container health..."
        MAX_RETRIES=15
        RETRY=0
        while [ $RETRY -lt $MAX_RETRIES ]; do
          # We check the health internal to the container to bypass Traefik/Host port issues
          if ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "sudo docker exec arifosmcp_server curl -fsS http://localhost:8080/health" > /dev/null 2>&1; then
            echo "✅ arifOS MCP server is healthy!"
            exit 0
          fi
          RETRY=$((RETRY + 1))
          echo "⏳ Retry $RETRY/$MAX_RETRIES..."
          sleep 5
        done
        echo "❌ Health check failed"
        exit 1
      timeout-minutes: 5

    - name: Verify Deployment
      run: |
        echo "🔍 Deployment verification..."
        ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"

    - name: Deployment Summary
      if: success()
      run: |
        echo "✨ Deployment Successful!"
        echo "   VPS: ${TARGET_HOST}"
        echo "   Endpoints:"
        echo "     - Health: https://arifosmcp.arif-fazil.com/health"
        echo "     - Dashboard: https://dashboard.arifosmcp.arif-fazil.com"

    - name: Notify on Failure
      if: failure()
      run: |
        echo "❌ Deployment failed! Inspecting logs..."
        ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} "
          sudo docker ps -a | grep arifos || true
          sudo docker logs arifosmcp_server --tail 100 || true
        "
        exit 1
