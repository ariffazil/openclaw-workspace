name: Deploy arifOS to VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

env:
  VPS_PATH: /srv/arifOS

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

    - name: Add VPS to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to VPS
      run: |
        echo "🚀 Deploying arifOS to VPS..."
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "bash /opt/arifOS/deploy.sh"
      timeout-minutes: 10

    - name: Wait for services
      run: sleep 10

    - name: Health Check - Phase 1
      run: |
        echo "🏥 Checking Phase 1 services..."
        # Check Postgres
        if ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo docker exec arifos-postgres pg_isready -U arifos_admin -d arifos_vault" > /dev/null 2>&1; then
          echo "✅ PostgreSQL is healthy"
        else
          echo "⚠️ PostgreSQL may still be starting..."
        fi
        
        # Check Redis
        if ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo docker exec arifos-redis redis-cli ping" > /dev/null 2>&1; then
          echo "✅ Redis is healthy"
        else
          echo "⚠️ Redis may still be starting..."
        fi

    - name: Health Check - Phase 2
      run: |
        echo "🏥 Checking arifOS MCP server..."
        MAX_RETRIES=15
        RETRY=0
        while [ $RETRY -lt $MAX_RETRIES ]; do
          if ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "curl -fsS http://127.0.0.1:8080/health" > /dev/null 2>&1; then
            echo "✅ arifOS MCP server is healthy!"
            exit 0
          fi
          RETRY=$((RETRY + 1))
          echo "⏳ Retry $RETRY/$MAX_RETRIES..."
          sleep 5
        done
        echo "❌ Health check failed"
        exit 1
      timeout-minutes: 3

    - name: Verify Deployment
      run: |
        echo "🔍 Deployment verification..."
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo docker ps --format 'table {{.Names}}\t{{.Status}}'"

    - name: Deployment Summary
      if: success()
      run: |
        echo "✨ Deployment Successful!"
        echo "   VPS: ${{ secrets.VPS_HOST }}"
        echo "   Endpoints:"
        echo "     - Health: http://${{ secrets.VPS_HOST }}:8080/health"
        echo "     - SSE: http://${{ secrets.VPS_HOST }}:8080/sse"
        echo "   PostgreSQL: 127.0.0.1:5432"
        echo "   Redis: 127.0.0.1:6379"

    - name: Notify on Failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo docker ps -a" || true
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo docker logs arifosmcp_server --tail 50" || true
        exit 1
