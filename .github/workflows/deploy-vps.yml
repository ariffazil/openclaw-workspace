name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

    - name: Add VPS to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to VPS
      run: |
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "bash /opt/arifOS/deploy.sh"

    - name: Verify Deployment
      run: |
        echo "✅ Deployment triggered on VPS"
        echo "📝 Check VPS logs: journalctl -u arifos-mcp -f"

    - name: Test MCP Health
      run: |
        # Wait a moment for service to restart
        sleep 5
        # Test MCP endpoint
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd /root/arifOS && .venv/bin/python -m aaa_mcp --help | head -5" || echo "⚠️  MCP test skipped"
