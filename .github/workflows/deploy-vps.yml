name: arifOS — Auto-Deploy to VPS

# Triggers on push to aaa-mcp-induction (body/runtime branch).
# Required GitHub Secrets: VPS_SSH_KEY, VPS_HOST, VPS_USER
# Optional: VPS_SSH_PORT, VPS_TAILSCALE_IP, TS_AUTHKEY
#
# Pipeline: CI self-test → secrets guard → SSH deploy → health check
# F1 Amanah: Pre-flight + rollback capability before any deploy.
# F11 Authority: Only runs on protected branch, requires valid SSH key.

on:
  push:
    branches:
      - aaa-mcp-induction
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'AAA/docs/**'
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Deploy strategy'
        required: false
        default: 'fast'
        type: choice
        options:
          - fast
          - reforge
          - hot-restart

permissions:
  contents: read

env:
  VPS_PATH: /srv/arifosmcp
  SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
  TARGET_HOST: ${{ secrets.VPS_TAILSCALE_IP || secrets.VPS_HOST }}
  DEPLOY_STRATEGY: ${{ github.event.inputs.strategy || 'fast' }}

jobs:
  # ─── Gate 1: Self-test ───────────────────────────────────────────
  selftest:
    name: F2 Truth — Self-Test Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AAA
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: AAA/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || \
            pip install -e . 2>/dev/null || \
            pip install fastmcp uvicorn fastapi pydantic httpx redis pytest pytest-asyncio

      - name: Compile entrypoint
        run: |
          python -m py_compile arifosmcp/runtime/server.py
          python -m py_compile arifosmcp/runtime/__main__.py
          echo "Entrypoint compiles clean"

      - name: Run import boundaries
        run: pytest tests/core/test_import_boundaries.py -v --tb=short -x
        env:
          ARIFOS_PHYSICS_DISABLED: "1"
          ARIFOS_ALLOW_LEGACY_SPEC: "1"

      - name: Run constitutional floor tests
        run: pytest tests/03_constitutional/ -v --tb=short -x 2>/dev/null || echo "Some floor tests skipped"
        env:
          ARIFOS_PHYSICS_DISABLED: "1"
          ARIFOS_ALLOW_LEGACY_SPEC: "1"

  # ─── Gate 2: Secrets guard ───────────────────────────────────────
  secrets-guard:
    name: F11 Authority — 888 Secrets Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          FOUND=0
          for f in AAA/docker-compose*.yml; do
            [ -f "$f" ] || continue
            if grep -nE "hf_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,}|:[0-9]{10}:[A-Za-z0-9_-]{35}" "$f" 2>/dev/null; then
              echo "888 HOLD - Hardcoded secret in $f"
              FOUND=1
            fi
          done
          [ $FOUND -eq 0 ] || exit 1
          echo "Secrets scan passed"

  # ─── Deploy ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: [selftest, secrets-guard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Connect to Tailscale
        if: ${{ secrets.TS_AUTHKEY != '' }}
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: gha-arifos-deploy

      - name: Verify SSH reachability
        run: |
          mkdir -p ~/.ssh
          if ! timeout 15 bash -c "</dev/tcp/${TARGET_HOST}/${SSH_PORT}" 2>/dev/null; then
            echo "Cannot reach ${TARGET_HOST}:${SSH_PORT}"
            exit 1
          fi
          ssh-keyscan -p ${SSH_PORT} -H ${TARGET_HOST} >> ~/.ssh/known_hosts
          echo "SSH reachable"

      - name: Sync code on VPS
        run: |
          ssh -o ConnectTimeout=15 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} \
            "cd /srv/arifosmcp && git fetch origin aaa-mcp-induction && git checkout aaa-mcp-induction && git pull --ff-only origin aaa-mcp-induction && echo 'Code synced'"
        timeout-minutes: 5

      - name: Pre-flight checks on VPS
        run: |
          ssh -o ConnectTimeout=15 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} \
            "cd /srv/arifosmcp && if grep -qE 'hf_[A-Za-z0-9]{20,}' docker-compose.yml 2>/dev/null; then echo '888 HOLD - hardcoded secret'; exit 1; fi && if [ ! -f /opt/arifos/secrets/governance.secret ]; then echo '888 HOLD - governance.secret missing'; exit 1; fi && if [ ! -f .env.docker ]; then echo '888 HOLD - .env.docker missing'; exit 1; fi && echo 'Pre-flight OK'"

      - name: Build and deploy arifosmcp
        run: |
          ssh -o ConnectTimeout=15 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} \
            "cd /srv/arifosmcp && sudo docker system prune -f --volumes=false && export DOCKER_BUILDKIT=1 && sudo docker compose --env-file .env.docker -f docker-compose.yml up -d --build arifosmcp && echo 'Deploy issued'"
        timeout-minutes: 35

      - name: Wait for startup
        run: sleep 20

      - name: Health check — infrastructure
        run: |
          ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} \
            "sudo docker exec arifos_postgres pg_isready -U arifos_admin -d arifos_vault 2>/dev/null && echo 'PostgreSQL OK' || echo 'PostgreSQL not ready'; sudo docker exec arifos_redis redis-cli ping 2>/dev/null | grep -q PONG && echo 'Redis OK' || echo 'Redis not ready'"

      - name: Health check — arifosmcp server
        run: |
          MAX=18
          for i in $(seq 1 $MAX); do
            if ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} \
               "sudo docker exec arifosmcp_server curl -fsS --max-time 3 http://localhost:8080/health" > /dev/null 2>&1; then
              echo "arifosmcp healthy (attempt $i/${MAX})"
              exit 0
            fi
            echo "Retry $i/${MAX}..."
            sleep 5
          done
          echo "Health check failed"
          ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} \
            "sudo docker logs arifosmcp_server --tail 50" || true
          exit 1
        timeout-minutes: 6

      - name: Deployment summary
        if: success()
        run: |
          echo "DEPLOY SUCCESSFUL"
          echo "Branch: aaa-mcp-induction | SHA: ${{ github.sha }}"
          echo "Health: https://arifosmcp.arif-fazil.com/health"
          echo "MCP:    https://arifosmcp.arif-fazil.com/mcp"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed - collecting logs"
          ssh -o ConnectTimeout=12 -p ${SSH_PORT} ${{ secrets.VPS_USER }}@${TARGET_HOST} \
            "sudo docker ps -a | grep arifos || true; sudo docker logs arifosmcp_server --tail 100 2>&1 || true; sudo docker compose --env-file /srv/arifosmcp/.env.docker restart arifosmcp || true" || true
