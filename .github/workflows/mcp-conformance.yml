name: MCP Conformance

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  mcp-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install -r requirements.txt
          pip install redis

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: FastMCP version gate (>= 3.0.0)
        run: |
          python - <<'PY'
          from importlib.metadata import version
          from sys import exit

          raw = version("fastmcp")
          parts = raw.split(".")
          major = int(parts[0]) if len(parts) > 0 and parts[0].isdigit() else 0
          minor = int(parts[1]) if len(parts) > 1 and parts[1].isdigit() else 0
          patch = 0
          if len(parts) > 2:
              numeric = "".join(ch for ch in parts[2] if ch.isdigit())
              patch = int(numeric) if numeric else 0

          current = (major, minor, patch)
          required = (3, 0, 0)
          print(f"FastMCP detected: {raw} -> parsed {current}")
          if current < required:
              print(f"ERROR: FastMCP {raw} is below required baseline >= 3.0.0")
              exit(1)
          print("FastMCP version gate passed")
          PY

      - name: Import smoke
        run: |
          python -c "import arifosmcp.transport.__main__"
          python -c "import arifosmcp.transport.rest"
          python -c "import arifosmcp.transport.streamable_http_server"

      - name: FastMCP CLI smoke (inspect/list)
        run: |
          PYTHONPATH="$PWD" fastmcp inspect fastmcp.json --format mcp > /tmp/fastmcp_inspect.json
          PYTHONPATH="$PWD" fastmcp list arifosmcp/transport/server.py:mcp --json > /tmp/fastmcp_list.json
          test -s /tmp/fastmcp_inspect.json
          test -s /tmp/fastmcp_list.json
          echo "fastmcp inspect/list smoke passed"

      - name: Entrypoint and protocol contract tests
        run: |
          pytest \
            tests/test_entrypoint_contract.py \
            tests/test_fastmcp_config_contract.py \
            tests/test_fastmcp_profiles_contract.py \
            tests/integration/test_health_metrics.py \
            tests/test_e2e_core_to_aaa_mcp.py \
            -q
