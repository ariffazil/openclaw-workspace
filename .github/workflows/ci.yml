name: arifOS CI — F2 Truth Gate

# Runs on push/PR to main or aaa-mcp-induction.
# Working directory: AAA/ (maps to /srv/arifosmcp/ on VPS).
# All test paths are relative to AAA/.

on:
  push:
    branches: [main, aaa-mcp-induction]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, aaa-mcp-induction]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  ARIFOS_PHYSICS_DISABLED: "1"
  ARIFOS_ALLOW_LEGACY_SPEC: "1"
  AAA_MCP_OUTPUT_MODE: "debug"

defaults:
  run:
    working-directory: AAA

jobs:
  # ─── Stage 1: Syntax + Compile ───────────────────────────────────
  compile-check:
    name: F4 Clarity — Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: AAA/pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || pip install fastmcp uvicorn fastapi pydantic httpx redis

      - name: Compile critical runtime modules
        run: |
          python -m py_compile arifosmcp/runtime/server.py
          python -m py_compile arifosmcp/runtime/__main__.py
          python -m py_compile core/pipeline.py
          python -m py_compile core/organs/_1_agi.py
          echo "✅ All critical modules compile clean"

  # ─── Stage 2: Lint ───────────────────────────────────────────────
  lint:
    name: F4 Clarity — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: |
          ruff check arifosmcp/ core/ tests/ --line-length 100 --output-format=github || true
          echo "Lint complete (non-blocking for now)"

      - name: Check imports
        run: ruff check --select I arifosmcp/ core/ --line-length 100 || true

  # ─── Stage 3: Unit Tests ─────────────────────────────────────────
  unit-tests:
    name: F2 Truth — Unit Tests
    runs-on: ubuntu-latest
    needs: compile-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: AAA/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || \
            pip install fastmcp uvicorn fastapi pydantic httpx redis pytest pytest-asyncio

      - name: Run kernel unit tests
        run: |
          pytest tests/core/kernel/ -v --tb=short -x \
            --no-header -q 2>&1 || echo "⚠️ Kernel tests need attention"

      - name: Run constitutional floor tests
        run: |
          pytest tests/03_constitutional/ -v --tb=short -x \
            --no-header -q 2>&1 || echo "⚠️ Constitutional tests need attention"

      - name: Run import boundary tests
        run: |
          pytest tests/core/test_import_boundaries.py -v --tb=short \
            --no-header -q 2>&1

      - name: Run governance tests
        run: |
          pytest tests/core/enforcement/ -v --tb=short \
            --no-header -q 2>&1 || echo "⚠️ Governance tests need attention"

  # ─── Stage 4: Secrets Guard ──────────────────────────────────────
  secrets-guard:
    name: F11 Authority — Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets in tracked files
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          # Check docker-compose files for hardcoded tokens
          FOUND=0
          for f in AAA/docker-compose*.yml docker-compose*.yml; do
            [ -f "$f" ] || continue
            if grep -nE "hf_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,}|:[0-9]{10}:[A-Za-z0-9_-]{35}" "$f" 2>/dev/null; then
              echo "🚨 888 HOLD — Hardcoded secret found in $f"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "FAIL: Secrets detected. Rotate tokens and replace with \${ENV_VAR} refs."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"
        working-directory: ${{ github.workspace }}

      - name: Verify .gitignore covers .env.docker
        run: |
          # check AAA gitignore from repo root
          # Handle UTF-16 encoded .gitignore (strings to decode binary)
          if strings AAA/.gitignore 2>/dev/null | grep -q "env.docker" ||              iconv -f UTF-16 -t UTF-8 AAA/.gitignore 2>/dev/null | grep -q "env.docker" ||              grep -a "env.docker" AAA/.gitignore 2>/dev/null; then
            echo "✅ .env.docker is gitignored"
          else
            echo "⚠️ .env.docker not found in .gitignore — verify it's excluded"
          fi
