name: arifOS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "pyproject.toml" ]; then
            pip install .[dev] || pip install .
          elif [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi

      - name: Compile critical runtime modules
        run: |
          python -m py_compile \
            arifosmcp/runtime/server.py \
            arifosmcp/runtime/__main__.py \
            core/pipeline.py \
            core/organs/_1_agi.py

      - name: Lint (ruff or flake8)
        run: |
          if python -m pip show ruff >/dev/null 2>&1; then
            ruff check \
              arifosmcp/runtime \
              arifosmcp/transport \
              arifosmcp/intelligence \
              core \
              tests/
          elif python -m pip show flake8 >/dev/null 2>&1; then
            flake8 arifosmcp/runtime arifosmcp/transport arifosmcp/intelligence core tests/
          else
            echo "No linter installed; skipping."
          fi

      - name: Type check (mypy)
        run: |
          if python -m pip show mypy >/dev/null 2>&1; then
            mypy arifosmcp/transport tests || true
          else
            echo "mypy not installed; skipping."
          fi

      - name: Run tests with coverage (pytest)
        run: |
          pytest \
            tests/test_entrypoint_contract.py \
            tests/test_fastmcp_config_contract.py \
            tests/test_fastmcp_profiles_contract.py \
            tests/test_e2e_core_to_aaa_mcp.py \
            tests/integration/test_health_metrics.py \
            tests/test_canonical_tool_contract.py \
            tests/test_core_foundation.py \
            tests/test_imports_smoke.py \
            tests/test_constitutional_core.py \
            tests/test_formatter_nudge_routing.py \
            tests/test_uncertainty_telemetry.py \
            tests/test_governance_kernel_extended.py \
            tests/test_physics_extended.py \
            tests/test_homeostasis.py \
            tests/test_build_info.py \
            tests/test_fastmcp_server.py \
            tests/test_mcp_core_modules.py \
            tests/test_amendment_vault.py \
            tests/core/ \
            -k "not test_all_tools_latency" \
            --cov=core --cov=arifosmcp/transport --cov=arifosmcp/intelligence \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            -q

      - name: Upload coverage to Codecov
        if: success() || failure()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ariffazil/arifOS
          files: coverage.xml
          fail_ci_if_error: false

  # --- Security Scanning (Snyk) ---
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run Snyk vulnerability scan
        uses: snyk/actions/python@master
        continue-on-error: true  # Don't block on vulns during pilot
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --ignore-vuln PYSEC-2022-43012 || echo "⚠ Vulnerabilities found (non-blocking during pilot)"

      - name: npm audit (for any JS deps)
        run: |
          if [ -f "package.json" ]; then
            npm audit --audit-level=high || echo "⚠ npm audit found issues"
          else
            echo "No package.json; skipping npm audit"
          fi
