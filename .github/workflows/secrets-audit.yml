name: 🔒 AAA Secrets Audit (WAJIB)

on:
  push:
    branches: [main, develop, '**']
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  workflow_dispatch:


permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Pull latest baseline
        run: |
          git checkout HEAD -- .secrets.baseline 2>/dev/null || \
          echo "[]" > .secrets.baseline

      - name: Run secrets scan (exclude _archive, memory, secrets/)
        id: scan
        run: |
          set -euo pipefail

          echo "=== Scanning for new secrets (excluding _archive/, memory/, secrets/, skills/_meta.json) ==="

          SCAN_RESULT=$(python3 -c "
          import subprocess, json, sys, os

          # Run scan with exclusions
          result = subprocess.run(
              ['detect-secrets', 'scan', '.',
               '--exclude-files', '_archive/.*',
               '--exclude-files', 'memory/.*',
               '--exclude-files', 'secrets/.*',
               '--exclude-files', 'skills/.*/_meta\\.json'],
              capture_output=True, text=True, cwd='/root/AAA'
          )

          try:
              current = json.loads(result.stdout)
          except json.JSONDecodeError:
              print('ERROR: detect-secrets scan failed')
              print(result.stderr)
              sys.exit(1)

          # Load baseline if it exists
          baseline_secrets = {}
          baseline_path = '/root/AAA/.secrets.baseline'
          if os.path.exists(baseline_path):
              with open(baseline_path) as f:
                  baseline = json.load(f)
                  baseline_secrets = baseline.get('results', {})

          new_secrets = []
          for fname, entries in current.get('results', {}).items():
              baseline_entries = baseline_secrets.get(fname, [])
              baseline_hashes = {e['hashed_secret'] for e in baseline_entries}
              for entry in entries:
                  h = entry['hashed_secret']
                  if h not in baseline_hashes:
                      new_secrets.append({
                          'type': entry['type'],
                          'file': fname,
                          'line': entry['line_number'],
                          'hash': h[:16] + '...'
                      })

          if new_secrets:
              print('NEW_SECRETS_FOUND=' + str(len(new_secrets)))
              print('::set-output name=secrets_found::true')
              for s in new_secrets:
                  print(f\"  🚫 {s['type']} in {s['file']}:{s['line']}\")
              sys.exit(1)
          else:
              print('NEW_SECRETS_FOUND=0')
              print('::set-output name=secrets_found::false')
              print('✅ No new secrets detected')
          " 2>&1)
          echo "$SCAN_RESULT"
          echo "$SCAN_RESULT" | tail -1 | grep -q "NEW_SECRETS_FOUND=0" || exit 1

      - name: Pattern scan (fast regex check)
        if: always()
        run: |
          set -euo pipefail
          echo "=== Pattern scan: Telegram tokens, API keys, GitHub tokens ==="

          FOUND=0
          # Check all files changed in this push/PR (exclude _archive, memory)
          for f in $(git diff --name-only HEAD^..HEAD 2>/dev/null || git diff --name-only --cached); do
              [[ "$f" =~ ^(_archive|memory|secrets|\.git)/ ]] && continue
              [[ -d "$f" ]] && continue
              [[ ! -f "$f" ]] && continue
              if grep -rqE '(bot\d+:[A-Za-z0-9_\-]{20,}|gh[pousr]_[A-Za-z0-9_]{35,}|sk-[A-Za-z0-9_\-]{30,}|AKIA[A-Z0-9]{16})' "$f" 2>/dev/null; then
                  MATCH=$(grep -rE '(bot\d+:[A-Za-z0-9_\-]{20,}|gh[pousr]_[A-Za-z0-9_]{35,}|sk-[A-Za-z0-9_\-]{30,}|AKIA[A-Z0-9]{16})' "$f" 2>/dev/null | head -3)
                  echo "  🚫 Secret pattern in $f:"
                  echo "$MATCH" | sed 's/^/      /'
                  FOUND=1
              fi
          done

          if [ "$FOUND" = "1" ]; then
              echo "::set-output name=pattern_found::true"
              echo "❌ Known secret patterns detected"
              exit 1
          else
              echo "✅ No known secret patterns detected"
              echo "::set-output name=pattern_found::false"
          fi

  block-secrets:
    needs: [secrets-audit]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 🚫 BLOCK — Secrets detected
        run: |
          echo "============================================"
          echo "🛑 SECRETS BLOCK — COMMIT REJECTED"
          echo "============================================"
          echo ""
          echo "Your push/PR contains secrets not in .secrets.baseline"
          echo "OR known secret patterns were detected."
          echo ""
          echo "FIX: Remove secrets from your changes, then push again."
          echo ""
          echo "To whitelist a false positive (AFTER removing the secret):"
          echo "  1. Remove the secret from the file"
          echo "  2. Run: detect-secrets scan . > .secrets.baseline"
          echo "  3. git add .secrets.baseline && git commit --amend --no-edit"
          echo "  4. git push --force-with-lease"
          echo ""
          echo "To suppress a known pattern (NOT recommended):"
          echo "  Add '# pragma: allowlist secret' above the line in the source file"
          echo ""
          echo "This is a WAJIB gate — F1 AMANAH enforcement."
          echo "No secrets may pass this layer."
          exit 1
