# Build and push Docker image to Docker Hub
# Triggers on releases or manual dispatch

name: Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v60.0)'
        required: true
        default: 'v60.0'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ariffazil/arifos

jobs:
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Verify push
        run: |
          echo "✓ Docker image pushed successfully"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Pull with:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

  notify:
    name: Deployment Notification
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Success Summary
        run: |
          echo "========================================"
          echo "  DOCKER HUB PUBLISH COMPLETE"
          echo "========================================"
          echo "  Image: ariffazil/arifos"
          echo "  Tags: latest, ${{ github.event.inputs.version || 'release tag' }}"
          echo "  Registry: https://hub.docker.com/r/ariffazil/arifos"
          echo "========================================"
          echo "  Pull command:"
          echo "    docker pull ariffazil/arifos:latest"
          echo "========================================"
