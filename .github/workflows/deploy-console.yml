# Build arifOS Metabolic Console (React Dashboard)

name: Build arifOS Console

on:
  push:
    branches: [main, master]
    paths:
      - 'aclip_cai/dashboard/**'
      - '.github/workflows/deploy-console.yml'
  workflow_dispatch:

permissions:
  contents: read

# Prevent concurrent builds
concurrency:
  group: "console-pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Console
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aclip_cai/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: aclip_cai/dashboard

      - name: Build Console
        run: npm run build
        working-directory: aclip_cai/dashboard
