# Deploy arifOS docs site to GitHub Pages

name: Deploy APPS site to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'sites/docs/**'
      - 'aclip_cai/dashboard/**'
      - '.github/workflows/deploy-sites.yml'
  workflow_dispatch:

# GitHub Pages permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build arifOS APPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            sites/docs/package-lock.json
            aclip_cai/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sites/docs

      - name: Install console dependencies
        run: npm ci
        working-directory: aclip_cai/dashboard

      - name: Build console
        run: npm run build
        working-directory: aclip_cai/dashboard

      - name: Build docs
        run: npm run build
        working-directory: sites/docs

      - name: Embed console under /console/
        run: |
          mkdir -p sites/docs/build/console
          cp -r aclip_cai/dashboard/dist/* sites/docs/build/console/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Add custom domain
        run: echo "arifos.arif-fazil.com" > sites/docs/build/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sites/docs/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify Deployment
        run: |
          echo "========================================"
          echo "  arifOS DOCS DEPLOYED"
          echo "========================================"
          echo "  GitHub URL: ${{ steps.deployment.outputs.page_url }}"
          echo "  Custom Domain: https://arifos.arif-fazil.com"
          echo "========================================"
          echo "  DITEMPA BUKAN DIBERI 🔥"
          echo "========================================"
