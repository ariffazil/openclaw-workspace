# Deploy arifOS APPS site to GitHub Pages
# GitHub Pages handles hosting, Cloudflare handles DNS

name: Deploy arifOS to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'arif-fazil-sites/APPS/**'
      - '.github/workflows/deploy-sites.yml'
  workflow_dispatch:

# GitHub Pages permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build arifOS APPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Build Info
        working-directory: arif-fazil-sites
        run: |
          BUILD_INFO="{\"commit\":\"$(git rev-parse --short HEAD)\",\"branch\":\"$(git rev-parse --abbrev-ref HEAD)\",\"built\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"version\":\"v60.0\"}"
          echo "$BUILD_INFO" > APPS/public/build-info.json

      - name: Install & Build
        working-directory: arif-fazil-sites/APPS
        run: |
          npm ci
          echo "=== DEBUG: Listing src/lib ==="
          ls -la src/lib/
          echo "=== DEBUG: Running Vite build ==="
          npx vite build

      - name: Copy Static Assets
        working-directory: arif-fazil-sites
        run: |
          # Copy all public assets to dist
          cp APPS/public/_headers APPS/dist/ 2>/dev/null || true
          cp APPS/public/_redirects APPS/dist/ 2>/dev/null || true
          cp APPS/public/robots.txt APPS/dist/ 2>/dev/null || true
          cp APPS/public/sitemap.xml APPS/dist/ 2>/dev/null || true
          cp APPS/public/llms.txt APPS/dist/ 2>/dev/null || true
          cp APPS/public/llms.json APPS/dist/ 2>/dev/null || true
          cp APPS/public/build-info.json APPS/dist/ 2>/dev/null || true

      - name: Setup SPA Routing (404.html)
        working-directory: arif-fazil-sites/APPS
        run: |
          # Copy index.html to 404.html for SPA routing
          # This allows React Router to handle client-side routes
          cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: arif-fazil-sites/APPS/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify Deployment
        run: |
          echo "========================================"
          echo "  arifOS APPS DEPLOYED"
          echo "========================================"
          echo "  GitHub URL: ${{ steps.deployment.outputs.page_url }}"
          echo "  Custom Domain: https://arifos.arif-fazil.com"
          echo "========================================"
          echo "  DITEMPA BUKAN DIBERI 🔥"
          echo "========================================"
