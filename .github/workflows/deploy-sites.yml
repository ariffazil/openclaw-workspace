# Deploy arifOS Developer Portal to GitHub Pages (arifos.arif-fazil.com)
name: Deploy arifOS Developer Portal

on:
  push:
    branches: [main]
    paths:
      - 'arifosmcp/sites/developer/**'
      - '.github/workflows/deploy-sites.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static site source
        run: |
          test -f arifosmcp/sites/developer/index.html
          test -f arifosmcp/sites/developer/style.css
          test -f arifosmcp/sites/developer/app.js
          echo "✅ Static developer portal source is present"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'arifosmcp/sites/developer'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
