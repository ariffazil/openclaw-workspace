name: Constitutional Alignment (F1-F13)

on:
  push:
    branches: [main, master]
    paths:
      - "aaa_mcp/**"
      - "core/**"
      - "server.json"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/constitutional_alignment.yaml"
  pull_request:
    branches: [main, master]
    paths:
      - "aaa_mcp/**"
      - "core/**"
      - "server.json"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/constitutional_alignment.yaml"
  workflow_dispatch:

concurrency:
  group: constitutional-alignment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  f2_truth:
    name: F2 Truth - Version + Namespace Alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate version and namespace consistency
        run: |
          python - <<'PY'
          import json
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          py_ver = pyproject["project"]["version"]
          server = json.loads(Path("server.json").read_text(encoding="utf-8"))
          server_ver = server["version"]
          server_name = server["name"]

          assert py_ver == server_ver, (
              f"F2 violation: pyproject version ({py_ver}) != server.json version ({server_ver})"
          )
          assert server_name == "io.github.ariffazil/arifos-mcp", (
              f"F2 violation: unexpected server name {server_name}"
          )

          readme = Path("README.md").read_text(encoding="utf-8")
          marker = "<!-- mcp-name: io.github.ariffazil/arifos-mcp -->"
          assert marker in readme, "F2 violation: README missing MCP ownership marker"

          print(f"OK: version={py_ver}, name={server_name}")
          PY

  f3_consensus:
    name: F3 Consensus - Canonical 5-Organ Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install -r requirements.txt

      - name: Validate canonical tool names and aliases
        run: |
          python - <<'PY'
          from aaa_mcp.protocol.aaa_contract import AAA_CANONICAL_TOOLS
          from aaa_mcp.rest import TOOL_ALIASES, TOOLS

          # All 13 canonical UX-verb tools must be registered
          required = set(AAA_CANONICAL_TOOLS)
          missing = sorted(required - set(TOOLS.keys()))
          assert not missing, f"F3 violation: missing canonical tools: {missing}"

          # Every backward-compat alias must resolve to a registered tool
          broken = [
              f"{alias} -> {target}"
              for alias, target in TOOL_ALIASES.items()
              if target not in TOOLS
          ]
          assert not broken, f"F3 violation: broken aliases: {broken}"

          print(f"OK: {len(required)} canonical tools + {len(TOOL_ALIASES)} aliases aligned")
          PY

  f10_ontology:
    name: F10 Ontology - Registry Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --version

      - name: Validate server.json schema
        run: ./mcp-publisher validate --file server.json

  f11_authority:
    name: F11 Authority - Entrypoint and Deployment Surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate required files and OCI label
        run: |
          test -f aaa_mcp/__main__.py
          test -f aaa_mcp/server.py
          test -f aaa_mcp/rest.py
          test -f Dockerfile
          test -f fastmcp.json
          grep -q 'io.modelcontextprotocol.server.name="io.github.ariffazil/arifos-mcp"' Dockerfile
          echo "OK: authority chain files + OCI label present"

  f12_defense:
    name: F12 Defense - Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --source . -v

  seal_verdict:
    name: SEAL Verdict (F1-F13)
    runs-on: ubuntu-latest
    needs: [f2_truth, f3_consensus, f10_ontology, f11_authority, f12_defense]
    steps:
      - name: Constitutional verdict
        run: |
          echo "========================================"
          echo "  CONSTITUTIONAL ALIGNMENT AUDIT"
          echo "========================================"
          echo "  F2 Truth:      PASS"
          echo "  F3 Consensus:  PASS"
          echo "  F10 Ontology:  PASS"
          echo "  F11 Authority: PASS"
          echo "  F12 Defense:   PASS"
          echo "========================================"
          echo "  Verdict: SEAL"
          echo "========================================"
