name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Publish to PyPI"]
    types:
      - completed
  # push:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match server.json)"
        required: true
        default: "2026.2.23"

jobs:
  publish:
    if: ${{ !github.event.workflow_run || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ✅ VALIDATION PHASE
      - name: Validate server.json schema
        run: |
          python -c "
          import json
          data = json.load(open('server.json'))
          assert 'name' in data, 'Missing name field'
          assert 'version' in data, 'Missing version field'
          assert 'packages' in data, 'Missing packages array'
          assert data['name'].startswith('io.github.ariffazil/'), 'Invalid namespace'
          print(f'✅ Valid schema: {data[\"name\"]} v{data[\"version\"]}')
          "

      - name: Verify version consistency
        run: |
          python -c "
          import json, sys, os
          server = json.load(open('server.json'))
          # Get version from workflow dispatch or release tag
          tag_name = os.environ.get('GITHUB_REF_NAME', '')
          input_version = os.environ.get('INPUT_VERSION', '')
          if input_version:
              workflow_version = input_version.lstrip('v')
          elif tag_name:
              workflow_version = tag_name.lstrip('v')
          else:
              workflow_version = '2026.2.23'
          server_version = server['version']
          if workflow_version != server_version:
              print(f'⚠️ Version mismatch: workflow={workflow_version}, server.json={server_version}')
              print('Continuing with server.json version...')
          else:
              print(f'✅ Version verified: {server_version}')
          "
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      # 🔧 Install mcp-publisher binary (Dynamic Latest)
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --version

      # 🔴 CRITICAL: GitHub authentication for mcp-publisher
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      # ✅ PUBLISH PHASE
      - name: Publish to MCP Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mcp-publisher publish --file server.json
          echo "✅ Successfully published to MCP Registry"

      # ✅ VERIFICATION PHASE
      - name: Verify publication
        run: |
          sleep 10
          SERVER_NAME=$(python -c "import json; print(json.load(open('server.json'))['name'])")
          echo "Checking for server: $SERVER_NAME"
          RESPONSE=$(curl -s "https://registry.modelcontextprotocol.io/v0.1/servers/$SERVER_NAME")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'name' in data:
              print(f'✅ Server published: {data[\"name\"]} v{data.get(\"version\", \"unknown\")}')
          else:
              print('⚠️ Server not found yet (may need propagation time)')
          "
        continue-on-error: true
