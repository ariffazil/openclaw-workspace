name: arifOS Canonical Dashboard Uptime Monitor

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: 🌐 Check Canonical Dashboard Connectivity
        run: |
          URL="https://arifosmcp.arif-fazil.com/dashboard/"
          echo "🔍 Checking: $URL"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)
          if [ $STATUS -eq 200 ]; then
            echo "✅ Dashboard is LIVE (HTTP $STATUS)"
          else
            echo "❌ ERROR: Dashboard returned HTTP $STATUS"
            exit 1
          fi

      - name: 📊 Connectivity Report
        if: always()
        run: |
          echo "## 🌐 Canonical Dashboard Vitality Report" >> $GITHUB_STEP_SUMMARY
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ **Status:** ONLINE" >> $GITHUB_STEP_SUMMARY
            echo "🌍 **URL:** https://arifosmcp.arif-fazil.com/dashboard/" >> $GITHUB_STEP_SUMMARY
          else
            echo "🔴 **Status:** OUTAGE DETECTED" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Action required: Check the VPS runtime deployment and dashboard static mount on arifosmcp.arif-fazil.com." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ditempa Bukan Diberi** 🔥" >> $GITHUB_STEP_SUMMARY
