# arifOS MCP - Automated Deployment Pipeline
# ==========================================
# 
# This workflow provides zero-chaos deployment for arifOS MCP.
# It can be triggered manually or automatically on releases.
#
# DITEMPA BUKAN DIBERI - Forged, Not Given

name: 🚀 Deploy arifOS MCP

on:
  # Manual trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: 'Dry Run (no actual deployment)'
        required: false
        default: false
        type: boolean
      skip_tests:
        description: 'Skip Tests (not recommended)'
        required: false
        default: false
        type: boolean
      
  # Automatic deployment on release
  release:
    types: [published]

  # Automatic deployment on push to main (staging only)
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION: '0.5.x'

jobs:
  # ===========================================================================
  # JOB 1: Validate & Test
  # ===========================================================================
  validate:
    name: 🔍 Validate & Test
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      git_sha: ${{ steps.vars.outputs.git_sha }}
      version: ${{ steps.vars.outputs.version }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}

      - name: Export Variables
        id: vars
        run: |
          echo "git_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version']')"" >> $GITHUB_OUTPUT
          echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT

      - name: Check Deployment Prerequisites
        id: check
        run: |
          # Skip deployment if commit message contains [no-deploy]
          if [[ "$(git log -1 --pretty=%B)" == *"[no-deploy]"* ]]; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⛔ Deployment skipped: [no-deploy] flag in commit message"
            exit 0
          fi
          
          # For staging: deploy on main branch pushes
          if [[ "${{ github.event_name }}" == "push" && "${{ steps.vars.outputs.branch }}" == "main" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "✅ Staging deployment triggered by main branch push"
            exit 0
          fi
          
          # For production: only on manual workflow_dispatch or releases
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "release" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            if [[ "${{ github.event_name }}" == "release" ]]; then
              echo "environment=production" >> $GITHUB_OUTPUT
              echo "✅ Production deployment triggered by release"
            else
              echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi
          
          echo "should_deploy=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No deployment triggered for this event"

      - name: Install Dependencies
        run: |
          uv pip install -e ".[dev]"

      - name: Run Unit Tests
        if: ${{ !inputs.skip_tests }}
        run: |
          echo "Running unit tests..."
          pytest tests/00_unit/ -v --tb=short

      - name: Run Integration Tests
        if: ${{ !inputs.skip_tests }}
        run: |
          echo "Running integration tests..."
          pytest tests/01_integration/ -v --tb=short

      - name: Run Constitutional Tests
        if: ${{ !inputs.skip_tests }}
        run: |
          echo "Running constitutional tests (F1-F13 enforcement)..."
          pytest tests/03_constitutional/ -v

      - name: Check Code Quality
        run: |
          echo "Running code quality checks..."
          ruff check arifosmcp/ core/ --output-format=github || true
          ruff format --check arifosmcp/ core/ || true

  # ===========================================================================
  # JOB 2: Build Docker Image
  # ===========================================================================
  build:
    name: 🐳 Build Image
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ needs.validate.outputs.should_deploy == 'true' }}
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.optimized
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/arifosmcp:${{ needs.validate.outputs.git_sha }}
            ${{ secrets.DOCKER_USERNAME }}/arifosmcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ARIFOS_VERSION=${{ needs.validate.outputs.version }}
            GIT_SHA=${{ needs.validate.outputs.git_sha }}

      - name: Export Image Tag
        id: tag
        run: |
          echo "image_tag=${{ secrets.DOCKER_USERNAME }}/arifosmcp:${{ needs.validate.outputs.git_sha }}" >> $GITHUB_OUTPUT

  # ===========================================================================
  # JOB 3: Deploy to Target Environment
  # ===========================================================================
  deploy:
    name: 🚀 Deploy to ${{ needs.validate.outputs.environment || github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: ${{ needs.validate.outputs.should_deploy == 'true' }}
    environment:
      name: ${{ needs.validate.outputs.environment || github.event.inputs.environment }}
      url: https://${{ needs.validate.outputs.environment == 'production' && 'arifosmcp.arif-fazil.com' || 'staging.arif-fazil.com' }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Configure Deployment Environment
        run: |
          ENVIRONMENT="${{ needs.validate.outputs.environment || github.event.inputs.environment }}"
          echo "DEPLOY_ENV=$ENVIRONMENT" >> $GITHUB_ENV
          
          if [[ "$ENVIRONMENT" == "production" ]]; then
            echo "DEPLOY_HOST=arif-fazil.com" >> $GITHUB_ENV
            echo "DEPLOY_USER=root" >> $GITHUB_ENV
          else
            echo "DEPLOY_HOST=staging.arif-fazil.com" >> $GITHUB_ENV
            echo "DEPLOY_USER=deploy" >> $GITHUB_ENV
          fi

      - name: Run Deployment Script
        env:
          GITHUB_DEPLOY: "true"
          DEPLOY_ENV: ${{ env.DEPLOY_ENV }}
        run: |
          DRY_RUN_FLAG=""
          SKIP_TESTS_FLAG=""
          
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          
          if [[ "${{ github.event.inputs.skip_tests }}" == "true" ]]; then
            SKIP_TESTS_FLAG="--skip-tests"
          fi
          
          python scripts/deploy.py \
            --environment $DEPLOY_ENV \
            $DRY_RUN_FLAG \
            $SKIP_TESTS_FLAG

      - name: Health Check
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          HOST="${{ env.DEPLOY_ENV == 'production' && 'arifosmcp.arif-fazil.com' || 'staging.arif-fazil.com' }}"
          echo "Checking health at https://$HOST/health"
          
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://$HOST/health || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i/10: Status $STATUS, retrying in 5s..."
            sleep 5
          done
          
          echo "❌ Health check failed after 10 attempts"
          exit 1

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Deployment to ${{ env.DEPLOY_ENV }} completed successfully!"
          echo "Version: ${{ needs.validate.outputs.version }}"
          echo "SHA: ${{ needs.validate.outputs.git_sha }}"

      - name: Rollback on Failure
        if: failure() && github.event.inputs.dry_run != 'true'
        run: |
          echo "🚨 Deployment failed, initiating rollback..."
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "
            cd /srv/arifosmcp && 
            docker-compose down && 
            docker-compose up -d
          " || echo "Rollback command executed"

  # ===========================================================================
  # JOB 4: Post-Deploy Verification
  # ===========================================================================
  verify:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event.inputs.dry_run != 'true' }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install httpx

      - name: Run E2E Verification Tests
        run: |
          ENVIRONMENT="${{ needs.validate.outputs.environment || github.event.inputs.environment }}"
          HOST="${{ ENVIRONMENT == 'production' && 'arifosmcp.arif-fazil.com' || 'staging.arif-fazil.com' }}"
          
          echo "Running E2E verification against https://$HOST"
          
          python -c "
          import httpx
          import sys
          
          base_url = f'https://{HOST}'
          
          # Test 1: Health endpoint
          r = httpx.get(f'{base_url}/health', timeout=10)
          assert r.status_code == 200, f'Health check failed: {r.status_code}'
          data = r.json()
          assert data['status'] == 'healthy', f'Status not healthy: {data}'
          print(f'✅ Health check passed: {data[\"version\"]}')
          
          # Test 2: Tools endpoint
          r = httpx.get(f'{base_url}/tools', timeout=10)
          assert r.status_code == 200, f'Tools check failed: {r.status_code}'
          data = r.json()
          assert len(data['tools']) > 0, 'No tools found'
          print(f'✅ Tools endpoint: {data[\"count\"]} tools available')
          
          # Test 3: MCP initialize
          r = httpx.post(
              f'{base_url}/mcp',
              json={
                  'jsonrpc': '2.0',
                  'id': 1,
                  'method': 'initialize',
                  'params': {
                      'protocolVersion': '2024-11-05',
                      'capabilities': {},
                      'clientInfo': {'name': 'verify', 'version': '1.0'}
                  }
              },
              timeout=10
          )
          assert r.status_code == 200, f'MCP init failed: {r.status_code}'
          data = r.json()
          assert 'result' in data, f'No result in response: {data}'
          print('✅ MCP protocol initialization passed')
          
          print(f'\n🎉 All verification tests passed for {base_url}!')
          "

      - name: Report Deployment Status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ENVIRONMENT="${{ needs.validate.outputs.environment || github.event.inputs.environment }}"
          
          if [[ "$STATUS" == "success" ]]; then
            echo "🎉 Deployment to $ENVIRONMENT verified successfully!"
          else
            echo "⚠️ Deployment verification failed for $ENVIRONMENT"
          fi

  # ===========================================================================
  # JOB 5: Cleanup & Notify
  # ===========================================================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [deploy, verify]
    if: always() && needs.validate.outputs.should_deploy == 'true'
    
    steps:
      - name: Deployment Summary
        run: |
          ENVIRONMENT="${{ needs.validate.outputs.environment || github.event.inputs.environment }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          VERIFY_STATUS="${{ needs.verify.result }}"
          
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | $DEPLOY_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify | $VERIFY_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ needs.validate.outputs.git_sha }}" >> $GITHUB_STEP_SUMMARY
          
          if [[ "$DEPLOY_STATUS" == "success" && "$VERIFY_STATUS" == "success" ]]; then
            echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
            echo "URL: https://${{ ENVIRONMENT == 'production' && 'arifosmcp.arif-fazil.com' || 'staging.arif-fazil.com' }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "Check logs for details." >> $GITHUB_STEP_SUMMARY
          fi
