name: Deploy arifOS AAA MCP to VPS

on:
  push:
    branches:
      - main
    paths:
      - "aaa_mcp/**"
      - "arifos_aaa_mcp/**"
      - "core/**"
      - "aclip_cai/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    name: Constitutional Self-Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -r requirements.txt

      - name: Run self-test
        run: python -m aaa_mcp.selftest
        env:
          GOVERNANCE_MODE: HARD
          ARIFOS_PHYSICS_DISABLED: "1"
          ARIFOS_ALLOW_LEGACY_SPEC: "1"

  deploy:
    name: Deploy to VPS
    needs: selftest
    runs-on: ubuntu-latest
    steps:
      - name: Pull and rebuild on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/arifOS
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            echo "Container started. Waiting for /health..."

      - name: Smoke check — /health on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            for i in 1 2 3 4 5 6; do
              if curl -fsSL --max-time 5 http://localhost:8088/health > /dev/null; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              echo "Attempt $i/6 — waiting 10s..."
              sleep 10
            done
            echo "FAILED: /health unreachable after 60s"
            docker logs arifosmcp_server --tail 50
            exit 1

  verify:
    name: Verify Public Endpoint
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Final public health check
        run: |
          sleep 5
          curl -fsSL https://arifosmcp.arif-fazil.com/health

      - name: Report
        run: |
          echo "============================================"
          echo "  arifOS AAA MCP — DEPLOYMENT COMPLETE"
          echo "============================================"
          echo "  Base:   https://arifosmcp.arif-fazil.com"
          echo "  MCP:    https://arifosmcp.arif-fazil.com/mcp"
          echo "  Health: https://arifosmcp.arif-fazil.com/health"
          echo "============================================"
