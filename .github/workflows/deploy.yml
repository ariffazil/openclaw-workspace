name: Deploy arifOS MCP to VPS (Coolify)

on:
  push:
    branches:
      - main
    paths:
      - "aaa_mcp/**"
      - "core/**"
      - "aclip_cai/**"
      - "deployment/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vps-coolify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    name: Constitutional Self-Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install -r requirements.txt
          pip install redis

      - name: Run arifOS Self-Test
        run: python -m aaa_mcp.selftest
        env:
          GOVERNANCE_MODE: HARD
          CLUSTER_LEVEL: "1"

  deploy_vps:
    name: Deploy to VPS
    needs: selftest
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/arifOS
            git pull --ff-only origin main
            docker compose -f deployment/docker-compose.vps.yml up -d --build

      - name: VPS Smoke Check (/health on REST bridge)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            for i in 1 2 3 4 5; do
              if curl -fss http://localhost:8889/health >/dev/null; then
                echo "VPS smoke check passed: /health reachable on localhost:8889"
                exit 0
              fi
              echo "Attempt $i/5 failed, retrying in 5s..."
              sleep 5
            done
            echo "VPS smoke check failed: /health unreachable on localhost:8889"
            exit 1

  verify:
    name: Verify Deployment
    needs: deploy_vps
    runs-on: ubuntu-latest
    steps:
      - name: Final Health Check
        run: |
          sleep 10
          curl -fsS https://arifosmcp.arif-fazil.com/health

      - name: Deployment Report
        run: |
          echo "========================================"
          echo "  arifOS MCP — VPS DEPLOYMENT REPORT"
          echo "========================================"
          echo "  Endpoint: https://arifosmcp.arif-fazil.com"
          echo "  MCP:      https://arifosmcp.arif-fazil.com/mcp"
          echo "  Health:   https://arifosmcp.arif-fazil.com/health"
          echo "========================================"
