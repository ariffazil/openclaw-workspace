name: Deploy arifOS AAA MCP to VPS

on:
  push:
    branches:
      - main
    paths:
      - "aaa_mcp/**"
      - "arifos_aaa_mcp/**"
      - "core/**"
      - "aclip_cai/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    name: Constitutional Self-Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -r requirements.txt

      - name: Run self-test
        run: python -m aaa_mcp.selftest
        env:
          GOVERNANCE_MODE: HARD
          ARIFOS_PHYSICS_DISABLED: "1"
          ARIFOS_ALLOW_LEGACY_SPEC: "1"

  deploy:
    name: Deploy to VPS via Coolify Webhook
    needs: selftest
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deployment
        run: |
          if [ -z "${{ secrets.COOLIFY_WEBHOOK_URL }}" ]; then
            echo "⚠️ COOLIFY_WEBHOOK_URL not set. Skipping webhook deploy."
            echo "Set this secret in GitHub: https://coolify.io/docs/api/webhooks"
            exit 0
          fi
          curl -X POST "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"manual"}'
          echo "✅ Coolify deployment triggered"

  verify:
    name: Verify Public Endpoint
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Final public health check
        run: |
          sleep 5
          curl -fsSL https://arifosmcp.arif-fazil.com/health

      - name: Report
        run: |
          echo "============================================"
          echo "  arifOS AAA MCP — DEPLOYMENT COMPLETE"
          echo "============================================"
          echo "  Base:   https://arifosmcp.arif-fazil.com"
          echo "  MCP:    https://arifosmcp.arif-fazil.com/mcp"
          echo "  Health: https://arifosmcp.arif-fazil.com/health"
          echo "============================================"
