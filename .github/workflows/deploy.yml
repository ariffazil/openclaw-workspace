name: Deploy MIND Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # --- Deploy MIND (Backend) to Railway ---
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy MIND to Railway
        run: railway up --service arifos-mind --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Verify Backend Health
        run: |
          sleep 10
          curl -sf https://aaamcp.arif-fazil.com/health || echo "Health check will be available after DNS propagation"

  # --- Verify MIND is Online ---
  verify:
    name: Verify MIND Backend
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Check MIND (aaamcp.arif-fazil.com)
        run: |
          echo "Checking MIND layer..."
          curl -sf https://aaamcp.arif-fazil.com/health > /dev/null && echo "MIND is ONLINE" || echo "MIND check failed"

      - name: Deployment Report
        run: |
          echo "========================================"
          echo "  arifOS MIND — DEPLOYMENT REPORT"
          echo "========================================"
          echo "  MIND:  https://aaamcp.arif-fazil.com  (Railway)"
          echo "========================================"
          echo "  Frontend sites deployed separately via:"
          echo "  https://github.com/ariffazil/arif-fazil-sites"
          echo "========================================"
          echo "  DITEMPA BUKAN DIBERI"
          echo "========================================"
