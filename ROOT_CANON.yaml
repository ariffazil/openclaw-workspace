version: 1
purpose: Root canon manifest for the AAA canonical repository
rule: >
  When root files disagree, use this manifest to determine which files are
  canonical, which are legacy, which are generated artifacts, and which are
  runtime-only traces.

domains:
  source_of_truth:
    - registries/
    - integrations/
    - contracts/
    - schemas/
    # OpenClaw plane — AAA authors, OpenClaw consumes
    - openclaw/gateway/         # model providers, channels, security
    - openclaw/acp/            # host adapter session templates
    - openclaw/mcp/            # MCP server catalogs
    - openclaw/plugins/        # approved plugin allowlist
    - openclaw/channels/       # message routing and authorization
    - openclaw/a2a/            # A2A peer contracts and agent cards
    - openclaw/agents/         # agent definitions and runtime bindings
    - openclaw/exports/        # generated JSON artifacts for runtime
    # MaxHermes agent workspace
    - agents/maxhermes/
    # Skills registry
    - skills/
  generated:
    - dist/
    - package-lock.json
    - .clawhub/lock.json
  runtime_only:
    - .openclaw/
    - state/
    - memory/
  legacy_shell:
    - ops/workflows-legacy/
    - src/
    - public/
    - public_html/
    - components.json
    - index.html
    - CNAME
    - _headers
    - _redirects

precedence:
  - ROOT_CANON.yaml
  - AAA_CHARTER.md
  - AGENTS.md
  - SOUL.md
  - USER.md
  - arifos.init
  - IDENTITY.md
  - BOOTSTRAP.md
  - MEMORY.md
  - HEARTBEAT.md
  - TOOLS.md
  - agent-card.json

boot_load_order:
  - ROOT_CANON.yaml
  - SOUL.md
  - USER.md
  - arifos.init
  - IDENTITY.md
  - AGENTS.md
  - MEMORY.md
  - HEARTBEAT.md
  - TOOLS.md

files:
  - path: ROOT_CANON.yaml
    status: canonical
    role: root manifest
    notes: Defines precedence, file status, and boot load order.

  - path: AAA_CHARTER.md
    status: canonical
    role: architectural boundary
    notes: Defines what AAA is, is not, and what it owns.

  - path: AGENTS.md
    status: canonical
    role: operating contract
    notes: Governs session behavior, safety defaults, and workflow posture.

  - path: SOUL.md
    status: canonical
    role: voice contract
    notes: Defines tone, style, and behavioral boundaries.

  - path: USER.md
    status: canonical
    role: human anchor
    notes: Defines who Arif is and how to help him well.

  - path: IDENTITY.md
    status: canonical
    role: identity anchor
    notes: Defines the active agent identity for this workspace.

  - path: BOOTSTRAP.md
    status: canonical
    role: recovery ritual
    notes: Used when the workspace is reset, fresh, or clearly drifted.

  - path: arifos.init
    status: canonical
    role: boot kernel
    notes: Mandatory anti-drift doctrine and initialization kernel.

  - path: MEMORY.md
    status: canonical
    role: durable memory
    notes: Curated long-term memory, not chat exhaust.

  - path: HEARTBEAT.md
    status: canonical
    role: recurring checklist
    notes: Small recurring operational checklist only.

  - path: TOOLS.md
    status: canonical
    role: local environment notes
    notes: Host- and machine-specific notes for this workspace.

  - path: agent-card.json
    status: canonical
    role: agent discovery surface
    notes: Current AAA external identity and endpoint envelope.

  - path: agents/maxhermes/IDENTITY.md
    status: canonical
    role: MaxHermes identity anchor
    notes: MaxHermes-specific identity — who MaxHermes is, domain ownership, stack alignment.

  - path: agents/maxhermes/SOUL.md
    status: canonical
    role: MaxHermes voice contract
    notes: MaxHermes voice, style, and behavioral boundaries. Grounded geophysics, warm direct.

  - path: agents/maxhermes/AGENTS.md
    status: canonical
    role: MaxHermes behavioral contract
    notes: MaxHermes constitutional operating contract — verdict before force, Earth-domain rules.

