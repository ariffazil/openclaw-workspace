version: 1

skill_packages:
  - id: openclaw-a2a-bridge
    skill_ref: openclaw-a2a-bridge
    package_format: yaml
    version: "0.1.0"
    metadata:
      name: OpenClaw A2A Bridge
      description: Governed A2A bridge skill for OpenClaw-facing handoff and dispatch. Legacy skill — retained for workflow compatibility.
      owner: AAA
      risk_tier: medium
      knowledge_basis:
        physics: false
        math: true
        language: true
      maturity: candidate
    dependencies:
      skills: []
      servers:
        - arifos-mcp
      tools:
        - agent-dispatch
        - agent-handoff
        - status-query
    host_compatibility:
      - openclaw-gateway
      - claude-code
      - codex
      - copilot-cli
    install_hooks:
      - host_id: openclaw-gateway
        method: generated-config
        target_path: skills/openclaw-a2a-bridge
    source_paths:
      - registries/skills.yaml
      - skills/openclaw-a2a-bridge/SKILL.md
    runtime_exports:
      - skills/openclaw-a2a-bridge/SKILL.md
    examples:
      - OpenClaw-to-AAA gateway handoff
    tests:
      - npm run validate:aaa
    version_lock:
      schema_version: "1"
      artifact_hash: pending
      lock_file: contracts/skills/packages.yaml
      export_format: yaml

