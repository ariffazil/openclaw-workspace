version: 1

host_contracts:
  - id: openclaw-gateway
    name: OpenClaw Gateway
    host_class: gateway
    runtime_type: custom
    transport: http
    config_paths:
      - openclaw/gateway
      - openclaw/exports
    install_method: generated-config
    supported_protocols:
      - mcp
      - a2a
    platform_support:
      - windows
      - macos
      - linux
    session_contract:
      schema_ref: schemas/openclaw-acp-session.schema.json
      template_root: openclaw/acp
      required_for_agent_sessions: false
    generated_artifacts:
      - openclaw/gateway
      - openclaw/exports
      - a2a/agent-cards
    auth_modes:
      - gateway-token
      - oauth2
      - api-key+mtls
    permission_profiles:
      - id: strict
        default: true
        approval_policy: hold
        max_risk_tier: high
        remote_execution_enabled: false
    governance:
      requires_arifos_judgment_for:
        - remote-write
        - cross-lane-dispatch
        - execution-request
      requires_vault_seal_for:
        - irreversible-execution
        - deploy
      deny_if_unsealed: true

