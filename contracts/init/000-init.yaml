version: 1
id: aaa-init-000
name: AAA 000 INIT
purpose: Canonical ignition contract for AAA as a governed institutional control plane.

required_root_canons:
  - README.md
  - AGENTS.md
  - agent-card.json

boot_sequence:
  - step: readme
    path: README.md
    required: true
  - step: agents
    path: AGENTS.md
    required: true
  - step: agent-card
    path: agent-card.json
    required: true

state_anchors:
  - id: identity
    required_fields:
      - agent_id
      - role
      - runtime_class
      - bounded_authority
  - id: user
    required_fields:
      - sovereign
      - style
      - irreversible_authority
  - id: temporal
    required_fields:
      - now_iso
      - timezone
      - continuity_band
      - stale_context_detected
  - id: spatial
    required_fields:
      - workspace_root
      - environment
      - channel
      - blast_radius
  - id: continuity
    required_fields:
      - soul_loaded
      - user_loaded
      - init_loaded
      - carry_forward_confidence
  - id: authority
    required_fields:
      - floors_active
      - sovereign_veto_active
      - escalation_policy

outputs:
  - session_manifest
  - temporal_anchor
  - authority_snapshot
  - ignition_verdict

hold_conditions:
  - missing-root-canon
  - unresolved-temporal-anchor
  - wrong-workspace
  - ambiguous-audience
  - sovereign-authority-missing

telemetry:
  required: true
  fields:
    - epoch
    - verdict
    - dS
    - peace2
    - shadow

invariants:
  - session-required-before-tools
  - temporal-anchor-required-before-temporal-claims
  - wrong-workspace-is-hold
  - sovereign-veto-must-exist
