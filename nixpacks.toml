# Nixpacks configuration for arifOS MCP Server (v55.3)
# Optimized for Railway deployment

[phases.setup]
nixPkgs = ["python312", "curl", "gcc"]

[phases.build]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt",
    "pip install -e ."
]

[phases.setup.env]
PYTHON_VERSION = "3.12"

[start]
cmd = "python -m mcp.transports sse"
