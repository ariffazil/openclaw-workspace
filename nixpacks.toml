# Nixpacks configuration for arifOS MCP Server (v55.3)
# Simplified configuration for Railway deployment

[phases.setup]
nixPkgs = ["python312", "curl"]

[phases.build]
cmds = [
    "pip install -r requirements.txt",
    "pip install -e .",
    "python test_startup.py"  # Verify startup works
]

[start]
cmd = "python -m mcp.transports sse"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "on_failure"
