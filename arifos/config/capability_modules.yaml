# arifOS Capability Modules Configuration
# 16 External Tools as Capability Modules (Ring 3)
# These plug into the 5-Core Constitutional Kernel (Ring 0)
#
# Architecture:
#   5 Core (INIT, AGI, ASI, APEX, SEAL) → Govern via Floors F1-F13
#   16 Extensions → Execute via tool_router under floor enforcement
#
# Constitutional Rule: Extensions cannot call each other.
# Only Core stages can invoke Extensions via tool_router.

capability_modules:
  version: "1.0.0"
  description: "21-Tool Constitutional Architecture - 5 Core + 16 Extensions"
  
  # ========================================
  # CORE STAGE: INIT (000)
  # Pre-flight checks and session ignition
  # ========================================
  init:
    - name: "system_health_check"
      id: "C0"
      tool: "system_health"
      description: "Verify host resources before session start"
      provider: "aclip_cai"
      timeout_ms: 1000
      critical: true
      floors: ["F11", "F12"]
      
    - name: "config_flags_loader"
      id: "C5"
      tool: "config_flags"
      description: "Load environment and governance mode"
      provider: "aclip_cai"
      timeout_ms: 500
      critical: true
      floors: ["F11"]

  # ========================================
  # CORE STAGE: AGI (111-333) - The Mind (Δ)
  # Cognition, reasoning, hypothesis generation
  # ========================================
  agi:
    - name: "web_search_grounding"
      id: "T6"
      tool: "brave_search"
      description: "Real-time web search for F2 Truth grounding"
      provider: "external"
      api_key_env: "BRAVE_API_KEY"
      stages: ["agi_sense", "agi_reason"]
      floors: ["F2", "F7"]
      timeout_ms: 5000
      
    - name: "semantic_memory_query"
      id: "T7"
      tool: "chroma_query"
      description: "Vector DB retrieval for context and memory"
      provider: "aclip_cai"
      stages: ["agi_sense", "agi_think"]
      floors: ["F4", "F10"]
      timeout_ms: 3000
      
    - name: "code_execution_sandbox"
      id: "T10"
      tool: "code_sandbox"
      description: "Safe code testing for F1 reversibility validation"
      provider: "external"
      stages: ["agi_reason"]
      floors: ["F1", "F12"]
      timeout_ms: 10000
      config:
        timeout: 5
        memory_limit: "128m"
        network: false
        
    - name: "knowledge_graph_query"
      id: "T11"
      tool: "neo4j_query"
      description: "Structured data for F10 ontology grounding"
      provider: "external"
      connection_env: "NEO4J_URL"
      stages: ["agi_reason"]
      floors: ["F10"]
      timeout_ms: 5000
      
    - name: "math_solver"
      id: "T12"
      tool: "wolfram_alpha"
      description: "Symbolic mathematics for precision"
      provider: "external"
      api_key_env: "WOLFRAM_API_KEY"
      stages: ["agi_think", "agi_reason"]
      floors: ["F2"]
      timeout_ms: 8000
      
    - name: "nlp_pipeline"
      id: "T13"
      tool: "huggingface_transformers"
      description: "Advanced NLP for intent and entity extraction"
      provider: "local"
      model: "sentence-transformers/all-MiniLM-L6-v2"
      stages: ["agi_sense"]
      floors: ["F4"]
      timeout_ms: 3000

  # ========================================
  # CORE STAGE: ASI (555-666) - The Heart (Ω)
  # Empathy, ethics, stakeholder alignment
  # ========================================
  asi:
    - name: "ethics_scanner"
      id: "T14"
      tool: "perspective_api"
      description: "Toxicity and bias detection for F6 Empathy"
      provider: "external"
      api_key_env: "PERSPECTIVE_API_KEY"
      stages: ["asi_empathize", "asi_align"]
      floors: ["F6", "F9"]
      timeout_ms: 3000
      config:
        attributes:
          - "TOXICITY"
          - "SEVERE_TOXICITY"
          - "THREAT"
          - "INSULT"
        threshold: 0.7
        
    - name: "cultural_localization"
      id: "T15"
      tool: "i18n_adapter"
      description: "MY/SEA cultural adaptation (BM/EN/Chinese/Indian contexts)"
      provider: "local"
      stages: ["asi_empathize", "asi_align"]
      floors: ["F6"]
      timeout_ms: 1000
      config:
        locales: ["ms-MY", "en-GB", "zh-CN", "ta-IN"]
        fallback: "en-GB"
        cultural_nuances: true
        religious_sensitivity: true
        
    - name: "stakeholder_simulator"
      id: "T16"
      tool: "scenario_modeler"
      description: "Role-play impact simulation for stakeholder analysis"
      provider: "external"
      stages: ["asi_empathize"]
      floors: ["F6"]
      timeout_ms: 8000
      
    - name: "policy_compliance_scanner"
      id: "T17"
      tool: "regula_validator"
      description: "Legal and regulatory compliance verification"
      provider: "external"
      stages: ["asi_align"]
      floors: ["F11", "F12"]
      timeout_ms: 5000

  # ========================================
  # CORE STAGE: APEX (888) - The Soul (Ψ)
  # Final judgment, verification, verdict
  # ========================================
  apex:
    - name: "fact_verifier"
      id: "T18"
      tool: "blockchain_tracer"
      description: "Source verification via blockchain or trusted oracles"
      provider: "external"
      stages: ["apex_verdict"]
      floors: ["F2", "F3", "F8"]
      timeout_ms: 10000
      
    - name: "multi_source_grounding"
      id: "T6_extended"
      tool: "brave_search"
      description: "Tri-Witness verification (3+ independent sources)"
      provider: "external"
      api_key_env: "BRAVE_API_KEY"
      stages: ["apex_verdict"]
      floors: ["F2", "F3"]
      timeout_ms: 15000
      config:
        min_sources: 3
        cross_reference: true
        consensus_threshold: 0.8

  # ========================================
  # CORE STAGE: SEAL (999) - The Vault (🔒)
  # Output, audit, permanence
  # ========================================
  seal:
    - name: "output_renderer"
      id: "T19"
      tool: "markdown_renderer"
      description: "Format final response with visuals and text"
      provider: "local"
      stages: ["vault_seal"]
      post_process: true
      floors: ["F4"]
      timeout_ms: 2000
      
    - name: "audit_ledger"
      id: "T20"
      tool: "vault_seal_postgres"
      description: "Immutable record to PostgreSQL with Merkle verification"
      provider: "internal"
      stages: ["vault_seal"]
      floors: ["F1", "F3"]
      timeout_ms: 3000
      
    - name: "feedback_integrator"
      id: "T21"
      tool: "sentry_tracker"
      description: "Capture user corrections for Phoenix cycles"
      provider: "external"
      stages: ["vault_seal"]
      async: true
      floors: ["F7"]
      timeout_ms: 5000

# ========================================
# ROUTING CONFIGURATION
# ========================================
routing:
  # CRITICAL: Extensions cannot call each other
  # Only Core stages can invoke Extensions
  strict_isolation: true
  
  # Execution mode
  async_default: true
  
  # Timeout per stage category (milliseconds)
  timeouts:
    init: 2000
    agi: 10000
    asi: 8000
    apex: 20000
    seal: 5000
  
  # Circuit breaker settings
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    recovery_timeout_ms: 30000
    half_open_max_calls: 3

# ========================================
# MONITORING (C0 system_health integration)
# ========================================
monitoring:
  # C0 senses to activate
  enabled_senses:
    - "system_health"
    - "process_list"
    - "cost_estimator"
  
  # Metrics to track
  track_latency: true
  track_cost: true
  track_memory: true
  track_peace_squared: true
  
  # Alert thresholds
  alert_thresholds:
    peace_squared: 1.0
    latency_ms: 10000
    memory_percent: 85
    cost_per_query_usd: 0.50
  
  # Auto-throttle if thresholds exceeded
  auto_throttle: true

# ========================================
# CONSTITUTIONAL FLOOR ENFORCEMENT
# ========================================
floor_enforcement:
  # HARD floors: Block on failure
  hard_floors: ["F1", "F2", "F6", "F7", "F10", "F11", "F12", "F13"]
  
  # SOFT floors: Warn but allow with SABAR
  soft_floors: ["F3", "F4", "F5", "F8", "F9"]
  
  # Verdict on floor failure
  hard_failure_verdict: "VOID"
  soft_failure_verdict: "SABAR"
  
  # Require human confirmation for 888_HOLD triggers
  require_human_override: true
