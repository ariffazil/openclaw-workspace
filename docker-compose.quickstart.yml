# arifOS Quickstart — self-contained stack (no Traefik, no domain config)
# Usage: docker compose -f docker-compose.quickstart.yml up -d
# MCP endpoint: http://localhost:8080/mcp
# Health:       http://localhost:8080/health

services:

  postgres:
    image: postgres:16-alpine
    container_name: arifos-qs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vault999
      POSTGRES_USER: arifos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arifos_dev_only}
    volumes:
      - qs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U arifos -d vault999"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arifos_qs

  redis:
    image: redis:7-alpine
    container_name: arifos-qs-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - arifos_qs

  arifosmcp:
    image: ariffazil/arifos:latest
    container_name: arifos-qs-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      HOST: 0.0.0.0
      PORT: "8080"
      PYTHONUNBUFFERED: "1"
      # Constitutional governance
      ARIFOS_GOVERNANCE_SECRET: ${ARIFOS_GOVERNANCE_SECRET:-change_me_in_production}
      # Database
      DATABASE_URL: postgresql://arifos:${DB_PASSWORD:-arifos_dev_only}@postgres:5432/vault999
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: vault999
      POSTGRES_USER: arifos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arifos_dev_only}
      # Redis
      REDIS_URL: redis://redis:6379
      # Optional: set API keys for web search tools
      JINA_API_KEY: ${JINA_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
    healthcheck:
      test: [CMD, curl, -f, http://localhost:8080/health]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - arifos_qs

volumes:
  qs_postgres_data:

networks:
  arifos_qs:
    driver: bridge
