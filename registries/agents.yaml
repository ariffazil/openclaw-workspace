version: 1

agents:
  - id: aaa-gateway
    name: AAA Gateway
    description: Governed control-plane gateway for dispatch, handoff, and status operations.
    role: operator
    intelligence_tier: APEX
    intelligence_band: APEX
    risk_tier: medium
    authority_level: approve
    approval_policy: hold
    knowledge_basis:
      physics: false
      math: true
      language: true
    host_binding: openclaw-gateway
    allowed_tools:
      - agent-dispatch
      - agent-handoff
      - status-query
    allowed_servers:
      - arifos-mcp
      - geox-mcp
      - wealth-mcp
      - well-mcp
    a2a_exposure: authenticated
    allowed_peers:
      - aaa-gateway
      - geox-witness
      - wealth-witness
    required_auth:
      - gateway-token
      - oauth2
      - api-key+mtls
    separation_of_duties:
      cannot_self_seal: true
      requires_distinct_approver_for_high_risk: true
    max_risk_tier_for_remote: medium
    required_witnesses:
      - ARIFOS
      - HUMAN
    runtime:
      model: minimax/auto
      temperature: 0
      context_budget: 64000
      transport: streamable-http
    escalation_rules:
      - when: remote write or execution is requested
        to_role: validator
        via: approval-queue

  - id: geox-witness
    name: GEOX Witness
    description: Grounded Earth-domain witness for geology and subsurface reasoning.
    role: domain-specialist
    intelligence_tier: ASI
    intelligence_band: ASI
    risk_tier: medium
    authority_level: propose
    approval_policy: on-demand
    knowledge_basis:
      physics: true
      math: true
      language: true
    host_binding: geox-acp
    allowed_tools:
      - geox-query
      - status-query
    allowed_servers:
      - geox-mcp
    a2a_exposure: internal
    allowed_peers:
      - aaa-gateway
    required_auth:
      - gateway-token
    separation_of_duties:
      cannot_self_seal: true
      requires_distinct_approver_for_high_risk: true
    max_risk_tier_for_remote: low
    required_witnesses:
      - GEOX
      - ARIFOS
    runtime:
      model: minimax/auto
      temperature: 0
      context_budget: 32000
      transport: stdio
    escalation_rules:
      - when: non-earth decision requested
        to_role: architect
        via: aaa-gateway

  - id: wealth-witness
    name: WEALTH Witness
    description: Capital-domain witness for value, reward, and finance-sensitive reasoning.
    role: domain-specialist
    intelligence_tier: ASI
    intelligence_band: ASI
    risk_tier: medium
    authority_level: propose
    approval_policy: on-demand
    knowledge_basis:
      physics: false
      math: true
      language: true
    host_binding: wealth-acp
    allowed_tools:
      - wealth-query
      - status-query
    allowed_servers:
      - wealth-mcp
    a2a_exposure: internal
    allowed_peers:
      - aaa-gateway
    required_auth:
      - gateway-token
    separation_of_duties:
      cannot_self_seal: true
      requires_distinct_approver_for_high_risk: true
    max_risk_tier_for_remote: low
    required_witnesses:
      - WEALTH
      - ARIFOS
    runtime:
      model: minimax/auto
      temperature: 0
      context_budget: 32000
      transport: stdio
    escalation_rules:
      - when: irreversible financial action requested
        to_role: validator
        via: approval-queue
