version: 1

agents:
  - id: hermes-asi
    name: Hermes ASI
    description: >
      Hermes Agent — primary Telegram operator for Arif Fazil.
      Governed by arifOS F1–F13, wired to arifOS MCP and GEOX MCP.
      Stack: LLM (fluent) → arifOS (governance) → AAA (control plane).
      Role: hermes-agent — NOT asi-judge. ASI is arifOS kernel authority.
    role: hermes-agent
    intelligence_tier: APEX
    intelligence_band: APEX
    risk_tier: low
    authority_level: execute
    approval_policy: auto
    knowledge_basis:
      physics: false
      math: true
      language: true
    host_binding: hermes-agent
    allowed_tools:
      - terminal
      - file_read
      - file_write
      - patch
      - browser_navigate
      - browser_snapshot
      - browser_vision
      - cronjob
      - delegate_task
      - memory
      - session_search
      - skill_view
      - skill_manage
      - send_message
      - text_to_speech
      - vision_analyze
      - web_search
    allowed_servers:
      - arifosmcp
      - geoxmcp
    a2a_exposure: authenticated
    allowed_peers:
      - aaa-gateway
      - geox-witness
      - wealth-witness
    required_auth:
      - telegram-auth
    separation_of_duties:
      cannot_self_seal: true
      requires_distinct_approver_for_high_risk: false
    max_risk_tier_for_remote: low
    required_witnesses:
      - ARIFOS
      - HUMAN
    runtime:
      model: minimax/MiniMax-M2.7
      temperature: 0.2
      context_budget: 64000
      transport: streamable-http
    escalation_rules:
      - when: tool use enforcement flagged
        to_role: architect
        via: approval-queue
      - when: domain-specialist task detected
        to_role: domain-specialist
        via: aaa-gateway
  - id: aaa-gateway
    name: AAA Gateway
    description: Governed control-plane gateway for dispatch, handoff, and status operations.
    role: operator
    intelligence_tier: APEX
    intelligence_band: APEX
    risk_tier: medium
    authority_level: approve
    approval_policy: hold
    knowledge_basis:
      physics: false
      math: true
      language: true
    host_binding: openclaw-gateway
    allowed_tools:
      - agent-dispatch
      - agent-handoff
      - status-query
    allowed_servers:
      - arifos-mcp
      - geox-mcp
      - wealth-mcp
      - well-mcp
    a2a_exposure: authenticated
    allowed_peers:
      - aaa-gateway
      - geox-witness
      - wealth-witness
    required_auth:
      - gateway-token
      - oauth2
      - api-key+mtls
    separation_of_duties:
      cannot_self_seal: true
      requires_distinct_approver_for_high_risk: true
    max_risk_tier_for_remote: medium
    required_witnesses:
      - ARIFOS
      - HUMAN
    runtime:
      model: minimax/auto
      temperature: 0
      context_budget: 64000
      transport: streamable-http
    escalation_rules:
      - when: remote write or execution is requested
        to_role: validator
        via: approval-queue

  - id: geox-witness
    name: GEOX Witness
    description: Grounded Earth-domain witness for geology and subsurface reasoning.
    role: domain-specialist
    intelligence_tier: ASI
    intelligence_band: ASI
    risk_tier: medium
    authority_level: propose
    approval_policy: on-demand
    knowledge_basis:
      physics: true
      math: true
      language: true
    host_binding: geox-acp
    allowed_tools:
      - geox-query
      - status-query
    allowed_servers:
      - geox-mcp
    a2a_exposure: internal
    allowed_peers:
      - aaa-gateway
    required_auth:
      - gateway-token
    separation_of_duties:
      cannot_self_seal: true
      requires_distinct_approver_for_high_risk: true
    max_risk_tier_for_remote: low
    required_witnesses:
      - GEOX
      - ARIFOS
    runtime:
      model: minimax/auto
      temperature: 0
      context_budget: 32000
      transport: stdio
    escalation_rules:
      - when: non-earth decision requested
        to_role: architect
        via: aaa-gateway

  - id: wealth-witness
    name: WEALTH Witness
    description: Capital-domain witness for value, reward, and finance-sensitive reasoning.
    role: domain-specialist
    intelligence_tier: ASI
    intelligence_band: ASI
    risk_tier: medium
    authority_level: propose
    approval_policy: on-demand
    knowledge_basis:
      physics: false
      math: true
      language: true
    host_binding: wealth-acp
    allowed_tools:
      - wealth-query
      - status-query
    allowed_servers:
      - wealth-mcp
    a2a_exposure: internal
    allowed_peers:
      - aaa-gateway
    required_auth:
      - gateway-token
    separation_of_duties:
      cannot_self_seal: true
      requires_distinct_approver_for_high_risk: true
    max_risk_tier_for_remote: low
    required_witnesses:
      - WEALTH
      - ARIFOS
    runtime:
      model: minimax/auto
      temperature: 0
      context_budget: 32000
      transport: stdio
    escalation_rules:
      - when: irreversible financial action requested
        to_role: validator
        via: approval-queue

  - id: maxhermes
    name: MaxHermes
    description: >
      Arif's personal geophysics agent. Earth intelligence grounded by GEOX,
      governed by arifOS, wired into AAA control plane. Primary tasks:
      well-log analysis, seismic interpretation, petrophysical modeling,
      AC_Risk adjudication, and GEOX tool orchestration.
    role: domain-specialist
    intelligence_tier: ASI
    intelligence_band: ASI
    risk_tier: medium
    authority_level: propose
    approval_policy: on-demand
    knowledge_basis:
      physics: true
      math: true
      language: true
    host_binding: openclaw-maxhermes
    allowed_tools:
      - geox-query
      - geox-vault-read
      - arifos-judge
      - arifos-init
      - status-query
      - web-search
      - terminal
      - file-read
      - file-write
    allowed_servers:
      - geox-mcp
      - arifos-mcp
      - well-mcp
    a2a_exposure: authenticated
    allowed_peers:
      - aaa-gateway
      - geox-witness
      - arifos-kernel
    required_auth:
      - gateway-token
      - api-key+mtls
    separation_of_duties:
      cannot_self_seal: true
      requires_distinct_approver_for_high_risk: true
    max_risk_tier_for_remote: medium
    required_witnesses:
      - GEOX
      - ARIFOS
      - HUMAN
    runtime:
      model: minimax/auto
      temperature: 0
      context_budget: 64000
      transport: streamable-http
    escalation_rules:
      - when: ac_risk >= 0.75 or claim-grade interpretation requested
        to_role: auditor
        via: approval-queue
      - when: irreversible structural change to geox state
        to_role: validator
        via: aaa-gateway
      - when: non-earth domain task detected
        to_role: architect
        via: aaa-gateway
