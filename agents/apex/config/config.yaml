version: 1

id: apex-agent
agent_id: apex

# Runtime configuration
runtime:
  provider: ollama
  model: hermes-3-llama
  temperature: 0
  context_budget: 128000
  transport: streamable-http

# Approval tiers
approval:
  memory_read_tier: T1
  memory_write_tier: T2
  external_tool_tier: T2
  system_write_tier: T3

# Host binding
host_binding:
  type: ollama
  channels: ["a2a", "mcp"]
  memory_path: agents/apex/memory

# MCP servers
mcp_servers:
  - id: arifos-mcp
    url: http://arifosmcp:8080
    enabled: true

# A2A peers
a2a_peers:
  - agent_id: openclaw
    direction: bidirectional
    protocol: a2a-v1

  - agent_id: opencode
    direction: bidirectional
    protocol: a2a-v1

# Memory configuration
memory:
  index_enabled: true
  daily_log_path: agents/apex/memory
  durable_memory_file: agents/apex/memory/MEMORY.md
  session_path: agents/apex/memory/sessions

# Allowed tools
allowed_tools:
  # Memory operations
  - memory-read
  - memory-write
  - memory-search
  - reasoning-chain
  - ollama-inference
  # arifOS MCP - Full constitutional reasoning access
  - arif_session_init
  - arif_sense_observe
  - arif_mind_reason
  - arif_memory_recall
  - arif_heart_critique
  - arif_kernel_route
  - arif_reply_compose
  - arif_judge_deliberate
  - arif_ops_measure

# Constitutional floors
floors:
  - F1  # AMANAH: no irreversible without consent
  - F2  # TRUTH: verifiable memory, no confabulation
  - F9  # ANTIHANTU: no consciousness claims
  - F12 # INJECTION: sanitize inputs
  - F13 # SOVEREIGNTY: human veto absolute

# Risk ceiling
max_risk_tier: medium
