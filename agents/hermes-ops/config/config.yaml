version: 1

id: hermes-ops-agent
agent_id: hermes-ops

runtime:
  model: minimax/MiniMax-M2.7
  temperature: 0.2
  max_turns: 90
  show_reasoning: true

approval:
  code_read_tier: T1
  code_write_tier: T2
  git_push_tier: T2
  deploy_tier: T3
  destructive_tier: T3

host_binding:
  type: hermes
  domain: OPS
  channels: ["a2a", "mcp"]

mcp_servers:
  - id: arifos-mcp
    url: https://arifosmcp.arif-fazil.com/mcp
    enabled: true

a2a_peers:
  - agent_id: hermes-asi
    direction: bidirectional
    protocol: a2a-v1
  - agent_id: maxhermes
    direction: receive
    protocol: a2a-v1

floors:
  - F1  # AMANAH
  - F2  # TRUTH
  - F7  # HUMILITY
  - F9  # ANTIHANTU
  - F12 # INJECTION
  - F13 # SOVEREIGNTY

max_risk_tier: medium
