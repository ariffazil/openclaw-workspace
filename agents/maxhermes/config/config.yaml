version: 1

id: maxhermes-agent
agent_id: maxhermes

runtime:
  model: minimax/MiniMax-M2.7
  temperature: 0.2
  max_turns: 90
  show_reasoning: true

approval:
  geox_query_tier: T1
  earth_claim_tier: T2
  prospect_eval_tier: T3
  claim_grade_tier: T3

host_binding:
  type: hermes
  domain: GEOX
  channels: ["a2a", "mcp"]

mcp_servers:
  - id: arifos-mcp
    url: https://arifosmcp.arif-fazil.com/mcp
    enabled: true
  - id: geoxmcp
    url: https://geox.arif-fazil.com/mcp
    enabled: true

a2a_peers:
  - agent_id: hermes-asi
    direction: bidirectional
    protocol: a2a-v1
  - agent_id: hermes-ops
    direction: send
    protocol: a2a-v1

floors:
  - F1  # AMANAH
  - F2  # TRUTH
  - F7  # HUMILITY
  - F9  # ANTIHANTU
  - F13 # SOVEREIGNTY

governance_gates:
  - id: geox-ac-risk-hold
    threshold: 0.75
    verdict: HOLD
    escalate_to: human
  - id: geox-physics-violation-void
    verdict: VOID
    escalate_to: arifOS

max_risk_tier: medium
