<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glowing Filters -->
    <filter id="yellowGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Main Yellow Triangle (Mind / AGI) -->
  <path d="M256 60L466 410H46L256 60Z" stroke="#FFD700" stroke-width="8" fill="none" filter="url(#yellowGlow)" />
  <path d="M256 80L440 395H72L256 80Z" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.5" />

  <!-- The Red Cube (Forge / Action) -->
  <!-- Isometric view of a cube -->
  <g transform="translate(256, 300)" filter="url(#redGlow)">
    <!-- Back faces -->
    <path d="M0 -60 L60 -30 V30 L0 60 L-60 30 V-30 Z" fill="#440000" opacity="0.3" />
    <!-- Front Wireframe -->
    <path d="M0 -60 L60 -30 V30 L0 60 L-60 30 V-30 Z" stroke="#FF4444" stroke-width="6" fill="none" />
    <path d="M0 -60 V60" stroke="#FF4444" stroke-width="4" />
    <path d="M0 0 L60 -30" stroke="#FF4444" stroke-width="4" />
    <path d="M0 0 L-60 -30" stroke="#FF4444" stroke-width="4" />
  </g>

  <!-- The Blue Sphere (Heart / ASI) -->
  <circle cx="256" cy="300" r="45" stroke="#4444FF" stroke-width="10" fill="none" filter="url(#blueGlow)" />
  <circle cx="256" cy="300" r="45" fill="radial-gradient(circle, #0000FF 0%, transparent 70%)" opacity="0.4" />
  <!-- Internal Core Glow -->
  <circle cx="256" cy="300" r="10" fill="#FFFFFF" filter="url(#blueGlow)">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Title -->
  <text x="256" y="480" text-anchor="middle" fill="#FFFFFF" font-family="JetBrains Mono, monospace" font-size="28" font-weight="bold" letter-spacing="6">arifOS MCP</text>
  <text x="256" y="500" text-anchor="middle" fill="#666666" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">DITEMPA BUKAN DIBERI</text>
</svg>
