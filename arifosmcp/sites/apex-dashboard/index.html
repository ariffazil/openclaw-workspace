<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Sovereign | Realized Intelligence Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --accent: #00ffcc;
            --accent-dim: rgba(0, 255, 204, 0.1);
            --text: #e0e0e0;
            --dim: #666;
            --border: #222;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
            --danger: #ff4444;
            --success: #00ff88;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .motto {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .card h3 {
            margin-top: 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--dim);
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .metric-box {
            background: #151515;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--dim);
            margin-bottom: 5px;
        }

        .metric-value {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .main-score {
            font-size: 4rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
            margin: 10px 0;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        button.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        button:hover {
            border-color: var(--accent);
        }

        .input-group {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        input {
            background: #000;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 8px 12px;
            border-radius: 6px;
            flex-grow: 1;
            font-family: var(--font-mono);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-success { background: var(--success); color: #000; }
        .badge-danger { background: var(--danger); color: #fff; }

        .log-line {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 4px 0;
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(0, 255, 204, 0.4); }
            100% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip, Cell } = Recharts;

        const DEFAULT_SESSION_ID = "apex-dashboard-live";

        const toNumber = (value, fallback = 0) => {
            const numeric = Number(value);
            return Number.isFinite(numeric) ? numeric : fallback;
        };

        const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

        const buildSystemCallRequest = (endpointUrl) => {
            let pathname = endpointUrl;
            try {
                pathname = new URL(endpointUrl, window.location.href).pathname;
            } catch (_error) {
                pathname = endpointUrl;
            }

            const lowerPath = pathname.toLowerCase();

            if (lowerPath.endsWith("/anchor")) {
                return {
                    name: "anchor",
                    session_id: DEFAULT_SESSION_ID,
                    arguments: {
                        user_id: "apex-dashboard",
                        jurisdiction: "MY",
                        context: "APEX dashboard live poll",
                    },
                };
            }

            if (lowerPath.endsWith("/reason")) {
                return {
                    name: "reason",
                    session_id: DEFAULT_SESSION_ID,
                    arguments: {
                        query: "APEX dashboard live poll",
                    },
                };
            }

            return {
                name: "dashboard_probe",
                session_id: DEFAULT_SESSION_ID,
                arguments: {},
            };
        };

        const normalizeApexEnvelope = (payload) => {
            const apex = payload?.apex_output;
            if (!apex) {
                return null;
            }

            const diagnosticsSource = apex.diagnostics?.log_decomposition || apex.diagnostics || {};
            const capacity = apex.capacity_layer || {};
            const effort = apex.effort_layer || {};
            const entropy = apex.entropy_layer || {};
            const efficiency = apex.efficiency_layer || {};
            const governed = apex.governed_intelligence || {};
            const governance = apex.governance_layer || {};

            const capacityA = toNumber(capacity.A, 0);
            const capacityP = toNumber(capacity.P, 0);
            const capacityX = toNumber(capacity.X, 0);
            const capacityProduct = toNumber(
                capacity.capacity_product,
                capacityA * capacityP * capacityX
            );
            const effortE = toNumber(effort.E, 0);
            const effortAmplifier = toNumber(effort.effort_amplifier, effortE ** 2);
            const hBefore = toNumber(entropy.H_before, 1);
            const hAfter = toNumber(entropy.H_after, Math.max(0, hBefore));
            const entropyRemoved = toNumber(
                entropy.delta_S ?? efficiency.entropy_removed,
                Math.max(0, hBefore - hAfter)
            );
            const computeCost = toNumber(efficiency.C ?? efficiency.compute_cost, 0);
            const eta = toNumber(
                efficiency.eta ?? efficiency.intelligence_efficiency,
                computeCost > 0 ? entropyRemoved / computeCost : 0
            );
            const gStar = toNumber(governed.G_star, 0);
            const gDagger = toNumber(governed.G_dagger ?? governed.governed_score, 0);
            const vitalityIndex = toNumber(
                governance.vitality_index ?? governance.amanah_score,
                0
            );

            return {
                apex_output: {
                    capacity_layer: {
                        A: capacityA,
                        P: capacityP,
                        X: capacityX,
                        capacity_product: capacityProduct,
                        status: capacity.status || "unknown",
                        meaning: capacity.meaning || "",
                    },
                    effort_layer: {
                        E: effortE,
                        effort_amplifier: effortAmplifier,
                        reasoning_steps: toNumber(effort.reasoning_steps, 0),
                        tool_calls: toNumber(effort.tool_calls, 0),
                        status: effort.status || "unknown",
                        meaning: effort.meaning || "",
                    },
                    entropy_layer: {
                        H_before: hBefore,
                        H_after: hAfter,
                        delta_S: entropyRemoved,
                        status: entropy.status || "unknown",
                        meaning: entropy.meaning || "",
                    },
                    efficiency_layer: {
                        C: computeCost,
                        entropy_removed: entropyRemoved,
                        eta,
                        status: efficiency.status || "unknown",
                        meaning: efficiency.meaning || "",
                    },
                    governed_intelligence: {
                        G_star: gStar,
                        G_dagger: gDagger,
                        status: governed.status || "unknown",
                        meaning: governed.meaning || "",
                    },
                    governance_layer: {
                        vitality_index: vitalityIndex,
                        amanah_score: toNumber(governance.amanah_score, vitalityIndex),
                        truth_floor: governance.truth_floor || "Estimate Only",
                        authority_status: governance.authority_status || "Estimate Only",
                        sovereignty_status: governance.sovereignty_status || "Estimate Only",
                        tri_witness_status: governance.tri_witness_status || "Cannot Compute",
                        status: governance.status || "unknown",
                        meaning: governance.meaning || "",
                    },
                    diagnostics: {
                        logA: toNumber(diagnosticsSource.logA ?? diagnosticsSource.log_A, 0),
                        logP: toNumber(diagnosticsSource.logP ?? diagnosticsSource.log_P, 0),
                        logX: toNumber(diagnosticsSource.logX ?? diagnosticsSource.log_X, 0),
                        "2logE": toNumber(diagnosticsSource["2logE"] ?? diagnosticsSource["2log_E"], 0),
                        logDeltaS: toNumber(
                            diagnosticsSource.logDeltaS ?? diagnosticsSource.log_delta_S,
                            0
                        ),
                        logC: toNumber(diagnosticsSource.logC ?? diagnosticsSource.neg_log_C, 0),
                    },
                },
            };
        };

        const deriveApexEnvelopeFromTelemetry = (payload) => {
            const telemetry = payload?.telemetry || {};
            const dS = toNumber(telemetry.dS, 0);
            const peace2 = toNumber(telemetry.peace2, 1);
            const confidence = clamp(toNumber(telemetry.confidence, 0.85), 0, 1);
            const entropyRemoved = Math.max(0, -dS);
            const computeCost = Math.max(1, toNumber(telemetry.tokens, 0) || 100);
            const eta = entropyRemoved / computeCost;
            const capacityP = clamp(peace2 / 1.2, 0, 1);
            const capacityX = 0.75;
            const effortE = 1.0;
            const gStar = confidence * capacityP * capacityX * (effortE ** 2);
            const gDagger = gStar * eta;
            const truthFloor = dS <= 0 ? "pass" : "warn";
            const authorityStatus = payload?.result?.session_id ? "pass" : "Estimate Only";
            const sovereigntyStatus = authorityStatus;
            const triWitnessStatus = "Estimate Only";
            const amanahScore = clamp((confidence + capacityP + (dS <= 0 ? 1 : 0)) / 3, 0, 1);

            return normalizeApexEnvelope({
                apex_output: {
                    capacity_layer: {
                        A: confidence,
                        P: capacityP,
                        X: capacityX,
                        capacity_product: confidence * capacityP * capacityX,
                    },
                    effort_layer: {
                        E: effortE,
                        effort_amplifier: effortE ** 2,
                        reasoning_steps: 1,
                        tool_calls: 1,
                    },
                    entropy_layer: {
                        H_before: 1.0,
                        H_after: Math.max(0, 1.0 + dS),
                        delta_S: entropyRemoved,
                    },
                    efficiency_layer: {
                        C: computeCost,
                        entropy_removed: entropyRemoved,
                        eta,
                    },
                    governed_intelligence: {
                        G_star: gStar,
                        G_dagger: gDagger,
                    },
                    governance_layer: {
                        vitality_index: amanahScore,
                        amanah_score: amanahScore,
                        truth_floor: truthFloor,
                        authority_status: authorityStatus,
                        sovereignty_status: sovereigntyStatus,
                        tri_witness_status: triWitnessStatus,
                    },
                    diagnostics: {
                        log_decomposition: {
                            logA: confidence > 0 ? Math.log(confidence) : 0,
                            logP: capacityP > 0 ? Math.log(capacityP) : 0,
                            logX: Math.log(capacityX),
                            "2logE": 0,
                            logDeltaS: entropyRemoved > 0 ? Math.log(entropyRemoved) : 0,
                            logC: Math.log(computeCost),
                        },
                    },
                },
            });
        };

        const normalizePayload = (payload) =>
            normalizeApexEnvelope(payload) || deriveApexEnvelopeFromTelemetry(payload);

        const DEMO_DATA = normalizeApexEnvelope({
            apex_output: {
                capacity_layer: { A: 0.95, P: 0.92, X: 0.85, capacity_product: 0.7429 },
                effort_layer: { E: 0.88, effort_amplifier: 0.7744, reasoning_steps: 12, tool_calls: 3 },
                entropy_layer: { H_before: 2.4, H_after: 1.8, delta_S: 0.6 },
                efficiency_layer: { C: 120.5, entropy_removed: 0.6, eta: 0.004979 },
                governed_intelligence: { G_star: 0.5753, G_dagger: 0.002864 },
                governance_layer: {
                    vitality_index: 1.42,
                    amanah_score: 1.42,
                    truth_floor: "pass",
                    authority_status: "pass",
                    sovereignty_status: "pass",
                    tri_witness_status: "pass",
                },
                diagnostics: {
                    log_decomposition: {
                        logA: -0.051,
                        logP: -0.083,
                        logX: -0.162,
                        "2logE": -0.255,
                        logDeltaS: -0.51,
                        logC: 4.79,
                    },
                },
            }
        });

        function Dashboard() {
            const [mode, setMode] = useState('demo'); // 'demo' or 'live'
            const [endpoint, setEndpoint] = useState('http://localhost:8000/mcp/anchor');
            const [data, setData] = useState(DEMO_DATA);
            const [history, setHistory] = useState([]);
            const [isPolling, setIsPolling] = useState(false);

            useEffect(() => {
                let interval;
                if (mode === 'live' && isPolling) {
                    interval = setInterval(fetchData, 3000);
                }
                return () => clearInterval(interval);
            }, [mode, isPolling, endpoint]);

            const fetchData = async () => {
                try {
                    const res = await fetch(endpoint, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(buildSystemCallRequest(endpoint)),
                    });
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }
                    const json = await res.json();
                    const normalized = normalizePayload(json);
                    if (normalized) {
                        setData(normalized);
                        setHistory(prev => [
                            ...prev.slice(-19),
                            normalized.apex_output.governed_intelligence.G_dagger,
                        ]);
                    }
                } catch (e) {
                    console.error("Fetch failed", e);
                }
            };

            const radarData = useMemo(() => [
                { subject: 'Akal (A)', A: data.apex_output.capacity_layer.A, fullMark: 1 },
                { subject: 'Peace (P)', A: data.apex_output.capacity_layer.P, fullMark: 1 },
                { subject: 'Exploration (X)', A: data.apex_output.capacity_layer.X, fullMark: 1 },
                { subject: 'Effort (E)', A: data.apex_output.effort_layer.E, fullMark: 1 },
                { subject: 'Efficiency (η)', A: Math.min(1, data.apex_output.efficiency_layer.eta * 100), fullMark: 1 },
            ], [data]);

            const logData = useMemo(() => [
                { name: 'logA', val: data.apex_output.diagnostics.logA },
                { name: 'logP', val: data.apex_output.diagnostics.logP },
                { name: 'logX', val: data.apex_output.diagnostics.logX },
                { name: '2logE', val: data.apex_output.diagnostics["2logE"] },
                { name: 'logΔS', val: data.apex_output.diagnostics.logDeltaS },
                { name: '-logC', val: -data.apex_output.diagnostics.logC },
            ], [data]);

            const apex = data.apex_output;

            return (
                <div style={{width: '100%'}}>
                    <header>
                        <div className="title">
                            <div className="motto">Ditempa Bukan Diberi</div>
                            <h1>APEX Sovereign Dashboard</h1>
                        </div>
                        <div className="controls">
                            <button className={mode === 'demo' ? 'active' : ''} onClick={() => {setMode('demo'); setData(DEMO_DATA);}}>Static Demo</button>
                            <button className={mode === 'live' ? 'active' : ''} onClick={() => setMode('live')}>Live Fetch</button>
                        </div>
                    </header>

                    {mode === 'live' && (
                        <div className="input-group">
                            <input value={endpoint} onChange={e => setEndpoint(e.target.value)} placeholder="MCP Endpoint URL..." />
                            <button className={isPolling ? 'active' : ''} onClick={() => setIsPolling(!isPolling)}>
                                {isPolling ? 'Stop Polling' : 'Start Polling'}
                            </button>
                        </div>
                    )}

                    <div className="container">
                        {/* Realized Intelligence G† */}
                        <div className="card">
                            <h3>Governed Intelligence Realized (G†)</h3>
                            <div style={{display: 'flex', alignItems: 'center', justifyContent: 'center', height: '300px', flexDirection: 'column'}}>
                                <div className="main-score pulse">{apex.governed_intelligence.G_dagger.toFixed(6)}</div>
                                <div style={{color: 'var(--dim)', fontSize: '0.8rem'}}>G† = G* · η</div>
                                <div style={{marginTop: '20px'}}>
                                    <span className={`badge ${apex.governed_intelligence.G_dagger >= 0.001 ? 'badge-success' : 'badge-danger'}`}>
                                        {apex.governed_intelligence.G_dagger >= 0.001 ? 'Governed Seal' : 'Insufficient realization'}
                                    </span>
                                </div>
                            </div>
                        </div>

                        {/* Triad Geometry */}
                        <div className="card">
                            <h3>Discipline Geometry (APX vs E vs η)</h3>
                            <div style={{height: '300px'}}>
                                <ResponsiveContainer width="100%" height="100%">
                                    <RadarChart cx="50%" cy="50%" outerRadius="80%" data={radarData}>
                                        <PolarGrid stroke="#333" />
                                        <PolarAngleAxis dataKey="subject" tick={{fill: '#999', fontSize: 10}} />
                                        <Radar name="Intelligence" dataKey="A" stroke="#00ffcc" fill="#00ffcc" fillOpacity={0.3} />
                                    </RadarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Metrics Grid */}
                        <div className="card full-width">
                            <h3>5-Layer Intelligence Stack</h3>
                            <div className="metric-grid">
                                <div className="metric-box">
                                    <div className="metric-label">Capacity (A·P·X)</div>
                                    <div className="metric-value">{apex.capacity_layer.capacity_product.toFixed(4)}</div>
                                </div>
                                <div className="metric-box">
                                    <div className="metric-label">Effort (E²)</div>
                                    <div className="metric-value">{apex.effort_layer.effort_amplifier.toFixed(4)}</div>
                                </div>
                                <div className="metric-box">
                                    <div className="metric-label">Clarity (ΔS)</div>
                                    <div className="metric-value">{apex.entropy_layer.delta_S.toFixed(2)}</div>
                                </div>
                                <div className="metric-box">
                                    <div className="metric-label">Efficiency (η)</div>
                                    <div className="metric-value">{apex.efficiency_layer.eta.toFixed(6)}</div>
                                </div>
                                <div className="metric-box">
                                    <div className="metric-label">Potential (G*)</div>
                                    <div className="metric-value">{apex.governed_intelligence.G_star.toFixed(4)}</div>
                                </div>
                            </div>
                        </div>

                        {/* Log Decomposition */}
                        <div className="card">
                            <h3>Log-Decomposition (Realization Drivers)</h3>
                            <div style={{height: '250px'}}>
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={logData} layout="vertical">
                                        <XAxis type="number" domain={[-6, 2]} hide />
                                        <YAxis dataKey="name" type="category" tick={{fill: '#999', fontSize: 10}} width={60} />
                                        <Tooltip cursor={{fill: '#151515'}} contentStyle={{background: '#000', border: '1px solid #333'}} />
                                        <Bar dataKey="val">
                                            {logData.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={entry.val >= 0 ? '#00ffcc' : '#ff4444'} />
                                            ))}
                                        </Bar>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Governance Status */}
                        <div className="card">
                            <h3>Governance Integrity</h3>
                            <div style={{display: 'flex', flexDirection: 'column', gap: '10px'}}>
                                <div className="log-line">
                                    <span>Vitality Index (Ψ)</span>
                                    <span style={{color: apex.governance_layer.vitality_index >= 1.0 ? 'var(--success)' : 'var(--danger)'}}>
                                        {apex.governance_layer.vitality_index.toFixed(2)}
                                    </span>
                                </div>
                                <div className="log-line">
                                    <span>F2 Truth Floor</span>
                                    <span className={`badge ${apex.governance_layer.truth_floor === 'pass' ? 'badge-success' : 'badge-danger'}`}>
                                        {apex.governance_layer.truth_floor}
                                    </span>
                                </div>
                                <div className="log-line">
                                    <span>F11 Authority</span>
                                    <span className={`badge ${apex.governance_layer.authority_status === 'pass' ? 'badge-success' : 'badge-danger'}`}>
                                        {apex.governance_layer.authority_status}
                                    </span>
                                </div>
                                <div className="log-line">
                                    <span>F13 Sovereignty</span>
                                    <span className={`badge ${apex.governance_layer.sovereignty_status === 'pass' ? 'badge-success' : 'badge-danger'}`}>
                                        {apex.governance_layer.sovereignty_status}
                                    </span>
                                </div>
                                <div className="log-line">
                                    <span>F3 Tri-Witness</span>
                                    <span className={`badge ${apex.governance_layer.tri_witness_status === 'pass' ? 'badge-success' : 'badge-danger'}`}>
                                        {apex.governance_layer.tri_witness_status}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <footer style={{marginTop: '40px', color: '#333', fontSize: '0.7rem', textAlign: 'center', width: '100%'}}>
                        ARIFOS L0 KERNEL | VERSION 2026.03.08-FORGE | APEX THEOREM GOVERNANCE ACTIVE
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
