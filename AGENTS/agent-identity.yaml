      uuid: "agent://arifos/architect"
      fingerprint: "sha256:architect-v2026.03.14"
      created: "2026-03-14T00:00:00Z"
      owner: "Muhammad Arif bin Fazil"
    
    # Policy: What this agent can and cannot do
    policy:
      capability_class: "READ-PLAN"
      max_execution_scope: "design-only"
      can_modify_code: false
      can_deploy: false
      can_destroy: false
      requires_human_approval: false
      
      # Tool permissions (explicit allowlist)
      tool_permissions:
        allowed:
          - read_file
          - search_reality
          - ingest_evidence
          - session_memory
          - lsp_query_tool
          - office_forge_audit
        forbidden:
          - lsp_rename_tool      # 888_HOLD required
          - forge_office_document # 888_HOLD required
          - file_write           # ENGINEER only
          - file_delete          # VALIDATOR only
          - shell_execute        # No agent has this
          - docker_deploy        # VALIDATOR only
      
      # Constitutional floors enforced
      constitutional_bindings:
        F1_Amanah: {threshold: 0.5, enforced: true}
        F2_Truth: {threshold: 0.99, enforced: true}
        F4_Clarity: {threshold: 0.0, enforced: true}
        F7_Humility: {range: [0.03, 0.05], enforced: true}
      
      # Execution boundaries
      boundaries:
        max_file_size_mb: 10
        max_search_results: 20
        max_reasoning_steps: 7
        forbidden_patterns:
          - "rm -rf"
          - "DROP TABLE"
          - "DELETE FROM"
          - "docker system prune"
    
    # Receipt configuration
    receipts:
      require_execution_log: true
      require_constitutional_check: true
      vault_seal: true

