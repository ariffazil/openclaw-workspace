# ═══════════════════════════════════════════════════════════════════════════════
# EXECUTION RECEIPT SCHEMA
# ═══════════════════════════════════════════════════════════════════════════════

execution_receipt_schema:
  receipt_id: "uuid"
  timestamp: "iso8601"
  agent_id: "agent://arifos/{role}"
  session_id: "uuid"
  
  request:
    intent: "string"
    tools_requested: ["tool_name"]
    files_accessed: ["path"]
  
  policy_check:
    agent_authorized: "boolean"
    tools_allowed: "boolean"
    within_boundaries: "boolean"
    constitutional_passed: "boolean"
  
  execution:
    tools_executed: ["tool_name"]
    files_modified: ["path"]
    files_created: ["path"]
    files_deleted: ["path"]
  
  verdict:
    status: "SEAL|VOID|888_HOLD"
    floors_triggered: ["F1", "F2", ...]
    human_approval: "APPROVED|PENDING|REQUIRED"
  
  vault:
    sealed_to_vault999: "boolean"
    merkle_hash: "sha256"

