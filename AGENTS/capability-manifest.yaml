        requires_approval: true
      - operation: "git commit"
        agents: ["A-ENGINEER"]
        requires_approval: true
      - operation: "git push"
        agents: ["A-VALIDATOR"]
        requires_approval: true
      - operation: "git revert"
        agents: ["A-VALIDATOR"]
        requires_approval: true

