# ═══════════════════════════════════════════════════════════════════════════════
# AGENT SELF-QUERY INTERFACE
# ═══════════════════════════════════════════════════════════════════════════════

# Each agent reads this manifest before acting to answer:
# - What tools can I use?
# - What is broken right now?
# - What credentials do I have?
# - Where can I write?
# - What needs human approval?

self_query_interface:
  # Query: What tools are available to me?
  query_tools:
    filter: "agents_allowed contains {my_agent_id} AND health = healthy"
    return: ["name", "description", "requires_auth", "risk_tier"]
  
  # Query: What is broken?
  query_broken:
    filter: "status in [degraded, broken]"
    return: ["component", "status", "reason", "workaround"]
  
  # Query: What credentials do I have?
  query_credentials:
    filter: "agent_credentials[{my_agent_id}]"
    return: ["class", "tokens", "requires_approval_for", "cannot_access"]
  
  # Query: Where can I write?
  query_writable:
    filter: "writable_paths.agents contains {my_agent_id}"
    return: ["path", "recursive", "requires_approval"]
  
  # Query: What needs human approval?
  query_approval_required:
    filter: "always_requires_human OR context_dependent.condition = true"
    return: ["action", "reason", "condition"]

