# ═══════════════════════════════════════════════════════════════════════════════
# CREDENTIALS - What Auth Exists
# ═══════════════════════════════════════════════════════════════════════════════

credentials:
  # By class - agents check this to know what they can authenticate as
  classes:
    class_a_sovereign:
      description: "Full sovereign authority (human)"
      holder: "Muhammad Arif bin Fazil"
      scope: ["*"]
      can_override: true
    
    class_b_agent:
      description: "Agent execution authority"
      holders: ["A-ARCHITECT", "A-ENGINEER", "A-AUDITOR", "A-VALIDATOR"]
      scope: ["read", "edit", "audit"]
      can_override: false
      requires_human_for: ["deploy", "destroy", "888_HOLD"]
    
    class_c_service:
      description: "Service-to-service auth"
      holders: ["mcp_server", "vault999", "event_bus"]
      scope: ["internal"]
      can_override: false
  
  # What each agent can authenticate with
  agent_credentials:
    A-ARCHITECT:
      class: "class_b_agent"
      tokens: ["read", "plan"]
      cannot_access: ["deploy", "delete", "shell"]
    
    A-ENGINEER:
      class: "class_b_agent"
      tokens: ["read", "write", "edit"]
      requires_approval_for: ["write", "edit"]
      cannot_access: ["deploy", "delete", "shell"]
    
    A-AUDITOR:
      class: "class_b_agent"
      tokens: ["read", "audit"]
      special: "can_issue_void"
      cannot_access: ["write", "edit", "deploy", "delete", "shell"]
    
    A-VALIDATOR:
      class: "class_b_agent"
      tokens: ["read", "write", "edit", "delete", "deploy"]
      requires_approval_for: ["write", "edit", "delete", "deploy"]
      special: "can_issue_seal"
      cannot_access: ["shell"]

