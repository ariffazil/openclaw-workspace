# arifOS Event Bus
# Event-Driven Agent Orchestration for VPS
# Version: 2026.03.14-FORGED
# Authority: 888_JUDGE

# ═══════════════════════════════════════════════════════════════════════════════
# 6 BLINDSPOT #3: Event-Driven Orchestration (Not Just Pull)
# ═══════════════════════════════════════════════════════════════════════════════
# Agents react to system truth automatically: git drift, container restarts,
# health degradation, provider failures, resource pressure, Telegram commands,
# and deploy completion. The VPS becomes a living operating substrate.
# ═══════════════════════════════════════════════════════════════════════════════

constitutional_version: "2026.03.14-FORGED"
bus_id: "arifos-event-bus"
authority: "888_JUDGE"
mode: "pub-sub"

# ═══════════════════════════════════════════════════════════════════════════════
# EVENT SOURCES - System Truth Generators
# ═══════════════════════════════════════════════════════════════════════════════

event_sources:
  # 1. GIT DRIFT - Repository changes
  git_drift:
    description: "Changes in git repository state"
    events:
      - name: "git.push"
        payload:
          branch: "string"
          commit: "sha"
          author: "string"
          message: "string"
          files_changed: ["path"]
      - name: "git.pull_request"
        payload:
          pr_number: "int"
          source_branch: "string"
          target_branch: "string"
          author: "string"
      - name: "git.merge"
        payload:
          branch: "string"
          commit: "sha"
          merged_by: "string"
    
    agent_reactions:
      git.push:
        - agent: "A-AUDITOR"
          action: "review_commit"
          condition: "branch = main"
        - agent: "A-VALIDATOR"
          action: "validate_deployment_candidate"
          condition: "branch = main AND tests_passing"

  # 2. CONTAINER LIFECYCLE - Docker events
  container_events:
    description: "Docker container state changes"
    events:
      - name: "container.start"
        payload:
          container_id: "string"
          image: "string"
          name: "string"
      - name: "container.stop"
        payload:
          container_id: "string"
          exit_code: "int"
          reason: "string"
      - name: "container.restart"
        payload:
          container_id: "string"
          restart_count: "int"
      - name: "container.health_check_failed"
        payload:
          container_id: "string"
          health_status: "unhealthy"
          consecutive_failures: "int"
    
    agent_reactions:
      container.health_check_failed:
        - agent: "A-ENGINEER"
          action: "investigate_container_failure"
          condition: "consecutive_failures >= 3"
        - agent: "A-VALIDATOR"
          action: "consider_rollback"
          condition: "consecutive_failures >= 5"

  # 3. HEALTH DEGRADATION - System health changes
  health_degradation:
    description: "Health status changes in services"
    events:
      - name: "health.warning"
        payload:
          service: "string"
          metric: "string"
          current_value: "float"
          threshold: "float"
          severity: "warning"
      - name: "health.critical"
        payload:
          service: "string"
          metric: "string"
          current_value: "float"
          threshold: "float"
          severity: "critical"
      - name: "health.recovered"
        payload:
          service: "string"
          metric: "string"
          previous_severity: "warning|critical"
    
    agent_reactions:
      health.warning:
        - agent: "A-AUDITOR"
          action: "monitor_and_log"
          condition: "severity = warning"
      health.critical:
        - agent: "A-ENGINEER"
          action: "emergency_investigation"
          condition: "severity = critical"
        - agent: "A-VALIDATOR"
          action: "prepare_rollback"
          condition: "service = core_kernel"

  # 4. PROVIDER FAILURE - External service failures
  provider_failure:
    description: "External API or service failures"
    events:
      - name: "provider.outage"
        payload:
          provider: "string"
          service: "string"
          error_code: "string"
          region: "string"
      - name: "provider.rate_limited"
        payload:
          provider: "string"
          retry_after: "int"
      - name: "provider.degraded"
        payload:
          provider: "string"
          latency_ms: "int"
          error_rate: "float"
    
    agent_reactions:
      provider.outage:
        - agent: "A-ARCHITECT"
          action: "design_fallback_strategy"
        - agent: "A-ENGINEER"
          action: "activate_fallback_provider"
          condition: "provider = primary_llm"

  # 5. RESOURCE PRESSURE - System resources
  resource_pressure:
    description: "CPU, memory, disk pressure events"
    events:
      - name: "resource.disk_warning"
        payload:
          mount: "string"
          used_percent: "float"
          free_gb: "float"
      - name: "resource.disk_critical"
        payload:
          mount: "string"
          used_percent: "float"
          free_gb: "float"
      - name: "resource.memory_warning"
        payload:
          used_percent: "float"
          available_gb: "float"
      - name: "resource.memory_critical"
        payload:
          used_percent: "float"
          available_gb: "float"
      - name: "resource.cpu_high"
        payload:
          load_average: "float"
          duration_minutes: "int"
    
    agent_reactions:
      resource.disk_warning:
        - agent: "A-AUDITOR"
          action: "log_and_monitor"
      resource.disk_critical:
        - agent: "A-ENGINEER"
          action: "emergency_cleanup"
          condition: "mount = /var/log OR mount = /tmp"
        - agent: "A-VALIDATOR"
          action: "pause_non_critical_tasks"

  # 6. TELEGRAM COMMANDS - Human intents
  telegram_commands:
    description: "Commands from Telegram bot"
    events:
      - name: "telegram.command"
        payload:
          command: "string"
          args: ["string"]
          user_id: "string"
          username: "string"
          chat_id: "string"
        
        # Valid commands and handlers
        handlers:
          /status:
            agent: "A-AUDITOR"
            action: "report_system_status"
          /deploy:
            agent: "A-VALIDATOR"
            action: "initiate_deployment_workflow"
            requires_approval: true
          /rollback:
            agent: "A-VALIDATOR"
            action: "execute_rollback"
            requires_approval: true
          /audit:
            agent: "A-AUDITOR"
            action: "run_constitutional_audit"
          /vault:
            agent: "A-VALIDATOR"
            action: "verify_vault_integrity"
          /emergency:
            agent: "A-VALIDATOR"
            action: "emergency_protocol"
            requires_approval: true
            escalates_to_human: true

  # 7. DEPLOYMENT COMPLETION - Deploy pipeline
  deployment_completion:
    description: "Deployment lifecycle events"
    events:
      - name: "deploy.started"
        payload:
          deployment_id: "uuid"
          version: "string"
          target: "staging|production"
      - name: "deploy.completed"
        payload:
          deployment_id: "uuid"
          version: "string"
          target: "string"
          duration_seconds: "int"
          status: "success|failure"
      - name: "deploy.canary_healthy"
        payload:
          deployment_id: "uuid"
          canary_percent: "int"
          metrics:
            error_rate: "float"
            latency_p95: "int"
      - name: "deploy.canary_unhealthy"
        payload:
          deployment_id: "uuid"
          canary_percent: "int"
          metrics:
            error_rate: "float"
            latency_p95: "int"
          reason: "string"
    
    agent_reactions:
      deploy.canary_unhealthy:
        - agent: "A-VALIDATOR"
          action: "auto_rollback"
          condition: "error_rate > 0.05"
          requires_human_approval: false  # Emergency auto-rollback
      deploy.completed:
        - agent: "A-AUDITOR"
          action: "post_deployment_audit"
          condition: "target = production"

# ═══════════════════════════════════════════════════════════════════════════════
# EVENT ROUTING - Who Listens to What
# ═══════════════════════════════════════════════════════════════════════════════

routing:
  # A-ARCHITECT: Reacts to design-affecting events
  A-ARCHITECT:
    listens:
      - "git.pull_request"          # New features need design review
      - "provider.outage"           # May need architecture change
      - "health.critical"           # May indicate design flaw
    priority: "normal"
    max_concurrent: 2
  
  # A-ENGINEER: Reacts to implementation events
  A-ENGINEER:
    listens:
      - "git.push"                  # Changes to implement
      - "container.health_check_failed"  # Bugs to fix
      - "health.critical"           # Issues to investigate
      - "provider.outage"           # Fallback to activate
      - "resource.disk_critical"    # Emergency cleanup
    priority: "high"
    max_concurrent: 3
  
  # A-AUDITOR: Reacts to quality/compliance events
  A-AUDITOR:
    listens:
      - "git.push"                  # Code to review
      - "health.warning"            # Monitor trends
      - "deploy.completed"          # Post-deploy audit
      - "telegram.command:/audit"   # Manual audit request
      - "telegram.command:/status"  # Status check
    priority: "normal"
    max_concurrent: 2
  
  # A-VALIDATOR: Reacts to deployment/critical events
  A-VALIDATOR:
    listens:
      - "deploy.canary_unhealthy"   # Auto-rollback trigger
      - "deploy.canary_healthy"     # Proceed with rollout
      - "container.health_check_failed"  # Consider rollback
      - "health.critical"           # Prepare rollback
      - "telegram.command:/deploy"  # Manual deploy
      - "telegram.command:/rollback" # Manual rollback
      - "telegram.command:/emergency" # Emergency protocol
    priority: "critical"
    max_concurrent: 1  # Serial execution for safety
    requires_human_approval: true

# ═══════════════════════════════════════════════════════════════════════════════
# EVENT PROCESSING RULES
# ═══════════════════════════════════════════════════════════════════════════════

processing_rules:
  # Rule 1: Event deduplication
  deduplication:
    window_seconds: 30
    key_fields: ["source", "type", "payload.container_id"]
    action: "drop_duplicate"
  
  # Rule 2: Rate limiting per agent
  rate_limiting:
    A-ARCHITECT:
      max_events_per_minute: 10
      burst_allowance: 5
    A-ENGINEER:
      max_events_per_minute: 20
      burst_allowance: 10
    A-AUDITOR:
      max_events_per_minute: 15
      burst_allowance: 5
    A-VALIDATOR:
      max_events_per_minute: 5
      burst_allowance: 2
  
  # Rule 3: Circuit breaker for failing agents
  circuit_breaker:
    failure_threshold: 3
    recovery_timeout_seconds: 60
    fallback: "escalate_to_human"
  
  # Rule 4: Event priority override
  priority_override:
    - event: "health.critical"
      override_priority: "critical"
    - event: "deploy.canary_unhealthy"
      override_priority: "critical"
    - event: "telegram.command:/emergency"
      override_priority: "critical"

# ═══════════════════════════════════════════════════════════════════════════════
# EVENT BUS IMPLEMENTATION
# ═══════════════════════════════════════════════════════════════════════════════

implementation:
  transport: "redis-pub-sub"  # Or "in-memory" for single-node
  persistence: "VAULT999"
  
  # For VPS deployment
  vps_config:
    redis_host: "localhost"
    redis_port: 6379
    redis_channel: "arifos-events"
    
    # Event capture from system
    collectors:
      - name: "docker-events"
        command: "docker events --format '{{json .}}'"
        events: ["container.*"]
      
      - name: "system-metrics"
        command: "sar -u -r -d 1"
        events: ["resource.*"]
      
      - name: "git-webhook"
        endpoint: "/webhooks/git"
        events: ["git.*"]
      
      - name: "telegram-bot"
        webhook: "/webhooks/telegram"
        events: ["telegram.*"]

motto: "Ditempa Bukan Diberi — Forged, Not Given"

