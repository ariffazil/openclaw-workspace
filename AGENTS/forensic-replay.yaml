# arifOS Forensic Replay System
# Immutable Operational Replay for Trainable Reflection
# Version: 2026.03.14-FORGED
# Authority: 888_JUDGE

# ═══════════════════════════════════════════════════════════════════════════════
# 6 BLINDSPOT #6: Immutable Operational Replay
# ═══════════════════════════════════════════════════════════════════════════════
# Complete forensic lane: prompt input → tool call chain → file diffs → command
# outputs → final decision record. If you get this right, your system becomes
# trainable by reflection, not just usable.
# ═══════════════════════════════════════════════════════════════════════════════

constitutional_version: "2026.03.14-FORGED"
system_id: "arifos-forensic-replay"
authority: "888_JUDGE"
seal: "TRINITY"

# ═══════════════════════════════════════════════════════════════════════════════
# REPLAY ARTIFACT SCHEMA - Complete Forensic Record
# ═══════════════════════════════════════════════════════════════════════════════

replay_artifact:
  # Unique identifier for this replay session
  replay_id: "uuid"
  session_id: "uuid"
  timestamp:
    started: "iso8601"
    completed: "iso8601"
    duration_ms: "int"
  
  # Human or external trigger
  trigger:
    type: "manual|auto|scheduled|incident"
    actor: "string"  # Who requested replay
    reason: "string"
  
  # ═══════════════════════════════════════════════════════════════════════════
  # 1. PROMPT INPUT - What the agent was asked
  # ═══════════════════════════════════════════════════════════════════════════
  prompt_input:
    original_prompt: "string"
    prompt_hash: "sha256"
    
    # Enrichment
    context_provided:
      files: ["path"]
      observations: ["uuid"]
      previous_decisions: ["uuid"]
    
    # Constitutional framing
    constitutional_context:
      active_floors: ["F1", "F2", "F4"]
      risk_tier: "low|medium|high|critical"
      human_approval_required: "boolean"
    
    # Agent state at prompt time
    agent_state:
      agent_id: "agent://arifos/{role}"
      memory_loaded: ["memory_uuid"]
      capability_manifest_version: "string"
      health_status: "healthy|degraded"

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. TOOL CALL CHAIN - Every tool invocation
  # ═══════════════════════════════════════════════════════════════════════════
  tool_call_chain:
    description: "Sequential record of all tool executions"
    
    chain:
      - step: 1
        timestamp: "iso8601"
        tool_name: "read_file"
        agent_decision:
          reasoning: "string"
          constitutional_check:
            F1_Amanah: {passed: true, score: 0.95}
            F2_Truth: {passed: true, score: 0.99}
        request:
          parameters: {path: "C:\\arifosmcp\\AGENTS\\README.md"}
        execution:
          started: "iso8601"
          completed: "iso8601"
          duration_ms: 45
          status: "success"
        result:
          output_type: "file_content"
          output_size_bytes: 12345
          output_hash: "sha256:abc123"
          summary: "Read 319 lines from README.md"
        
      - step: 2
        timestamp: "iso8601"
        tool_name: "search_reality"
        agent_decision:
          reasoning: "string"
          constitutional_check:
            F2_Truth: {passed: true, score: 0.95}
        request:
          parameters: {query: "MCP server governance patterns"}
        execution:
          started: "iso8601"
          completed: "iso8601"
          duration_ms: 2345
          status: "success"
        result:
          output_type: "search_results"
          output_size_bytes: 5678
          sources: ["url1", "url2"]
          summary: "Found 5 relevant sources"
      
      # ... more steps
    
    # Chain integrity
    total_steps: "int"
    successful_steps: "int"
    failed_steps: "int"
    blocked_steps: "int"  # 888_HOLD triggered

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. FILE DIFFS - All filesystem changes
  # ═══════════════════════════════════════════════════════════════════════════
  file_diffs:
    description: "Complete record of file modifications"
    
    diffs:
      - file_path: "C:\\arifosmcp\\AGENTS\\README.md"
        operation: "modified"
        diff_type: "unified"
        
        before:
          content_hash: "sha256:before123"
          size_bytes: 10000
          line_count: 300
        
        after:
          content_hash: "sha256:after456"
          size_bytes: 10500
          line_count: 319
        
        diff_stats:
          lines_added: 25
          lines_removed: 6
          lines_unchanged: 275
        
        diff_content: |
          @@ -10,5 +10,8 @@
           **Motto:** *Ditempa Bukan Diberi*
          
          +## Start Here
          +
          +This document...
        
        constitutional_review:
          F4_Clarity: {delta_s: -0.23, passed: true}
          F6_Empathy: {kappa_r: 0.92, passed: true}
    
    summary:
      files_modified: ["path"]
      files_created: ["path"]
      files_deleted: ["path"]
      total_changes: "int"

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. COMMAND OUTPUTS - Shell/command results
  # ═══════════════════════════════════════════════════════════════════════════
  command_outputs:
    description: "Results from shell/docker/system commands"
    
    commands:
      - command: "docker ps"
        timestamp: "iso8601"
        exit_code: 0
        stdout: |
          CONTAINER ID   IMAGE          STATUS
          abc123         arifos-mcp     Up 2 hours
        stderr: ""
        duration_ms: 234
        agent_interpretation: "MCP server running normally"
      
      - command: "pytest tests/ -q"
        timestamp: "iso8601"
        exit_code: 0
        stdout: |
          450 passed, 3 skipped, 0 failed
        stderr: ""
        duration_ms: 15000
        agent_interpretation: "All tests passing"
    
    summary:
      commands_executed: "int"
      successful: "int"
      failed: "int"
      total_duration_ms: "int"

  # ═══════════════════════════════════════════════════════════════════════════
  # 5. FINAL DECISION RECORD - What the agent decided
  # ═══════════════════════════════════════════════════════════════════════════
  final_decision:
    description: "Ultimate verdict and reasoning"
    
    decision:
      timestamp: "iso8601"
      verdict: "SEAL|VOID|888_HOLD|PARTIAL|SABAR"
      
      reasoning:
        summary: "string"
        evidence_cited: ["observation_uuid", "tool_call_id"]
        constitutional_basis:
          - floor: "F2"
            reasoning: "Evidence supports conclusion"
          - floor: "F4"
            reasoning: "Clarity improved (ΔS = -0.23)"
      
      # Tri-Witness scores
      tri_witness:
        human: 0.95
        ai: 0.92
        system: 0.98
        W3: 0.95
      
      # Confidence metrics
      confidence:
        G_Genius: 0.87
        Omega_Uncertainty: 0.04
        overall: 0.91
      
      # Outcome
      artifacts_produced: ["path"]
      tasks_completed: ["uuid"]
      tasks_deferred: ["uuid"]
      
      # If VOID, why
      void_reason: "string|null"
      floors_violated: ["F1", "F4"]
      
      # If 888_HOLD, what approval needed
      hold_reason: "string|null"
      required_approvals: ["human_sovereign"]

  # ═══════════════════════════════════════════════════════════════════════════
  # 6. REFLECTION METADATA - For training
  # ═══════════════════════════════════════════════════════════════════════════
  reflection_metadata:
    trainable_insights:
      - type: "decision_quality"
        assessment: "good|poor|uncertain"
        evidence: "Outcome matched prediction"
      
      - type: "tool_efficiency"
        assessment: "optimal|wasteful"
        evidence: "3 tools used for simple task"
      
      - type: "constitutional_compliance"
        assessment: "full|partial|violation"
        floors_passed: ["F1", "F2", "F4"]
        floors_failed: []
      
      - type: "pattern_match"
        similar_past_decisions: ["replay_uuid"]
        outcome_consistency: "consistent|divergent"
    
    # For human review
    human_review_notes: "string|null"
    review_status: "pending|approved|flagged"
    reviewer: "string|null"

# ═══════════════════════════════════════════════════════════════════════════════
# REPLAY QUERIES - "Why Did The Agent Do This?"
# ═══════════════════════════════════════════════════════════════════════════════

replay_queries:
  # Query 1: Show me everything agent X did
  full_session_replay:
    description: "Complete replay of a session"
    parameters:
      session_id: "uuid"
      include_diffs: true
      include_commands: true
    returns:
      - prompt_input
      - tool_call_chain
      - file_diffs
      - command_outputs
      - final_decision
  
  # Query 2: Why did the agent modify file X?
  file_provenance:
    description: "Trace all decisions affecting a file"
    parameters:
      file_path: "path"
      time_range: ["iso8601", "iso8601"]
    returns:
      - modifications: [{replay_id, timestamp, agent, decision}]
      - rationale_chain: ["string"]
  
  # Query 3: What decisions led to this error?
  error_forensics:
    description: "Trace decisions leading to an error"
    parameters:
      error_type: "string"
      time_range: ["iso8601", "iso8601"]
    returns:
      - decision_chain: [{replay_id, decision, outcome}]
      - root_cause: "string"
      - preventing_factors: ["string"]
  
  # Query 4: Compare this decision to similar past decisions
  pattern_comparison:
    description: "Find similar past decisions"
    parameters:
      replay_id: "uuid"
      similarity_threshold: 0.85
    returns:
      - similar_decisions: [{replay_id, similarity_score, outcome}]
      - consistency_analysis: "string"
  
  # Query 5: What would have happened if...
  counterfactual:
    description: "Simulate alternative decision path"
    parameters:
      replay_id: "uuid"
      hypothetical_change: "string"
    returns:
      - original_outcome
      - hypothetical_outcome
      - difference_analysis

# ═══════════════════════════════════════════════════════════════════════════════
# TRAINING BY REFLECTION
# ═══════════════════════════════════════════════════════════════════════════════

training_system:
  description: "Convert replay artifacts into training data"
  
  extraction:
    # Extract successful patterns
    successful_patterns:
      source: "replay_artifacts where final_decision.verdict = SEAL"
      extract:
        - decision_sequence
        - constitutional_checks
        - tool_selection_strategy
      use_for: "positive reinforcement training"
    
    # Extract failure patterns
    failure_patterns:
      source: "replay_artifacts where final_decision.verdict = VOID"
      extract:
        - warning_signs
        - missed_checks
        - constitutional_violations
      use_for: "negative example training"
    
    # Extract efficiency patterns
    efficiency_patterns:
      source: "all replay_artifacts"
      extract:
        - tool_use_efficiency
        - reasoning_step_count
        - time_to_decision
      use_for: "optimization training"
  
  reflection_prompts:
    - "What constitutional floors were most relevant to this decision?"
    - "Could a different tool sequence have been more efficient?"
    - "What evidence was most persuasive? What was ignored?"
    - "How confident was the decision? Was confidence justified?"
    - "What would a human have done differently?"

# ═══════════════════════════════════════════════════════════════════════════════
# VAULT999 INTEGRATION
# ═══════════════════════════════════════════════════════════════════════════════

vault_integration:
  storage:
    path: "VAULT999/replay-artifacts/"
    format: "jsonl"
    compression: "gzip"
  
  indexing:
    - field: "replay_id"
      type: "primary_key"
    - field: "session_id"
      type: "foreign_key"
    - field: "agent_id"
      type: "category"
    - field: "timestamp"
      type: "range"
    - field: "verdict"
      type: "category"
  
  retention:
    policy: "permanent"
    backup: "daily_to_s3"
    tamper_detection: true
  
  seal:
    merkle_chain: true
    signature: "sha256"
    authority: "888_JUDGE"

motto: "Ditempa Bukan Diberi — Forged, Not Given"

