version: 1

id: aaa-gateway-default
description: Primary AAA gateway configuration for OpenClaw runtime

# Model providers
providers:
  - id: minimax
    default_model: minimax/auto
    enabled: true

  - id: anthropic
    default_model: anthropic/claude-sonnet-4
    enabled: false

  - id: openrouter
    default_model: openrouter/google/gemini-2.5-flash
    enabled: false

# Communication channels
channels:
  - id: telegram
    enabled: true
    approval_policy: on-demand

  - id: terminal
    enabled: true
    approval_policy: none

  - id: cli
    enabled: true
    approval_policy: none

  - id: http-webhook
    enabled: false
    approval_policy: hold

# Security policy
security:
  fail_closed: true
  require_auth: true
  audit_events: true

# Gateway-level defaults
defaults:
  session_timeout_sec: 3600
  max_context_tokens: 64000
  approval_policy: on-demand
  risk_tier_ceiling: medium

