# Hermes Agent Observability Config
# DITEMPA BUKAN DIBERI — Forged, Not Given

monitoring:
  enabled: true
  interval_minutes: 15
  
health_checks:
  - name: hermes-gateway
    type: process
    target: hermes-asi-gateway
    alert_on: [stopped, high_cpu, high_memory]
    
  - name: hermes-mcp-arifosmcp
    type: http
    url: http://127.0.0.1:8080/health
    alert_on: [non-200, timeout]
    
  - name: hermes-mcp-geoxmcp
    type: http
    url: http://127.0.0.1:8081/health
    alert_on: [non-200, timeout]

backup:
  schedule: "0 21 * * *"  # 5am MYT
  target: /root/AAA/hermes-backup/daily/
  keep_days: 7
  sources:
    - /root/.hermes/SOUL.md
    - /root/.hermes/memories/MEMORY.md
    - /root/.hermes/memories/USER.md
    - /root/.hermes/config.yaml
    - /root/.hermes/workspace/

alerts:
  channel: telegram
  recipients: ["267378578"]
  on:
    - backup_failure
    - hermes_gateway_down
    - mcp_server_down
    - skill_generation_anomaly
