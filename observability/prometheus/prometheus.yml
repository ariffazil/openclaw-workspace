# prometheus.yml
# arifOS Observability — Prometheus scrape configuration
# Pipeline: 000-INIT → 888-JUDGE → 999-VAULT
# Purpose: Scrape arifOS MCP endpoints; expose Nine-Signal fields (DELTA/PSI/OMEGA) to operators
#
# Usage:
#   docker compose -f docker-compose.yml up -d prometheus
#   or
#   prometheus --config.file=observability/prometheus/prometheus.yml
#
# Targets:
#   mcp.arif-fazil.com   — arifOS MCP runtime (primary)
#   geox.arif-fazil.com  — GEOX subsystem
#   af-forge (localhost) — local OpenClaw gateway metrics
#
# IMPORTANT: This is observability ONLY. Prometheus has no write access to the system.
# It is read-only scraping. Governance lives in arifOS, not in Prometheus.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    system: "arifOS"
    environment: "production"
    stack: "observability-only"   # Label: this container monitors, does not control

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # No alertmanager configured yet — add url when available

rule_files:
  - "nine_signal_alerts.yml"   # Nine-Signal floor/plane drift alerts

# ─────────────────────────────────────────────────────────────────────────────
# Scrape Targets
# ─────────────────────────────────────────────────────────────────────────────

scrape_configs:

  # ── arifOS MCP runtime ────────────────────────────────────────────────────
  # Primary governance metrics surface. Endpoint: /metrics/json
  # Nine-Signal fields emitted here: delta, psi, omega, reason, metrics{}
  - job_name: "arifOS-MCP"
    metrics_path: "/metrics/json"
    scrape_interval: 15s
    scrape_timeout:  10s
    honor_labels: true
    honor_timestamps: true

    static_configs:
      - targets:
          - "mcp.arif-fazil.com"
        labels:
          service:   "arifOS-MCP"
          domain:    "governance"
          read_only: "true"           # Observability only — no write
          observability_layer: "prometheus-observability-only"

    # TLS config — these are public HTTPS endpoints
    scheme: https
    tls_config:
      insecure_skip_verify: false

    # Retry logic for transient failures
    scrape_retry_interval: 5s
    max_samples: 5000

  # ── arifOS API status ─────────────────────────────────────────────────────
  # Health + readiness probes + API surface metrics
  - job_name: "arifOS-API-Status"
    metrics_path: "/api/status"
    scrape_interval: 30s
    scrape_timeout:  10s
    honor_labels: true

    static_configs:
      - targets:
          - "mcp.arif-fazil.com"
        labels:
          service:   "arifOS-API"
          domain:    "governance"
          endpoint:  "status"
          observability_layer: "prometheus-observability-only"

    scheme: https
    tls_config:
      insecure_skip_verify: false

  # ── GEOX subsystem ─────────────────────────────────────────────────────────
  # Subsurface/earth reasoning layer — separate domain
  - job_name: "GEOX"
    metrics_path: "/metrics/json"
    scrape_interval: 30s
    scrape_timeout:  10s
    honor_labels: true

    static_configs:
      - targets:
          - "geox.arif-fazil.com"
        labels:
          service:   "GEOX"
          domain:    "subsurface"
          observability_layer: "prometheus-observability-only"

    scheme: https
    tls_config:
      insecure_skip_verify: false

  # ── OpenClaw gateway (local host) ──────────────────────────────────────────
  # Local OpenClaw /metrics endpoint — when gateway is exposed on port 18789
  - job_name: "OpenClaw-Local"
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout:  10s
    honor_labels: true

    static_configs:
      - targets:
          - "host.docker.internal:18789"
        labels:
          service:   "openclaw-gateway"
          domain:    "agent-runtime"
          location:  "local"
          observability_layer: "prometheus-observability-only"

    # Docker host bridge — works on Linux Docker
    scheme: http

  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  # Monitor the monitor — basic Prometheus health
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service:   "prometheus"
          self_monitoring: "true"
          observability_layer: "prometheus-observability-only"

# ─────────────────────────────────────────────────────────────────────────────
# Metadata & Relabeling
# ─────────────────────────────────────────────────────────────────────────────
#
# Relabel rules add structure to metrics at scrape time.
# These do NOT modify the actual metric name — they add labels for filtering.
#
# Key Nine-Signal labels to use in Grafana queries:
#   Nine-Signal fields from /metrics/json are parsed as labels:
#     - delta       — entropy change (dS)
#     - psi         — vitality/liveliness
#     - omega       — humility/uncertainty
#     - reason      — verdict reason string
#     - floor       — which Floor was evaluated
#     - plane       — which domain plane (GEOX/WEALTH/WELL/AAA)
#     - verdict     — SEAL/HOLD/CAUTION/VOID
#
# Example Grafana queries:
#   Nine-Signal drift:  delta{domain="governance"} - delta{domain="governance"} offset 1h
#   Floor failure rate: count by (floor) (delta{verdict="HOLD"} or vector(0))
#   Plane health:       avg by (plane) (psi)

relabel_configs:
  # Add pipeline stage label from the endpoint path
  - source_labels: [__address__]
    regex: "mcp\\.arif-fazil\\.com"
    replacement: "arifOS-MCP"
    target_label: "scrape_group"

  # Label runtime environment
  - source_labels: [__address__]
    regex: "geox\\.arif-fazil\\.com"
    replacement: "production"
    target_label: "env"

  # Mark all targets as read-only observability
  - source_labels: [__address__]
    regex: ".+"
    replacement: "observability-read-only"
    target_label: "access_mode"
